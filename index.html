<html lang="zh-TW">
<head>
    <meta charset="UTF-8">

    <title>PokeShuffle Web - SHUFFLE-WEB-2026</title>
    <style>
       :root {
    --status-height: 90px; /* 稍微加高以容納手機頂部狀態 */
    --sidebar-width: 85px;
    --accent-color: #ffcc00;
    /* 安全區域變數：針對 iPhone 瀏海與底部橫條 */
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
}

body {
    font-family: 'PingFang TC', 'Microsoft JhengHei', 'Arial', sans-serif;
    margin: 0;
    background: #1a1a1a; /* 稍微加深底色更像手遊 */
    color: white;
    overflow: hidden;
    height: 100vh;
    /* 防止手機長按彈出菜單，提升遊戲感 */
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
}

/* 頂部狀態欄：加入 safe-top 防止被瀏海擋住 */
#status-bar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: calc(var(--status-height) + var(--safe-top));
    padding-top: var(--safe-top);
    background: rgba(0, 0, 0, 0.95);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 100;
    border-bottom: 2px solid var(--accent-color);
    font-size: 14px;
    box-sizing: border-box;
}

.status-row { display: flex; gap: 15px; margin-bottom: 5px; }

/* 左側選單：避開底部手勢區 */
#sidebar {
    position: fixed;
    left: 0;
    top: calc(var(--status-height) + var(--safe-top));
    bottom: var(--safe-bottom);
    width: var(--sidebar-width);
    background: #222;
    overflow-y: auto;
    border-right: 1px solid #444;
    z-index: 90;
    /* 隱藏滾動條但保持滾動 */
    scrollbar-width: none;
    -ms-overflow-style: none;
}
#sidebar::-webkit-scrollbar { display: none; }

.side-btn {
    padding: 22px 5px; /* 加大點擊範圍防止誤觸 */
    text-align: center;
    font-size: 12px;
    cursor: pointer;
    border-bottom: 1px solid #333;
    color: #888;
    touch-action: manipulation;
}

.side-btn.active { background: var(--accent-color); color: black; font-weight: bold; }
.side-btn.unlocked { color: white; }
.mode-toggle { background: #444; color: #ff5555; font-weight: bold; }

/* 主地圖視窗：主體部分也需要考慮底部安全區 */
#map-container {
    margin-left: var(--sidebar-width);
    margin-top: calc(var(--status-height) + var(--safe-top));
    height: calc(100vh - (var(--status-height) + var(--safe-top) + var(--safe-bottom)));
    overflow-y: scroll;
    background: #333;
    position: relative;
    scroll-behavior: smooth;
}

#stage-list {
    display: flex;
    flex-direction: column-reverse;
    padding: 15px; /* 稍微縮小 padding */
    padding-bottom: 80px; /* 底部預留空間防止被箭頭遮擋 */
    min-height: 100%;
}

/* 關卡單元：優化手機點擊感 */
.stage-item {
    background: #444;
    margin: 8px 0;
    padding: 12px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    border: 2px solid transparent;
    min-height: 75px; /* 增加最小高度，符合拇指點擊尺寸 */
    box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    box-sizing: border-box;
    touch-action: manipulation;
}

.stage-item:active { transform: scale(0.97); background: #555; } /* 點擊回饋 */

.pkmn-icon {
    width: 55px;
    height: 55px;
    margin: 0 10px;
    object-fit: contain;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 50%;
    flex-shrink: 0;
}

.stage-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    pointer-events: none; /* 文字不阻擋點擊 */
}

.stage-no { font-size: 11px; color: #bbb; margin-bottom: 2px; }
.stage-name { font-size: 16px; font-weight: bold; }

.stage-item.locked { opacity: 0.3; filter: grayscale(1); pointer-events: none; }
.stage-item.current { border-color: var(--accent-color); background: #555; }

/* 導航箭頭：向上移動避開底部系統橫條 */
#nav-arrows {
    position: fixed;
    right: 20px;
    bottom: calc(30px + var(--safe-bottom));
    display: flex;
    flex-direction: column;
    gap: 15px;
    z-index: 100;
}

.arrow-btn {
    width: 60px;
    height: 60px;
    background: rgba(0, 0, 0, 0.75);
    border: 2px solid var(--accent-color);
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 30px;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    touch-action: none; /* 防止滑動箭頭時觸發頁面滾動 */
}

,"花潔夫人","坐騎小羊","坐騎山羊","頑皮熊貓","流氓熊貓","多麗米亞","妙喵","超能妙喵","獨劍鞘","雙劍鞘"
,"堅盾劍怪","粉香香","芳香精","綿綿泡芙","胖甜妮","好啦鱿","烏賊王","龜腳腳","龜足巨鎧","垃垃藻"
,"毒藻龍","鐵臂槍蝦","鋼炮臂蝦","傘電蜥","光電傘蜥","寶寶暴龍","怪顎龍","冰雪龍","冰雪巨龍","仙子伊布"
,"摔角鷹人","咚咚鼠","小碎鑽","黏黏寶","黏美兒","黏美龍","鑰圈兒","小木靈","朽木妖","南瓜精"
,"南瓜怪人","冰寶","冰岩怪","嗡蝠","音波龍","哲爾尼亞斯","伊裴爾塔爾","基格爾德","蒂安希","胡帕","波爾凱尼恩"
];

/** 2. 修改數據生成邏輯，讓它讀取上面的清單 **/
const POKEMON_DATA = Array.from({length: 721}, (_, i) => {
        const idNum = i + 1;
        return {
            id: idNum.toString().padStart(3, '0'),
            name: POKEMON_NAMES[i] || "No." + idNum,
            // 這裡可以定義哪些是傳說級（傷害 70）
            type: [144, 145, 146, 150, 151, 249, 250, 382, 383, 384, 483, 484, 487, 493, 643, 644, 646, 716, 717, 718].includes(idNum) ? "Legendary" : "Normal",
            // 這裡定義哪些有關卡獎勵道具（Mega石、小智手裡劍等）
            hasMega: [6, 9, 150, 384, 658].includes(idNum) 
        };
    });

    /** 遊戲狀態 **/
    let gameState = {
        stamina: 24,
        lastUpdate: Date.now(),
        keys: 0,
        captured: [],
        items: [],
        unlocked: ["001"],
        lastPlayed: "001",
        currentRegionIdx: 0,
        isHardMode: false
    };

    function init() {
        const saved = localStorage.getItem('SHUFFLE_WEB_SAVE');
        if (saved) gameState = JSON.parse(saved);
        
        renderRegionButtons();
        renderMap();
        scrollToLastPlayed();
        setInterval(updateStamina, 1000);
    }

    function renderRegionButtons() {
        const container = document.getElementById('region-btns');
        container.innerHTML = '';
        REGION_CONFIG.forEach((reg, index) => {
            const isUnlocked = isRegionUnlocked(index);
            const btn = document.createElement('div');
            btn.className = `side-btn ${gameState.currentRegionIdx === index ? 'active' : ''} ${isUnlocked ? 'unlocked' : ''}`;
            btn.innerText = reg.name;
            btn.onclick = () => { if(isUnlocked) switchRegion(index); };
            container.appendChild(btn);
        });
    }

    function isRegionUnlocked(index) {
        if (index === 0) return true;
        // 需通關前一區最後一關
        const prevRegionLastId = REGION_CONFIG[index-1].range[1].toString().padStart(3, '0');
        return gameState.unlocked.includes((REGION_CONFIG[index].range[0]).toString().padStart(3, '0'));
    }

    function switchRegion(index) {
        gameState.currentRegionIdx = index;
        document.getElementById('region-title').innerText = REGION_CONFIG[index].name + "地區";
        renderRegionButtons();
        renderMap();
        save();
    }

    function toggleDifficulty() {
        // 只有通關 151 才能開困難
        if (!gameState.unlocked.includes("152")) {
            alert("需通關關都地區(151)方可解鎖困難模式");
            return;
        }
        gameState.isHardMode = !gameState.isHardMode;
        event.target.innerText = gameState.isHardMode ? "困難" : "普通";
        renderMap();
    }

    function updateStamina() {
        const now = Date.now();
        const diff = now - gameState.lastUpdate;
        const wait = 30 * 60 * 1000;
        if (gameState.stamina < 24 && diff >= wait) {
            gameState.stamina++;
            gameState.lastUpdate += wait;
            save();
        }
        const remaining = gameState.stamina < 24 ? Math.ceil((wait - (now - gameState.lastUpdate)) / 1000) : 0;
        document.getElementById('ui-stamina').innerText = `${gameState.stamina}/24`;
        document.getElementById('ui-timer').innerText = remaining > 0 ? 
            `${Math.floor(remaining/60).toString().padStart(2,'0')}:${(remaining%60).toString().padStart(2,'0')}` : "MAX";
            updateStatusBar();
    }

    function renderMap() {
        const list = document.getElementById('stage-list');
        list.innerHTML = '';
        const config = REGION_CONFIG[gameState.currentRegionIdx];
        
        const regionData = POKEMON_DATA.filter(p => {
            const id = parseInt(p.id);
            return id >= config.range[0] && id <= config.range[1];
        });

        regionData.forEach(p => {
            const isUnlocked = gameState.unlocked.includes(p.id);
            const isCaptured = gameState.captured.includes(p.id);
            const isOwnedItem = gameState.items.includes(p.id);
            
            // 使用 PokeAPI 的高品質圖片 (或是你可以更換為其他來源)
            // 這裡將 ID 轉為整數以符合 PokeAPI 格式
            const imgId = parseInt(p.id);
            const spriteUrl = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${imgId}.png`;

            const div = document.createElement('div');
            div.id = `stage-${p.id}`;
            div.className = `stage-item ${!isUnlocked ? 'locked' : ''} ${gameState.lastPlayed === p.id ? 'current' : ''}`;
            
            div.innerHTML = `
                <div class="ball-icon ${isCaptured ? 'captured' : ''}"></div>
                
                <img class="pkmn-icon" src="${spriteUrl}" alt="${p.name}" loading="lazy">
                
                <div class="stage-info">
                    <div class="stage-no">No.${p.id}</div>
                    <div class="stage-name">${p.name}</div>
                </div>
                
                ${p.hasMega ? `<div class="item-icon ${isOwnedItem ? 'owned' : ''}">M</div>` : ''}
            `;
            
            div.onclick = () => {
    if (!isUnlocked) return;
    
    // 1. 更新最後遊玩紀錄
    gameState.lastPlayed = p.id;
    save();
    renderMap();

    // 2. 開啟準備畫面
    openPrep(p);
};
            list.appendChild(div);
        });

        document.getElementById('ui-dex').innerText = `${gameState.captured.length}/721`;
        document.getElementById('ui-keys').innerText = gameState.keys;
    }



// 開啟準備畫面函式
function openPrep(p) {
    const overlay = document.getElementById('prep-overlay');
    document.getElementById('prep-stage-name').innerText = p.name;
    
    // 判定 HP (依據企劃公式)
    let hp = 2500;
    if (gameState.isHardMode) hp = 4000;
    else if (p.type === "Legendary") hp = 3000;
    document.getElementById('prep-stage-hp').innerText = `目標 HP: ${hp} (模式: ${gameState.isHardMode ? '困難' : '普通'})`;

    // 顯示隊伍 (這裡暫時寫死 4 個 Slot，之後可連動隊伍系統)
    const teamDiv = document.getElementById('prep-team-slots');
    teamDiv.innerHTML = '';
    for(let i=1; i<=4; i++) {
        teamDiv.innerHTML += `
            <div style="text-align:center;">
                <div style="width:50px; height:50px; background:#222; border-radius:50%; border:${i===1?'2px solid var(--accent-color)':'1px solid #666'}"></div>
                <div style="font-size:10px; margin-top:5px;">Slot ${i}</div>
            </div>`;
    }

    // 渲染型態道具 (通關10次解鎖邏輯)
    const formOptions = document.getElementById('prep-form-options');
    formOptions.innerHTML = '';
    if (p.hasMega) {
        // 檢查是否已獲得該寶可夢的道具 (假設 gameState.items 存有 "006_mega")
        const itemKey = `${p.id}_mega`;
        if (gameState.items.includes(itemKey)) {
            formOptions.innerHTML = `<label><input type="checkbox" id="mega-check"> 觸發型態變化</label>`;
        } else {
            formOptions.innerHTML = `<span style="color:#777; font-size:12px;">尚未獲得型態道具 (需通關該關 10 次)</span>`;
        }
    } else {
        formOptions.innerHTML = `<span style="color:#777; font-size:12px;">此寶可夢無特殊型態</span>`;
    }

    // 傳說之鑰判斷
    document.getElementById('prep-key-option').style.display = (p.type === "Legendary") ? 'block' : 'none';

    overlay.style.display = 'block';
}

function closePrep() {
    document.getElementById('prep-overlay').style.display = 'none';
}

function startBattleLogic() {
    if (gameState.stamina < 1) {
        alert("體力不足！");
        return;
    }
    // 扣除體力並儲存
    gameState.stamina -= 1;
    save();
    updateStamina(); // 更新 UI 顯示
    
    // 進入戰鬥畫面 (下一階段開發)
    alert("戰鬥開始！進入消除棋盤...");
    closePrep();
}
function updateStatusBar() {
    document.getElementById('ui-stamina').innerText = `${gameState.stamina}/24`;
    document.getElementById('ui-dex').innerText = `${gameState.captured.length}/721`;
    document.getElementById('ui-keys').innerText = gameState.keys;
}
    function scrollToLastPlayed() {
        const target = document.getElementById(`stage-${gameState.lastPlayed}`);
        if (target) target.scrollIntoView({ block: 'center' });
    }

    let scrollInterval;
    function startScroll(dir) {
        const container = document.getElementById('map-container');
        scrollInterval = setInterval(() => { container.scrollTop += dir * 12; }, 16);
    }
    function stopScroll() { clearInterval(scrollInterval); }

    function save() { localStorage.setItem('SHUFFLE_WEB_SAVE', JSON.stringify(gameState)); }

    window.onload = init;
</script>
<div id="prep-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:200; color:white; padding-top:env(safe-area-inset-top);">
    <div style="padding: 30px 20px; text-align: center;">
        <h2 id="prep-stage-name" style="color:var(--accent-color); font-size: 24px;">寶可夢名稱</h2>
        <p id="prep-stage-hp" style="color:#aaa; font-size: 14px;">目標 HP: --</p>

        <div style="background:#333; border-radius:15px; padding:20px; margin: 25px 0;">
            <p style="font-size:12px; color:var(--accent-color); margin-top:0;">Slot 1 為隊長 (進化位)</p>
            <div id="prep-team-slots" style="display:flex; justify-content:space-around;">
                </div>
        </div>

        <div style="background:#222; border-radius:10px; padding:15px; text-align:left; margin-bottom: 25px;">
            <div id="prep-form-options" style="display:flex; flex-wrap:wrap; gap:10px;">
                </div>
            <div id="prep-key-option" style="margin-top:10px; display:none; border-top:1px solid #444; padding-top:10px;">
                <label><input type="checkbox" id="use-key"> 使用傳說之鑰 (開啟捕捉判定)</label>
            </div>
        </div>

        <div style="display:flex; flex-direction:column; gap:12px;">
            <button onclick="startBattleLogic()" style="padding:18px; background:var(--accent-color); border:none; border-radius:35px; font-size:18px; font-weight:bold; color:black;">開始戰鬥 (⚡ 1)</button>
            <button onclick="closePrep()" style="padding:12px; background:transparent; border:1px solid #555; color:#888; border-radius:35px;">返回地圖</button>

    </div>
