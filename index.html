<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>藥師國考藥草園 x 動森管家</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        :root { --main-green: #78ab4e; --sand-yellow: #f1e6b2; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background-color: var(--sand-yellow); margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* 頂部：藥草園畫面 */
        #garden-area { height: 40%; background: linear-gradient(#87CEEB, #E0F7FA); position: relative; border-bottom: 5px solid #5d4037; display: flex; justify-content: center; align-items: flex-end; padding-bottom: 20px; }
        .manager-img { width: 100px; height: 100px; z-index: 2; transition: transform 0.3s; }
        .plant-img { width: 80px; height: 80px; margin-left: 20px; filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.2)); }
        .status-bar { position: absolute; top: 10px; left: 10px; background: rgba(255,255,255,0.8); padding: 8px 15px; border-radius: 20px; font-weight: bold; font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .weeds { position: absolute; bottom: 20px; width: 40px; opacity: 0.8; }

        /* 中部：答題與匯入區 */
        #main-content { flex: 1; padding: 20px; overflow-y: auto; background: white; border-radius: 25px 25px 0 0; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); }
        .card { background: #f9f9f9; padding: 15px; border-radius: 15px; margin-bottom: 15px; border-left: 5px solid var(--main-green); }
        textarea { width: 100%; height: 100px; border: 1px solid #ccc; border-radius: 10px; padding: 10px; box-sizing: border-box; }
        button { background: var(--main-green); color: white; border: none; padding: 12px 20px; border-radius: 25px; font-weight: bold; cursor: pointer; margin: 5px 0; width: 100%; }
        button.secondary { background: #5c8dcf; }

        /* 答題介面 */
        .option-btn { background: white; border: 2px solid #ddd; color: #333; text-align: left; margin-bottom: 10px; }
        .option-btn.correct { background: #d4edda; border-color: #28a745; }
        .option-btn.wrong { background: #f8d7da; border-color: #dc3545; }
        
        #yamol-link { display: none; color: #d9534f; text-decoration: underline; font-weight: bold; text-align: center; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div id="garden-area">
    <div class="status-bar">
        💰 金幣: <span id="coin-count">0</span> | 🌱 成長度: <span id="growth-level">1</span>
    </div>
    <img id="manager-pic" class="manager-img" src="https://acnhapi.com/v1/icons/villagers/1" alt="Manager">
    <img id="plant-pic" class="plant-img" src="https://img.icons8.com/color/96/sprout.png" alt="Plant">
    <div id="weeds-container"></div>
</div>

<div id="main-content">
    <div id="import-section" class="card">
        <h3>📥 匯入考選部 HTML</h3>
        <textarea id="htmlInput" placeholder="在此貼上考選部 HTML 原始碼..."></textarea>
        <button onclick="convertHTML()">開始轉換題庫</button>
    </div>

    <div id="quiz-section" class="card" style="display:none;">
        <h4 id="q-text">題目載入中...</h4>
        <div id="options-container"></div>
        <div id="yamol-link" onclick="openYamol()">🆘 阿摩大神救救我 (看詳解)</div>
        <button class="secondary" onclick="nextQuestion()" style="margin-top:15px;">下一題</button>
    </div>
    
    <button class="secondary" onclick="toggleView()">切換 匯入 / 答題 模式</button>
</div>

<script>
// ====== 遊戲數據紀錄 ======
let gameState = {
    coins: parseInt(localStorage.getItem('coins')) || 0,
    growth: parseInt(localStorage.getItem('growth')) || 0,
    currentQ: null,
    db: JSON.parse(localStorage.getItem('questionDB')) || []
};

// ====== 初始化動森管家 (隨機一位村民) ======
async function initManager() {
    try {
        const randomId = Math.floor(Math.random() * 391) + 1;
        document.getElementById('manager-pic').src = `https://acnhapi.com/v1/icons/villagers/${randomId}`;
    } catch (e) { console.log("API 載入失敗，使用預設圖片"); }
}

// ====== 核心：HTML 轉換邏輯 ======
function convertHTML() {
    const htmlText = document.getElementById("htmlInput").value;
    const parser = new DOMParser();
    const doc = parser.parseFromString(htmlText, "text/html");
    const blocks = doc.querySelectorAll('.border-b'); // 針對阿摩/考選部格式調整
    const newQuestions = [];

    blocks.forEach((q, index) => {
        try {
            let fullText = q.querySelector('.break-words p')?.innerText || "";
            let splitIndex = fullText.indexOf('(A)');
            if (splitIndex === -1) return;

            let questionText = fullText.substring(0, splitIndex).replace(/^\d+\./, '').trim();
            let optionsText = fullText.substring(splitIndex);
            let optionMatches = optionsText.split(/\([A-D]\)/).filter(x => x.trim() !== '');
            
            let ans = q.querySelector('.text-red-600')?.innerText.replace(/[()\s]/g, '') || "A";

            newQuestions.push({
                id: Date.now() + index,
                q: questionText,
                options: optionMatches.map(t => t.trim()),
                ans: ans,
                yamol: `https://yamol.tw/re_search.php?key=${encodeURIComponent(questionText.substring(0,15))}`
            });
        } catch (e) { console.error(e); }
    });

    gameState.db = gameState.db.concat(newQuestions);
    localStorage.setItem('questionDB', JSON.stringify(gameState.db));
    alert(`成功匯入 ${newQuestions.length} 題！`);
    updateUI();
}

// ====== 答題邏輯 ======
function startQuiz() {
    if (gameState.db.length === 0) return alert("請先匯入題庫！");
    const randomIndex = Math.floor(Math.random() * gameState.db.length);
    gameState.currentQ = gameState.db[randomIndex];
    
    document.getElementById('q-text').innerText = gameState.currentQ.q;
    const container = document.getElementById('options-container');
    container.innerHTML = '';
    document.getElementById('yamol-link').style.display = 'none';

    ['A','B','C','D'].forEach((label, i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = `${label}. ${gameState.currentQ.options[i] || ''}`;
        btn.onclick = () => checkAnswer(label, btn);
        container.appendChild(btn);
    });
}

function checkAnswer(choice, btn) {
    if (choice === gameState.currentQ.ans) {
        btn.classList.add('correct');
        gameState.coins += 20;
        gameState.growth += 1;
        document.getElementById('manager-pic').style.transform = 'scale(1.2) rotate(10deg)';
        setTimeout(() => document.getElementById('manager-pic').style.transform = 'scale(1)', 300);
    } else {
        btn.classList.add('wrong');
        document.getElementById('yamol-link').style.display = 'block';
        // 答錯生成雜草
        createWeed();
    }
    saveGame();
    updateUI();
}

function createWeed() {
    const weed = document.createElement('img');
    weed.src = "https://img.icons8.com/color/48/grass.png";
    weed.className = "weeds";
    weed.style.left = Math.random() * 80 + "%";
    document.getElementById('weeds-container').appendChild(weed);
}

function openYamol() {
    window.open(gameState.currentQ.yamol, '_blank');
}

function nextQuestion() {
    startQuiz();
}

function toggleView() {
    const importSec = document.getElementById('import-section');
    const quizSec = document.getElementById('quiz-section');
    if (importSec.style.display === 'none') {
        importSec.style.display = 'block';
        quizSec.style.display = 'none';
    } else {
        importSec.style.display = 'none';
        quizSec.style.display = 'block';
        startQuiz();
    }
}

function updateUI() {
    document.getElementById('coin-count').innerText = gameState.coins;
    document.getElementById('growth-level').innerText = Math.floor(gameState.growth / 10) + 1;
    // 成長到一定程度改變植物外觀
    if (gameState.growth > 50) document.getElementById('plant-pic').src = "https://img.icons8.com/color/96/sunflower.png";
}

function saveGame() {
    localStorage.setItem('coins', gameState.coins);
    localStorage.setItem('growth', gameState.growth);
}

window.onload = () => {
    initManager();
    updateUI();
};
</script>
</body>
</html>
