<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>秘密花園種植系統</title>
    <style>
        :root {
    --nav-bg: rgba(255, 255, 255, 0.92);
    --primary-color: #4CAF50;
}

* {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent; /* 移除行動端點擊藍色框 */
}

body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background-color: #f0f4f0;
    overflow: hidden; /* 防止橡皮筋回彈影響體驗 */
}

        /* 1. 頂部資訊列優化：避開上方瀏海與狀態列 */
.top-info {
    position: absolute;
    top: 0;
    width: 100%;
    padding-top: env(safe-area-inset-top); /* 避開上方遮擋 */
    display: flex;
    justify-content: space-around;
    padding-bottom: 10px;
    background: linear-gradient(to bottom, rgba(255,255,255,0.8), transparent);
}

/* 2. 花盆區域微調 */
.garden-stage {
    flex: 1; /* 讓中間區域自動填滿剩餘空間 */
    display: flex;
    align-items: center;
    justify-content: center;
}
/* 主畫面區域 */
.game-screen {
    height: calc(100% - 120px); /* 扣除底部選單預估高度 */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

/* 花盆樣式 */
.pot-container {
    width: 150px;
    height: 150px;
    position: relative;
    border-bottom: 8px solid #8B4513; /* 簡易花盆裝飾 */
    display: flex;
    align-items: center;
    justify-content: center;
}

/* 底部導覽列總容器 */
.main-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background: var(--nav-bg);
    backdrop-filter: blur(8px);
    border-top: 1px solid #ddd;
    
    /* 核心：避開 iOS Home Indicator 與 Android 虛擬鍵 */
    padding-bottom: env(safe-area-inset-bottom); 
    display: flex;
    flex-direction: column;
}

.nav-row {
    display: flex;
    width: 100%;
}

.primary-row { height: 60px; }
.secondary-row { 
    height: 50px; 
    background: #f9f9f9; 
    border-top: 1px solid #eee;
}

.nav-row button {
    flex: 1;
    border: none;
    background: transparent;
    font-size: 14px;
    font-weight: bold;
    color: #444;
    cursor: pointer;
}

.nav-row button:active {
    background: #e0e0e0;
    transform: scale(0.95);
}

/* 彈窗遮罩層 */
.modal-overlay {
    display: none; /* 預設隱藏 */
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    z-index: 1000;
    justify-content: center;
    align-items: flex-end; /* 從底部彈出，符合手機習慣 */
}

/* 彈窗主體 */
.modal-content {
    background: white;
    width: 100%;
    max-height: 80vh; /* 最高佔螢幕 80% */
    border-radius: 20px 20px 0 0;
    display: flex;
    flex-direction: column;
    padding-bottom: env(safe-area-inset-bottom); /* 避開底部按鈕 */
    animation: slideUp 0.3s ease-out;
}

@keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
}

.modal-header {
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #eee;
}

.modal-body {
    flex: 1;
    overflow-y: auto; /* 開啟內部捲軸 */
    padding: 15px;
    -webkit-overflow-scrolling: touch; /* iOS 捲動優化 */
}

.modal-footer {
    padding: 15px;
    background: #f9f9f9;
    text-align: center;
    font-weight: bold;
}

/* 種子網格佈局 */
.seed-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr); /* 手機端一排兩個 */
    gap: 15px;
}

.seed-item {
    border: 1px solid #ddd;
    border-radius: 12px;
    padding: 10px;
    text-align: center;
    background: #fff;
}

.seed-item img {
    width: 60px;
    height: 60px;
    object-fit: contain;
}

.buy-btn {
    background: var(--primary-color);
    color: white;
    border: none;
    padding: 8px 15px;
    border-radius: 20px;
    margin-top: 5px;
    width: 100%;
}

.buy-btn:disabled {
    background: #ccc;
}
    </style>
</head>
<body>
    <section class="game-screen">
        <div class="top-info">
            <span>等級: <b id="player-lvl">1</b></span>
            <span>金幣: <b id="player-coins">0</b></span>
        </div>

        <div class="garden-stage">
            <div id="flower-pot" class="pot-container">
                <div class="pot"></div>
                <div id="plant-status" class="plant-empty">準備播種</div>
            </div>
        </div>
    </section>

    <nav class="main-nav">
        <div class="nav-row primary-row">
            <button onclick="switchTab('pokedex')">圖鑑</button>
            <button onclick="switchTab('quiz')">答題</button>
            <button onclick="switchTab('player')">玩家</button>
        </div>
        <div class="nav-row secondary-row">
            <button onclick="switchTab('shop')">商店</button>
            <button onclick="switchTab('bank')">題庫</button>
            <button onclick="switchTab('settings')">設定</button>
        </div>
    </nav>
<div id="shop-modal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <h2>種子商店</h2>
            <button class="close-btn" onclick="closeShop()">✕</button>
        </div>
        <div class="modal-body">
            <div id="seed-list" class="seed-grid">
                </div>
        </div>
        <div class="modal-footer">
            <p>目前金幣: <span id="modal-coins">50</span></p>
        </div>
    </div>
</div>
    <script>

// 1. 初始化玩家數據 (移動到最上方確保所有函數都讀得到)
let gameState = {
    coins: 50,
    lvl: 1,
    currentPlant: null
};

// 使用 Fluent Emoji 的可愛花卉素材 (GitHub 託管素材)
const seedsData = [
    { id: 1, name: "向日葵", price: 10, img: "https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Sunflower/3D/sunflower_3d.png" },
    { id: 2, name: "鬱金香", price: 20, img: "https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Tulip/3D/tulip_3d.png" },
    { id: 3, name: "玫瑰花", price: 30, img: "https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Rose/3D/rose_3d.png" },
    { id: 4, name: "盛開櫻", price: 40, img: "https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Cherry%20blossom/3D/cherry_blossom_3d.png" },
    { id: 5, name: "薰衣草", price: 50, img: "https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Blooming%20flower/3D/blooming_flower_3d.png" },
    { id: 6, name: "小雛菊", price: 60, img: "https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Blossom/3D/blossom_3d.png" },
    { id: 7, name: "幸運草", price: 70, img: "https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Four%20leaf%20clover/3D/four_leaf_clover_3d.png" },
    { id: 8, name: "仙人掌", price: 100, img: "https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Cactus/3D/cactus_3d.png" },
    { id: 9, name: "蝴蝶蘭", price: 150, img: "https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Hibiscus/3D/hibiscus_3d.png" },
    { id: 10, name: "楓葉種", price: 200, img: "https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Maple%20leaf/3D/maple_leaf_3d.png" },
];

// 2. 標籤切換與功能觸發 (合併後的版本)
function switchTab(tabName) {
    console.log("切換至：" + tabName);
    
    // 震動回饋
    if (navigator.vibrate) {
        navigator.vibrate(10);
    }

    // 判斷點擊的是哪一個標籤
    if (tabName === 'shop') {
        openShop();
    } else {
        // 其他標籤的功能未來可以在這裡擴充
        // alert("功能開發中：" + tabName);
    }
}

// 3. 商店相關功能
function openShop() {
    document.getElementById('shop-modal').style.display = 'flex';
    document.getElementById('modal-coins').innerText = gameState.coins;
    renderSeeds();
}

function closeShop() {
    document.getElementById('shop-modal').style.display = 'none';
}

function renderSeeds() {
    const list = document.getElementById('seed-list');
    list.innerHTML = '';
    
    seedsData.forEach(seed => {
        const item = document.createElement('div');
        item.className = 'seed-item';
        const imgUrl = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/berry/${seed.imgId}.png`;
        
        item.innerHTML = `
            <img src="${imgUrl}" alt="${seed.name}">
            <div style="font-size:14px; margin:5px 0;">${seed.name}</div>
            <div style="color:#e91e63; font-weight:bold;">$${seed.price}</div>
            <button class="buy-btn" ${gameState.coins < seed.price ? 'disabled' : ''} 
                onclick="buySeed(${seed.id}, ${seed.price})">購買</button>
        `;
        list.appendChild(item);
    });
}

function buySeed(id, price) {
    if (gameState.coins >= price) {
        gameState.coins -= price;
        updateUI();
        // 更新彈窗內的金幣顯示
        document.getElementById('modal-coins').innerText = gameState.coins;
        alert("購買成功！");
        renderSeeds(); // 重新整理購買按鈕狀態
    } else {
        alert("金幣不足！");
    }
}

// 4. UI 更新功能
function updateUI() {
    document.getElementById('player-lvl').innerText = gameState.lvl;
    document.getElementById('player-coins').innerText = gameState.coins;
}

// 5. 頁面加載初始化
window.onload = () => {
    updateUI();
};
    </script>
</body>
</html>
