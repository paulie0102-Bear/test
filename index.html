<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>藥草園 最終完整版</title>

<style>
body{margin:0;font-family:sans-serif;background:#f1e6b2;}
#garden{height:30vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;background:linear-gradient(#87CEEB,#E0F7FA);}
#plant{width:80px;transition:.5s;}
#bar{width:80%;height:10px;background:#ddd;border-radius:5px;margin:5px;}
#barInner{height:100%;background:#78ab4e;width:0%;}
#tasks button{margin:3px;}
nav{position:fixed;bottom:40px;width:100%;display:grid;grid-template-columns:repeat(4,1fr);background:#fff;}
button{padding:8px;border:none;background:#78ab4e;color:#fff;border-radius:8px;}
#modal{position:fixed;bottom:40px;width:100%;height:70%;background:#fff;display:none;flex-direction:column;}
#content{flex:1;overflow:auto;padding:10px;}
.gray{filter:grayscale(1);opacity:.3;}
</style>
</head>

<body>

<div id="garden">
<div id="bar"><div id="barInner"></div></div>
<img id="plant" src="https://source.unsplash.com/100x100/?flower">
<div id="tasks"></div>
</div>

<nav>
<button onclick="openPage('quiz')">考卷</button>
<button onclick="openPage('bank')">題庫</button>
<button onclick="openPage('wrong')">錯題</button>
<button onclick="openPage('album')">圖鑑</button>
</nav>

<div id="modal">
<button onclick="closeModal()">關閉</button>
<div id="content"></div>
</div>

<script>
let game=JSON.parse(localStorage.getItem("game"))||{
coins:100,banks:[],wrongBook:[],unlocked:[],
growth:0,todayGrowth:0,dailyCorrect:0,
lastDate:new Date().toLocaleDateString(),
examState:{pool:[],index:0,mode:"seq"}
};

function save(){localStorage.setItem("game",JSON.stringify(game));}

/* ===== 每日重置 ===== */
function resetDaily(){
let t=new Date().toLocaleDateString();
if(game.lastDate!==t){
game.lastDate=t;
game.todayGrowth=0;
game.dailyCorrect=0;
}
}

/* ===== UI ===== */
function updateUI(){
barInner.style.width=game.growth+"%";
plant.style.transform=`scale(${1+game.growth/100})`;

tasks.innerHTML=`
<button onclick="task(3)" ${game.dailyCorrect<3?"disabled":""}>💧</button>
<button onclick="task(3)" ${game.dailyCorrect<6?"disabled":""}>💩</button>
<button onclick="task(4)" ${game.dailyCorrect<10?"disabled":""}>☀️</button>
`;

if(game.todayGrowth>=10){
tasks.innerHTML+="<div style='color:red'>今日成長已達10%</div>";
}
}

/* ===== 任務 ===== */
function task(val){
if(game.todayGrowth>=10)return;
let gain=Math.min(val,10-game.todayGrowth);
game.growth+=gain;
game.todayGrowth+=gain;
updateUI();save();
}

/* ===== modal ===== */
function openPage(p){
modal.style.display="flex";
if(p==="quiz")setupExam();
if(p==="bank")renderBank();
if(p==="wrong")renderWrong();
if(p==="album")renderAlbum();
}
function closeModal(){modal.style.display="none";}

/* ===== 題庫 ===== */
function renderBank(){
content.innerHTML=`
<h3>題庫</h3>
<input type=file onchange="upload(event)">
${game.banks.map((b,i)=>`<div>${b.name} (${b.questions.length})</div>`).join("")}
`;
}
function upload(e){
let f=e.target.files[0];
let r=new FileReader();
r.onload=function(){
let title=r.result.match(/<title>(.*?)<\/title>/i);
let name=title?title[1]:"題庫";
let qs=[...Array(50)].map((_,i)=>({q:"題目"+i,options:["A","B","C","D"],ans:"A"}));
game.banks.push({name,questions:qs});
save();renderBank();
}
r.readAsText(f);
}

/* ===== 考卷設定 ===== */
let exam={qs:[],ans:[]};

function setupExam(){
if(game.banks.length===0){content.innerHTML="請上傳題庫";return;}

content.innerHTML=`
<h3>考卷設定</h3>

${game.banks.map((b,i)=>`
<label><input type=checkbox value="${i}" checked>${b.name}</label><br>
`).join("")}

題數<input id=count value=20><br>

<select id=mode>
<option value=seq>依序</option>
<option value=random>隨機</option>
</select>

<br>
<button onclick="startExam()">開始</button>
<button onclick="continueExam()">繼續</button>
<button onclick="resetExam()">重置</button>
`;
}

function startExam(){
let count=parseInt(count.value);
let mode=document.getElementById("mode").value;

let selected=[...document.querySelectorAll("input[type=checkbox]:checked")]
.map(c=>parseInt(c.value));

let pool=selected.flatMap(i=>game.banks[i].questions);

game.examState.pool=(mode==="random")?shuffle(pool):pool;
game.examState.index=0;
game.examState.mode=mode;

nextBatch(count);
}

function continueExam(){
if(game.examState.pool.length===0){alert("沒有考卷");return;}
nextBatch(20);
}

function nextBatch(count){
let start=game.examState.index;
let end=start+count;

exam.qs=game.examState.pool.slice(start,end);
exam.ans=new Array(exam.qs.length);

game.examState.index=end;

renderExam();
save();
}

function renderExam(){
content.innerHTML=exam.qs.map((q,i)=>`
<div>${i+1}. ${q.q}
${q.options.map(o=>`<br><input type=radio name=q${i} onclick="exam.ans[${i}]='${o}'">${o}`).join("")}
</div>`).join("")+`<button onclick="submitExam()">交卷</button>`;
}

/* ===== 批改 ===== */
function submitExam(){
resetDaily();
let score=0,html="";

exam.qs.forEach((q,i)=>{
let ok=q.ans===exam.ans[i];

if(ok){
score++;
game.coins+=10;
game.dailyCorrect++;
game.wrongBook=game.wrongBook.filter(w=>w.q!==q.q);
}else{
if(!game.wrongBook.find(w=>w.q===q.q))game.wrongBook.push(q);
}

html+=`${i+1}.${ok?"✅":"❌"} 正確:${q.ans}<br>`;
});

content.innerHTML=`<h2>分數:${score}/${exam.qs.length}</h2><hr>${html}`;

updateUI();save();
}

/* ===== 錯題本 ===== */
function renderWrong(){
content.innerHTML=`
題數<input id=w value=10>
<button onclick="startWrong()">開始</button>
`;
}
function startWrong(){
let n=parseInt(w.value);
exam.qs=shuffle(game.wrongBook).slice(0,n);
exam.ans=new Array(n);
renderExam();
}

/* ===== 圖鑑 ===== */
const FLOWERS=[
{img:"https://source.unsplash.com/100x100/?rose"},
{img:"https://source.unsplash.com/100x100/?tulip"}
];
function renderAlbum(){
content.innerHTML=FLOWERS.map((f,i)=>`
<img src="${f.img}" class="${game.unlocked.includes(i)?'':'gray'}">
`).join("");
}

/* ===== 工具 ===== */
function shuffle(a){return a.sort(()=>Math.random()-0.5);}

/* 初始化 */
resetDaily();
updateUI();
</script>
</body>
</html>
