<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>秘密花園種植系統</title>
    <style>
        :root {
    --nav-bg: rgba(255, 255, 255, 0.92);
    --primary-color: #4CAF50;
}

* {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent; /* 移除行動端點擊藍色框 */
}

body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background-color: #f0f4f0;
    overflow: hidden; /* 防止橡皮筋回彈影響體驗 */
}

      .top-info {
    position: absolute;
    top: 0;
    width: 100%;
    padding-top: calc(env(safe-area-inset-top) + 10px);
    display: flex;
    justify-content: center; /* 置中顯示 */
    pointer-events: none; /* 確保不干擾點擊 */
}

.coin-display {
    background: rgba(0, 0, 0, 0.6);
    color: #FFD700;
    padding: 8px 20px;
    border-radius: 30px;
    font-size: 20px;
    font-weight: bold;
    backdrop-filter: blur(4px);
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

/* 2. 花盆區域微調 */
.garden-stage {
    flex: 1; /* 讓中間區域自動填滿剩餘空間 */
    display: flex;
    align-items: center;
    justify-content: center;
}
/* 主畫面區域 */
.game-screen {
    height: calc(100% - 120px); /* 扣除底部選單預估高度 */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

/* 花盆樣式 */
.pot-container {
    width: 150px;
    height: 150px;
    position: relative;
    border-bottom: 8px solid #8B4513; /* 簡易花盆裝飾 */
    display: flex;
    align-items: center;
    justify-content: center;
}

/* 底部導覽列總容器 */
.main-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background: var(--nav-bg);
    backdrop-filter: blur(8px);
    border-top: 1px solid #ddd;
    
    /* 核心：避開 iOS Home Indicator 與 Android 虛擬鍵 */
    padding-bottom: env(safe-area-inset-bottom); 
    display: flex;
    flex-direction: column;
}

.nav-row {
    display: flex;
    width: 100%;
}

.primary-row { height: 60px; }
.secondary-row { 
    height: 50px; 
    background: #f9f9f9; 
    border-top: 1px solid #eee;
}

.nav-row button {
    flex: 1;
    border: none;
    background: transparent;
    font-size: 14px;
    font-weight: bold;
    color: #444;
    cursor: pointer;
}

.nav-row button:active {
    background: #e0e0e0;
    transform: scale(0.95);
}

/* 彈窗遮罩層 */
.modal-overlay {
    display: none; /* 預設隱藏 */
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    z-index: 1000;
    justify-content: center;
    align-items: flex-end; /* 從底部彈出，符合手機習慣 */
}

/* 彈窗主體 */
.modal-content {
    background: white;
    width: 100%;
    max-height: 80vh; /* 最高佔螢幕 80% */
    border-radius: 20px 20px 0 0;
    display: flex;
    flex-direction: column;
    padding-bottom: env(safe-area-inset-bottom); /* 避開底部按鈕 */
    animation: slideUp 0.3s ease-out;
}

@keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
}

.modal-header {
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #eee;
}

.modal-body {
    flex: 1;
    overflow-y: auto; /* 開啟內部捲軸 */
    padding: 15px;
    -webkit-overflow-scrolling: touch; /* iOS 捲動優化 */
}

.modal-footer {
    padding: 15px;
    background: #f9f9f9;
    text-align: center;
    font-weight: bold;
}

/* 種子網格佈局 */
.seed-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr); /* 手機端一排兩個 */
    gap: 15px;
}

.seed-item {
    border: 1px solid #ddd;
    border-radius: 12px;
    padding: 10px;
    text-align: center;
    background: #fff;
}

.seed-item img {
    width: 60px;
    height: 60px;
    object-fit: contain;
}

.buy-btn {
    background: var(--primary-color);
    color: white;
    border: none;
    padding: 8px 15px;
    border-radius: 20px;
    margin-top: 5px;
    width: 100%;
}

.buy-btn:disabled {
    background: #ccc;
}
    </style>
</head>
<body>
    <section class="game-screen">
       <section class="game-screen">
    <div class="top-info">
        <div class="coin-display">💰 <b id="player-coins">0</b></div>
    </div>

    <div class="garden-stage">
        <div id="flower-pot" class="pot-container">
            <div id="plant-display" class="plant-gone"></div>
            <div class="soil"></div>
        </div>
        <button id="plant-btn" class="action-btn" onclick="openPlantingPanel()">開始種植</button>
    </div>
</section>

    <nav class="main-nav">
        <div class="nav-row primary-row">
            <button onclick="switchTab('pokedex')">圖鑑</button>
            <button onclick="switchTab('quiz')">答題</button>
            <button onclick="switchTab('player')">玩家</button>
        </div>
        <div class="nav-row secondary-row">
            <button onclick="switchTab('shop')">商店</button>
            <button onclick="switchTab('bank')">題庫</button>
            <button onclick="switchTab('settings')">設定</button>
        </div>
    </nav>
<div id="shop-modal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <h2>種子商店</h2>
            <button class="close-btn" onclick="closeShop()">✕</button>
        </div>
        <div class="modal-body">
            <div id="seed-list" class="seed-grid">
                </div>
        </div>
        <div class="modal-footer">
            <p>目前金幣: <span id="modal-coins">50</span></p>
        </div>
    </div>
</div>
    <script>

// --- 1. 初始化玩家數據 (包含背包與當前植物) ---
let gameState = {
    coins: 100, 
    currentPlant: null, // 格式: { name, img }
    inventory: {} // 格式: { 種子ID: 數量 }
};

// 10 種種子資料 (穩定連結版)
const seedsData = [
    { id: 1, name: "向日葵", price: 10, img: "https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Sunflower/3D/sunflower_3d.png" },
    { id: 2, name: "鬱金香", price: 20, img: "https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Tulip/3D/tulip_3d.png" },
    { id: 3, name: "玫瑰花", price: 30, img: "https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Rose/3D/rose_3d.png" },
    { id: 4, name: "櫻花", price: 40, img: "https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Cherry%20blossom/3D/cherry_blossom_3d.png" },
    { id: 5, name: "風信子", price: 50, img: "https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Herb/3D/herb_3d.png" },
    { id: 6, name: "小雛菊", price: 60, img: "https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Blossom/3D/blossom_3d.png" },
    { id: 7, name: "幸運草", price: 70, img: "https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Four%20leaf%20clover/3D/four_leaf_clover_3d.png" },
    { id: 8, name: "仙人掌", price: 100, img: "https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Cactus/3D/cactus_3d.png" },
    { id: 9, name: "扶桑花", price: 150, img: "https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Hibiscus/3D/hibiscus_3d.png" },
    { id: 10, name: "楓葉", price: 200, img: "https://raw.githubusercontent.com/microsoft/fluentui-emoji/main/assets/Maple%20leaf/3D/maple_leaf_3d.png" },
];

// 輔助工具：找種子資料
const getSeedById = (id) => seedsData.find(s => s.id === id);

// --- 2. 導覽與標籤切換 ---
function switchTab(tabName) {
    if (tabName === 'shop') {
        openShop();
    } else {
        console.log("切換至：" + tabName);
    }
    if (navigator.vibrate) navigator.vibrate(10);
}

// --- 3. 商店功能 ---
function openShop() {
    document.getElementById('shop-modal').style.display = 'flex';
    document.getElementById('modal-coins').innerText = gameState.coins;
    renderSeeds();
}

function closeShop() {
    document.getElementById('shop-modal').style.display = 'none';
}

function renderSeeds() {
    const list = document.getElementById('seed-list');
    list.innerHTML = '';
    seedsData.forEach(seed => {
        const item = document.createElement('div');
        item.className = 'seed-item';
        const safeImgUrl = seed.img.replace(/ /g, '%20');
        item.innerHTML = `
            <img src="${safeImgUrl}" alt="${seed.name}" style="width: 70px; height: 70px; object-fit: contain;">
            <div style="font-size:14px; font-weight: bold; margin:5px 0;">${seed.name}</div>
            <div style="color:#FF9800; font-weight:bold; margin-bottom: 8px;">💰 ${seed.price}</div>
            <button class="buy-btn" ${gameState.coins < seed.price ? 'disabled' : ''} 
                onclick="buySeed(${seed.id}, ${seed.price})">購買</button>
        `;
        list.appendChild(item);
    });
}

function buySeed(id, price) {
    if (gameState.coins >= price) {
        gameState.coins -= price;
        // 放入背包
        gameState.inventory[id] = (gameState.inventory[id] || 0) + 1;
        updateUI();
        renderSeeds(); 
        document.getElementById('modal-coins').innerText = gameState.coins;
        alert(`購買成功！${getSeedById(id).name}已放入背包。`);
    } else {
        alert("金幣不足！");
    }
}

// --- 4. 種植系統 (主畫面按鈕觸發) ---
function openPlantingPanel() {
    const hasSeeds = Object.values(gameState.inventory).some(count => count > 0);
    if (!hasSeeds) {
        alert("你目前沒有種子喔！先去商店逛逛吧。");
        return;
    }
    document.getElementById('planting-modal').style.display = 'flex';
    renderInventory();
}

function renderInventory() {
    const list = document.getElementById('inventory-seed-list');
    list.innerHTML = '';
    
    for (const [seedId, count] of Object.entries(gameState.inventory)) {
        if (count <= 0) continue;
        const seed = getSeedById(parseInt(seedId));
        const item = document.createElement('div');
        item.className = 'inventory-item';
        const safeImgUrl = seed.img.replace(/ /g, '%20');
        
        item.innerHTML = `
            <div style="position:relative;">
                <img src="${safeImgUrl}" alt="${seed.name}">
                <span class="seed-count-badge">${count}</span>
            </div>
            <div style="font-size:12px; font-weight:bold; margin-top:5px;">${seed.name}</div>
        `;
        item.onclick = () => plantSeed(seed.id);
        list.appendChild(item);
    }
}

function plantSeed(seedId) {
    gameState.inventory[seedId] -= 1;
    const seed = getSeedById(seedId);
    gameState.currentPlant = { name: seed.name, img: seed.img };
    document.getElementById('planting-modal').style.display = 'none';
    updateUI();
}

// --- 5. UI 更新同步 ---
function updateUI() {
    document.getElementById('player-coins').innerText = gameState.coins;
    
    const plantDisp = document.getElementById('plant-display');
    const plantBtn = document.getElementById('plant-btn');
    
    if (gameState.currentPlant) {
        // 有植物時
        plantDisp.style.backgroundImage = `url(${gameState.currentPlant.img.replace(/ /g, '%20')})`;
        plantDisp.classList.remove('plant-gone');
        plantBtn.style.display = 'none';
    } else {
        // 沒植物時
        plantDisp.classList.add('plant-gone');
        plantDisp.style.backgroundImage = 'none';
        plantBtn.style.display = 'block';
    }
}

window.onload = () => {
    updateUI();
};
    </script>
</body>
</html>
