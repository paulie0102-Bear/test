<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PokeShuffle Web - SHUFFLE-WEB-2026</title>
    <style>

    :root {
    --status-height: 90px;
    --sidebar-width: 85px;
    --accent-color: #ffcc00;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
}

body {
    font-family: 'PingFang TC', 'Microsoft JhengHei', 'Arial', sans-serif;
    margin: 0;
    background: #1a1a1a;
    color: white;
    overflow: hidden;
    height: 100vh;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
}

#status-bar {
    position: fixed;
    top: 0; left: 0; width: 100%;
    height: calc(var(--status-height) + var(--safe-top));
    padding-top: var(--safe-top);
    background: rgba(0, 0, 0, 0.95);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 100;
    border-bottom: 2px solid var(--accent-color);
    box-sizing: border-box;
}

.status-row { display: flex; gap: 15px; margin-bottom: 5px; }

#sidebar {
    position: fixed;
    left: 0;
    top: calc(var(--status-height) + var(--safe-top));
    bottom: var(--safe-bottom);
    width: var(--sidebar-width);
    background: #222;
    overflow-y: auto;
    border-right: 1px solid #444;
    z-index: 90;
    scrollbar-width: none;
    -ms-overflow-style: none;
}
#sidebar::-webkit-scrollbar { display: none; }

.side-btn {
    padding: 22px 5px;
    text-align: center;
    font-size: 12px;
    cursor: pointer;
    border-bottom: 1px solid #333;
    color: #888;
    touch-action: manipulation;
}
.side-btn.active { background: var(--accent-color); color: black; font-weight: bold; }
.side-btn.unlocked { color: white; }

#map-container {
    margin-left: var(--sidebar-width);
    margin-top: calc(var(--status-height) + var(--safe-top));
    height: calc(100vh - (var(--status-height) + var(--safe-top) + var(--safe-bottom)));
    overflow-y: scroll;
    background: #333;
    position: relative;
    scroll-behavior: smooth;
}

#stage-list {
    display: flex;
    flex-direction: column-reverse; /* 關鍵：地圖起點在下方 */
    padding: 15px;
    padding-bottom: 100px;
    min-height: 100%;
}

.stage-item {
    position: relative;
    background: #444;
    margin: 10px 0;
    padding: 15px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    border: 2px solid transparent;
    transition: all 0.2s;
    cursor: pointer;
    box-sizing: border-box;
}

.stage-item.locked { opacity: 0.5; filter: grayscale(1); pointer-events: none; }
.stage-item.current { border-color: var(--accent-color); background: #505050; }
.stage-item:active { transform: scale(0.97); background: #555; }

/* Mega 進化石圖示 - 修正版 */
.mega-stone-icon {
    position: absolute;
    top: -8px;
    right: -8px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    /* 確保元素一定會顯示 */
    display: block !important; 
    background-size: 24px; /* 固定圖片大小，確保在 32px 的圓圈內居中 */
    background-position: center;
    background-repeat: no-repeat;
    z-index: 50;
    transition: all 0.3s ease;
}

/* 狀態：尚未獲得 */
.mega-stone-icon.not-owned {
    background-color: #333;
    border: 2px solid #666;
    filter: grayscale(1) brightness(0.6);
    box-shadow: 0 2px 5px rgba(0,0,0,0.5);
}

/* 狀態：已獲得 */
.mega-stone-icon.owned {
    background-color: #222;
    border: 2px solid var(--accent-color);
    box-shadow: 0 0 10px rgba(255, 204, 0, 0.7);
    filter: grayscale(0) brightness(1.1);
    animation: mega-stone-glow 2s infinite alternate;
}

@keyframes mega-stone-glow {
    from { box-shadow: 0 0 5px rgba(255, 204, 0, 0.5); transform: scale(1); }
    to { box-shadow: 0 0 15px rgba(255, 204, 0, 0.9); transform: scale(1.1); }
}

.pkmn-icon {
    width: 55px; height: 55px; margin: 0 10px;
    object-fit: contain;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 50%;
    flex-shrink: 0;
}

.stage-info { flex: 1; display: flex; flex-direction: column; pointer-events: none; }
.stage-no { font-size: 11px; color: #bbb; }
.stage-name { font-size: 16px; font-weight: bold; }

#nav-arrows {
    position: fixed;
    right: 20px;
    bottom: calc(30px + var(--safe-bottom));
    display: flex;
    flex-direction: column;
    gap: 15px;
    z-index: 100;
}

.arrow-btn {
    width: 60px; height: 60px;
    background: rgba(0, 0, 0, 0.75);
    border: 2px solid var(--accent-color);
    border-radius: 50%;
    display: flex; justify-content: center; align-items: center;
    font-size: 30px; cursor: pointer;
}

.ball-icon {
    width: 20px; height: 20px;
    background: #555;
    border-radius: 50%;
    border: 2px solid #333;
    position: relative;
}
.ball-icon.captured { background: linear-gradient(to bottom, #ff4444 50%, white 50%); border-color: #000; }
.ball-icon.captured::after {
    content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 6px; height: 6px; background: white; border: 2px solid #333; border-radius: 50%;
}

.overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.9); display: none;
    justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(5px);
}

.card {
    background: #2c2c2c; color: white; padding: 20px; border-radius: 20px;
    border: 2px solid #444; width: 90%; max-width: 400px;
    display: flex; flex-direction: column; align-items: center;
}

#pokemon-list-container {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 12px; width: 100%; margin: 15px 0;
}

.selector-item {
    background: #3d3d3d; border-radius: 12px; padding: 5px; text-align: center;
    cursor: pointer; border: 2px solid transparent; transition: all 0.2s;
}
.selector-item:active { transform: scale(0.9); background: #555; border-color: var(--accent-color); }
.selector-item img { width: 100%; height: auto; object-fit: contain; }

.mega-container {
    width: 80%;
    margin: 5px auto;
    text-align: center;
}
.mega-bar-bg {
    background: #444;
    height: 12px;
    border-radius: 6px;
    border: 1px solid #000;
    overflow: hidden;
}
.mega-bar-fill {
    width: 0%; /* 由 JS 控制 */
    height: 100%;
    background: linear-gradient(90deg, #00d2ff, #3a7bd5);
    transition: width 0.3s ease;
}
/* 進化完成後的特殊顏色 */
.mega-bar-fill.mega-full {
    background: linear-gradient(90deg, #ff9d00, #ffd700);
    box-shadow: 0 0 8px #ffcc00;
}
.mega-text {
    font-size: 10px;
    color: #ccc;
    margin-top: 2px;
}

    function renderRegionButtons() {

            const btn = document.createElement('div');

            btn.onclick = () => { if(isUnlocked) switchRegion(index); };
            container.appendChild(btn);
        });

    function isRegionUnlocked(index) {
        if (index === 0) return true;
        // 需通關前一區最後一關

        return gameState.unlocked.includes((REGION_CONFIG[index].range[0]).toString().padStart(3, '0'));
    }

    function switchRegion(index) {
    gameState.currentRegionIdx = index;
    gameState.isHardMode = false; // 強制重置

    // 更新標題
    document.getElementById('region-title').innerText = REGION_CONFIG[index].name + "地區";

    function toggleDifficulty() {
    const currentReg = REGION_CONFIG[gameState.currentRegionIdx];
    // 取得當前地區的最後一關 ID，例如 "151"
    const lastIdOfRegion = currentReg.range[1].toString().padStart(3, '0');
    
    // --- 判定邏輯修正 ---
    // 檢查方式：判定「最後一關」是否已經被「捕獲過」或是「通關次數 > 0」
    // 如果你希望「打贏就算通關」(不一定要抓到)，用 clearCounts 判定最準：
    const clearCount = gameState.clearCounts ? (gameState.clearCounts[lastIdOfRegion] || 0) : 0;
    const isRegionCleared = clearCount > 0;

    // 如果還沒通關
    if (!isRegionCleared) {
        alert(`需先擊敗 ${currentReg.name} 地區的最後一關 (No.${currentReg.range[1]} ${POKEMON_NAMES[currentReg.range[1]-1]}) 方可開啟困難模式！`);
        return;
    }

    // 執行切換
    gameState.isHardMode = !gameState.isHardMode;
    
    // 更新 UI (直接抓 Class，避開 event.target 的不確定性)
    const btn = document.querySelector('.mode-toggle');
    if (btn) {
        btn.innerText = gameState.isHardMode ? "困難" : "普通";

    }
    
    renderMap();
}

        const spriteUrl = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${imgId}.png`;
        
        // --- 2. 建立關卡 DOM 元素 ---

function initBoard() {
    const boardEl = document.getElementById('board');
    boardEl.innerHTML = '';
    
    // 生成 36 個棋子 (隨機從隊伍 4 人中挑選)
    for (let i = 0; i < 36; i++) {
        const randomMemberId = gameState.team[Math.floor(Math.random() * 4)];
        const tileData = { id: i, pokemonId: randomMemberId };
        battleData.board.push(tileData);
        
        const div = document.createElement('div');
        div.className = 'tile';
        div.dataset.index = i;
        div.innerHTML = `<img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${parseInt(randomMemberId)}.png">`;
        
        // 綁定點擊交換邏輯
        div.onclick = () => handleTileClick(i);
        
        boardEl.appendChild(div);
    }
}

function handleTileClick(index) {
    // --- 【強化攔截】敵人已死、步數已滿、或正在結算中，禁止點擊 ---
    if (battleData.currentHP <= 0 || battleData.moves <= 0 || battleData.isEnding) {
        checkBattleEnd(); 
        return;
    }

    const tiles = document.querySelectorAll('.tile');
    
    if (battleData.selectedTile === null) {
        battleData.selectedTile = index;
        tiles[index].classList.add('selected');
    } 
    else if (battleData.selectedTile === index) {
        tiles[index].classList.remove('selected');
        battleData.selectedTile = null;
    } 
    else {
        const firstIndex = battleData.selectedTile;
        
        // 執行交換
        swapTiles(firstIndex, index);
        
        // 清除選取狀態
        tiles[firstIndex].classList.remove('selected');
        battleData.selectedTile = null;
        
        // --- 【修正步數邏輯】 ---
        // 確定交換後扣除步數，並更新 UI
        battleData.moves--;
        updateBattleUI();
        
        // 觸發判定
        checkMatches(); 
        
        // 如果扣完步數剛好歸零，且這波點擊沒造成消除（由 checkMatches 處理結算）
        // 這裡不需要額外補 checkBattleEnd，交給 checkMatches 結尾即可
    }
}


function swapTiles(idx1, idx2) {
    // 陣列數據交換
    const temp = battleData.board[idx1].pokemonId;
    battleData.board[idx1].pokemonId = battleData.board[idx2].pokemonId;
    battleData.board[idx2].pokemonId = temp;
    
    // 畫面更新 (重新渲染兩個格子)
    const tiles = document.querySelectorAll('.tile');
    tiles[idx1].innerHTML = `<img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${parseInt(battleData.board[idx1].pokemonId)}.png">`;
    tiles[idx2].innerHTML = `<img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${parseInt(battleData.board[idx2].pokemonId)}.png">`;
}

function updateBattleUI() {
    const hpPercent = (battleData.currentHP / battleData.maxHP) * 100;
    document.getElementById('enemy-hp-fill').style.width = `${hpPercent}%`;
    document.getElementById('enemy-hp-text').innerText = `HP: ${battleData.currentHP} / ${battleData.maxHP}`;
    document.getElementById('moves-left').innerText = battleData.moves;
}

function closeBattle() {
    document.getElementById('battle-screen').style.display = 'none';
}

function checkMatches() {
    // 每一輪判定開始前，先看敵人倒下沒
    if (battleData.currentHP <= 0) {
        checkBattleEnd();
        return; 
    }

    let board = battleData.board;
    let toMatch = new Set();

    // --- 橫向與縱向掃描 (維持你原本的邏輯) ---
    for (let r = 0; r < 6; r++) {
        for (let c = 0; c < 4; c++) {
            let idx = r * 6 + c;
            let id1 = board[idx].pokemonId;
            let id2 = board[idx + 1].pokemonId;
            let id3 = board[idx + 2].pokemonId;
            if (id1 && id1 === id2 && id1 === id3) {
                toMatch.add(idx); toMatch.add(idx + 1); toMatch.add(idx + 2);
            }
        }
    }
    for (let c = 0; c < 6; c++) {
        for (let r = 0; r < 4; r++) {
            let idx = r * 6 + c;
            let id1 = board[idx].pokemonId;
            let id2 = board[idx + 6].pokemonId;
            let id3 = board[idx + 12].pokemonId;
            if (id1 && id1 === id2 && id1 === id3) {
                toMatch.add(idx); toMatch.add(idx + 6); toMatch.add(idx + 12);
            }
        }
    }

    if (toMatch.size > 0) {
        handleElimination(toMatch);
    } else {
        // --- 【關鍵修正】 Combo 結束時的處理 ---
        battleData.combo = 0;
        const comboEl = document.getElementById('combo-text');
        if (comboEl) comboEl.style.display = 'none';
        
        // 只要不再有消除，就立刻檢查是否結束（輸或贏）
        // 這樣步數到 0 時才會跳出視窗
        checkBattleEnd();
    }
}

}

function handleElimination(matchSet) {
    battleData.combo++;
    const leaderId = gameState.team[0];
    const barFill = document.getElementById('mega-bar-fill');
    
    // --- 1. 核心數據掃描 ---
    const countsPerPkmn = {}; 
    matchSet.forEach(idx => {
        const id = battleData.board[idx].pokemonId;
        if (id) {
            countsPerPkmn[id] = (countsPerPkmn[id] || 0) + 1;
        }
    });

    // --- 2. 針對「隊長」進行 Mega 進度結算 ---
    Object.keys(countsPerPkmn).forEach(pkmnId => {
        const count = countsPerPkmn[pkmnId];
        const pkmnInfo = POKEMON_DATA.find(p => p.id === pkmnId);
        const isIdMatch = parseInt(pkmnId) === parseInt(leaderId);
        const hasItem = gameState.items.includes(`${pkmnId}_mega`);
        const megaCheck = document.getElementById('mega-check');
        const isMegaEnabled = megaCheck ? megaCheck.checked : true;

        if (isIdMatch && isMegaEnabled && hasItem && pkmnInfo?.hasMega && !battleData.isMegaEvolved) {
            battleData.megaProgress += count;
            
            if (barFill) {
                let percent = Math.min((battleData.megaProgress / 15) * 100, 100);
                barFill.style.width = percent + "%";
            }

            if (battleData.megaProgress >= 15) {
                battleData.isMegaEvolved = true;
                if (barFill) barFill.classList.add('mega-full');
                executeMegaImageChange(leaderId);
            }
        }
    });

    // --- 3. 計算總傷害 (已修正：X 與 Y 倍率統一) ---
    let totalDamage = 0;
    Object.keys(countsPerPkmn).forEach(pkmnId => {
        const count = countsPerPkmn[pkmnId];
        const pkmnInfo = POKEMON_DATA.find(p => p.id === pkmnId);
        const isLeader = parseInt(pkmnId) === parseInt(leaderId);
        
        let baseDamage = (pkmnInfo && pkmnInfo.type === "Legendary") ? 70 : 50;
        let formMultiplier = 1.0;

        // 只要是 Mega 狀態下的隊長消除，統一 1.5 倍，不再判斷 X 或 Y
        if (battleData.isMegaEvolved && isLeader) {
            formMultiplier = 1.5; 
        }

        let comboMultiplier = 1 + (battleData.combo - 1) * 0.05;
        totalDamage += (baseDamage * count) * formMultiplier * comboMultiplier;
    });

    battleData.currentHP = Math.max(0, battleData.currentHP - Math.floor(totalDamage));

    // --- 4. UI 更新與視覺效果 ---
    updateBattleUI();
    showCombo();
    
    if (battleData.isMegaEvolved && countsPerPkmn[leaderId]) {
        const comboDiv = document.getElementById('combo-display');
        if (comboDiv) {
            // 避免重複堆疊 MEGA! 字樣
            if (!comboDiv.innerHTML.includes("MEGA!")) {
                comboDiv.innerHTML += ` <span class="mega-tag">MEGA!</span>`;
            }
        }
    }

    const tiles = document.querySelectorAll('.tile');
    matchSet.forEach(idx => {
        tiles[idx].style.opacity = '0';
        battleData.board[idx].pokemonId = null;
    });

    if (battleData.currentHP <= 0) {
        battleData.isEnding = true;
        setTimeout(checkBattleEnd, 500);
    } else {
        setTimeout(refillBoard, 500);
    }
}

function calculateAndApplyDamage(pkmnId, count, pkmnInfo, isLeader) {
    let baseDamage = (pkmnInfo && pkmnInfo.type === "Legendary") ? 70 : 50;
    let formMultiplier = 1.0;

    if (battleData.isMegaEvolved && isLeader) {

function refillBoard() {
    if (battleData.currentHP <= 0) return;
    for (let c = 0; c < 6; c++) {
        let emptySpaces = 0;
        for (let r = 5; r >= 0; r--) {
            let idx = r * 6 + c;
            if (battleData.board[idx].pokemonId === null) {
                emptySpaces++;
            } else if (emptySpaces > 0) {
                battleData.board[idx + emptySpaces * 6].pokemonId = battleData.board[idx].pokemonId;
                battleData.board[idx].pokemonId = null;
            }
        }
        for (let r = 0; r < emptySpaces; r++) {
            battleData.board[r * 6 + c].pokemonId = gameState.team[Math.floor(Math.random() * 4)];
        }
    }

    renderBoard();

    // 觸發天降判定，讓 checkMatches 重新判斷狀態
    setTimeout(() => {
        checkMatches();
    }, 300);
}

// 戰鬥結束時調用
function handleBattleWin() {
    const p = POKEMON_DATA.find(x => x.id === gameState.lastPlayed);
    const isLegendary = (p.type === "Legendary");
    const useKey = document.getElementById('use-key').checked;

    // 定義一個「繼續執行」的內部函式，避免重複代碼
    const proceed = () => {
        // 規則 1: 傳說寶可夢必須有鑰匙
        if (isLegendary && !useKey) {
            alert("通關成功！但未開啟傳說之鑰，寶可夢直接離開了。");
            closeBattle();
            return;
        }

        // 規則 2: 公式計算
        let bonusRate = battleData.moves * 5;
        currentCatchRate = 15 + bonusRate;
        if (currentCatchRate > 100) currentCatchRate = 100;

        // 消耗資源
        if (isLegendary && useKey) {
            gameState.keys--;
        }

        save();
        updateStatusBar(); 
        openCatchUI(p, bonusRate);
    };

    // --- 核心修改：判斷是否發放字卡獎勵 ---
    if (gameState.isHardMode && p.isChampion) {
        gameState.keys++; // 先在後台加鑰匙
        showVictoryCard(proceed); // 顯示字卡，點擊後執行 proceed
    } else {
        proceed(); // 不是冠軍，直接繼續
    }
}

function openMemberSelector(slotIndex) {
    currentSelectingSlot = slotIndex;

    // 取得所有已捕獲的寶可夢

        container.innerHTML = '<p style="grid-column: span 4; color: #888;">尚未捕獲任何寶可夢</p>';
    } else {
        // 將已獲得的 ID 轉為詳細資料並排序 (可以按編號排)
        const availablePkmn = gameState.captured.map(id => POKEMON_DATA.find(p => p.id === id)).filter(p => p);

        availablePkmn.forEach(p => {
            const isAlreadyInTeam = gameState.team.includes(p.id);
            const spriteUrl = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${parseInt(p.id)}.png`;
            
            // 檢查這隻寶可夢是否具備 Mega 潛力
            const megaIcon = p.hasMega ?

                     onmouseover="${isAlreadyInTeam ? '' : "this.style.borderColor='#ffcc00'; this.style.transform='scale(1.05)'"}"

function updateStamina() {
    const now = Date.now();
    const wait = 30 * 60 * 1000; // 30 分鐘
    
    // 邏輯處理：檢查是否過了一個週期
    if (gameState.stamina < 10) {
        const diff = now - gameState.lastUpdate;
        if (diff >= wait) {
            // 計算過了幾個 30 分鐘 (防止掛機太久沒領)
            const gained = Math.floor(diff / wait);
            gameState.stamina = Math.min(10, gameState.stamina + gained);
            gameState.lastUpdate += gained * wait;
            save();
        }
    } else {
        // 如果體力全滿，保持最後更新時間為現在，避免滿體力後掉 1 滴又要等 30 分
        gameState.lastUpdate = now;
    }

    // UI 處理：呼叫統一的渲染函式
    updateStatusBar();
}

function updateStatusBar() {
    // 計算剩餘倒數秒數
    const now = Date.now();
    const wait = 30 * 60 * 1000;
    const remaining = gameState.stamina < 10 ? Math.ceil((wait - (now - gameState.lastUpdate)) / 1000) : 0;

    // 更新體力數字
    document.getElementById('ui-stamina').innerText = `${gameState.stamina}/10`;
    
    // 更新倒數計時器
    document.getElementById('ui-timer').innerText = remaining > 0 ? 
        `${Math.floor(remaining/60).toString().padStart(2,'0')}:${(remaining%60).toString().padStart(2,'0')}` : "MAX";
    
    // 更新圖鑑與金鑰
    document.getElementById('ui-dex').innerText = `${gameState.captured.length}/721`;
    document.getElementById('ui-keys').innerText = gameState.keys;
}
    function scrollToLastPlayed() {

        if (target) target.scrollIntoView({ block: 'center' });
    }

    let scrollInterval;

        const container = document.getElementById('map-container');
        scrollInterval = setInterval(() => { container.scrollTop += dir * 12; }, 16);
    }
    function stopScroll() { clearInterval(scrollInterval); }

    function save() { localStorage.setItem('SHUFFLE_WEB_SAVE', JSON.stringify(gameState)); }

    window.onload = init;

    /** 顯示/隱藏設置界面並更新容量資訊 **/
function toggleSettings(show) {
    const overlay = document.getElementById('settings-overlay');
    overlay.style.display = show ? 'flex' : 'none';
    if (show) {
        updateStorageStatus();
    }
}

/** 計算儲存空間消耗百分比 **/
function updateStorageStatus() {
    let totalUsed = 0;
    // 計算 localStorage 中所有 key 的總長度
    for (let key in localStorage) {
        if (localStorage.hasOwnProperty(key)) {
            totalUsed += (localStorage[key].length + key.length) * 2; // UTF-16 佔 2 bytes
        }
    }

    const usedMB = (totalUsed / (1024 * 1024)).toFixed(2);
    const limitMB = 5.00; // 瀏覽器 localStorage 限制通常為 5MB
    const percent = ((usedMB / limitMB) * 100).toFixed(1);

    document.getElementById('storage-bar').style.width = `${percent}%`;
    document.getElementById('storage-text').innerText = `${usedMB} / ${limitMB} MB (${percent}%)`;
    
    // 如果快爆了，改變顏色提醒
    document.getElementById('storage-bar').style.background = percent > 80 ? "#ff5555" : "#ffcc00";
}

/** 手動導出 JSON 存檔檔案 **/
function manualSave() {
    const dataStr = JSON.stringify(gameState);
    const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);
    
    const exportFileDefaultName = `Shuffle_Save_${new Date().toISOString().slice(0,10)}.json`;

    const linkElement = document.createElement('a');
    linkElement.setAttribute('href', dataUri);
    linkElement.setAttribute('download', exportFileDefaultName);
    linkElement.click();
    alert("存檔檔案已下載至您的設備。");
}

/** 手動讀取 JSON 存檔檔案 **/
function manualLoad() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';

    input.onchange = e => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.readAsText(file, 'UTF-8');

        reader.onload = readerEvent => {
            try {
                const content = JSON.parse(readerEvent.target.result);
                // 簡單驗證是否為本遊戲存檔 (檢查是否有 captured 欄位)
                if (content.captured && content.unlocked) {
                    if (confirm("確定要蓋過目前的進度嗎？讀取後遊戲將重新整理。")) {
                        localStorage.setItem('SHUFFLE_WEB_SAVE', JSON.stringify(content));
                        location.reload(); // 重新整理以載入新數據
                    }
                } else {
                    alert("無效的存檔檔案格式！");
                }
            } catch (err) {
                alert("讀取失敗：檔案格式錯誤。");
            }
        };
    };
    input.click();
}
