<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PokeShuffle Web - SHUFFLE-WEB-2026</title>
    <style>

    :root {
    --status-height: 90px;
    --sidebar-width: 85px;
    --accent-color: #ffcc00;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
}

body {
    font-family: 'PingFang TC', 'Microsoft JhengHei', 'Arial', sans-serif;
    margin: 0;
    background: #1a1a1a;
    color: white;
    overflow: hidden;
    height: 100vh;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
}

@media screen and (max-width: 600px) {

#status-bar {
    position: fixed;
    top: 0; 
    left: 0; 
    width: 100%;
    /* 增加一點高度確保容納兩行，約 60px-70px */
    height: auto; 
    min-height: 60px; 
    padding: var(--safe-top) 50px 5px 10px; /* 右邊留 50px 給齒輪 */
    background: rgba(0, 0, 0, 0.95);
    display: flex;
    flex-direction: column;
    justify-content: space-around; /* 讓兩行均勻分布 */
    align-items: stretch; /* 讓子元素撐開到 100% 寬 */
    z-index: 100;
    border-bottom: 2px solid var(--accent-color);
    box-sizing: border-box;
}

.status-row { 
    display: flex; 
    justify-content: space-between; /* 讓資訊分開到左右兩端 */
    align-items: center;
    width: 100%; 
    padding: 0 10px; /* 留一點左右內距，不要貼死邊緣 */
    margin-bottom: 2px; /* 縮小間距，省點空間 */
    box-sizing: border-box;
}

#sidebar {
    position: fixed;
    left: 0;
    /* 確保從狀態欄下方開始 */
    top: 80px; /* 直接給個估計值或確定的狀態欄高度 */
    bottom: 0;
    width: 70px; /* 手機版建議窄一點 */
    background: rgba(34, 34, 34, 0.9); /* 微透明更有質感 */
    overflow-y: auto;
    border-right: 1px solid #444;
    z-index: 90;
    scrollbar-width: none;
}
#sidebar::-webkit-scrollbar { display: none; }

.side-btn {
    padding: 15px 5px; /* 減少上下高度，讓手機畫面一次能看到更多地區 */
    text-align: center;
    font-size: 11px; /* 字體縮小一點點 */
    cursor: pointer;
    border-bottom: 1px solid #333;
    color: #bbb; /* 稍微亮一點，手機比較好讀 */
    touch-action: manipulation;
}
.side-btn.active { background: var(--accent-color); color: black; font-weight: bold; }
.side-btn.unlocked { color: white; }

#map-container {
    margin-left: 70px; /* 必須等於 sidebar 的寬度 */
    margin-top: 65px;  /* 必須等於 status-bar 的高度 */
    /* 使用動態高度，扣掉頂部高度 */
    height: calc(100vh - 65px); 
    overflow-y: scroll;
    background: #1a1a1a; /* 稍微深一點，跟側邊欄區分 */
    position: relative;
    scroll-behavior: smooth;
}

#stage-list {
    display: flex;
    flex-direction: column-reverse; 
    padding: 15px;
    /* 關鍵：增加頂部內邊距，把最上面的內容推下來，不被橫幅擋住 */
    padding-top: 100px; 
    padding-bottom: 100px;
    min-height: 100%;
    overflow-y: auto;
    align-items: center;
}

/* 1. 外部容器：統一長度與佈局 */
.stage-item {
    position: relative;
    background: #444;
    margin: 10px 0;
    padding: 10px; /* 稍微縮小內邊距以適應 320px 寬度 */
    border-radius: 16px;
    display: flex;
    align-items: center;
    border: 2px solid transparent;
    transition: all 0.2s;
    cursor: pointer;
    box-sizing: border-box;

    /* --- 新增：鎖定長度 --- */
    width: 320px;       /* 統一所有關卡長度 */
    flex-shrink: 0;     /* 防止被 FlexBox 壓縮 */
}

#settings-trigger {
    position: fixed;
    top: 5px; 
    right: 5px; 
    z-index: 101; /* 必須大於 status-bar 的 100 */
    background: rgba(0,0,0,0.3);
    border-radius: 5px;
    padding: 2px;
}
}
/* 2. 圖示：保留你的圓形背景與大小設定 */
.pkmn-icon {
    width: 55px; 
    height: 55px; 
    margin: 0 10px;
    object-fit: contain;
    background: rgba(255, 255, 255, 0.1); /* 你的半透明白背景 */
    border-radius: 50%;                  /* 你的圓形外觀 */
    flex-shrink: 0;
}

/* 3. 名字：保留你的粗體設定，並增加防止溢出處理 */
.stage-name { 
    font-size: 16px; 
    font-weight: bold; 
    white-space: nowrap;    /* 防止名字換行 */
    overflow: hidden;       /* 隱藏超出部分 */
    text-overflow: ellipsis; /* 太長顯示 ... */
}

/* 4. 輔助資訊 (No.151 那個數字) */
.stage-no {
    font-size: 12px;
    color: #aaa;
    margin-right: 5px;
}

.stage-item.locked { opacity: 0.5; filter: grayscale(1); pointer-events: none; }
.stage-item.current { border-color: var(--accent-color); background: #505050; }
.stage-item:active { transform: scale(0.97); background: #555; }

/* Mega 進化石圖示 - 修正版 */
.mega-stone-icon {
    position: absolute;
    top: -8px;
    right: -8px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    /* 確保元素一定會顯示 */
    display: block !important; 
    background-size: 24px; /* 固定圖片大小，確保在 32px 的圓圈內居中 */
    background-position: center;
    background-repeat: no-repeat;
    z-index: 50;
    transition: all 0.3s ease;
}

/* 狀態：尚未獲得 */
.mega-stone-icon.not-owned {
    background-color: #333;
    border: 2px solid #666;
    filter: grayscale(1) brightness(0.6);
    box-shadow: 0 2px 5px rgba(0,0,0,0.5);
}

/* 狀態：已獲得 */
.mega-stone-icon.owned {
    background-color: #222;
    border: 2px solid var(--accent-color);
    box-shadow: 0 0 10px rgba(255, 204, 0, 0.7);
    filter: grayscale(0) brightness(1.1);
    animation: mega-stone-glow 2s infinite alternate;
}

@keyframes mega-stone-glow {
    from { box-shadow: 0 0 5px rgba(255, 204, 0, 0.5); transform: scale(1); }
    to { box-shadow: 0 0 15px rgba(255, 204, 0, 0.9); transform: scale(1.1); }
}



.stage-info { flex: 1; display: flex; flex-direction: column; pointer-events: none; }
.stage-no { font-size: 11px; color: #bbb; }


#nav-arrows {
    position: fixed;
    right: 15px; /* 靠右一點 */
    bottom: 25px;
    display: flex;
    flex-direction: column;
    gap: 10px; /* 縮短箭頭距離 */
    z-index: 100;
}

.arrow-btn {
    background: rgba(0, 0, 0, 0.5); /* 半透明背景 */
    width: 40px;
    height: 40px;
    border-radius: 50%; /* 圓形比較像手遊 */
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid #666;
}

.ball-icon {
    width: 20px; height: 20px;
    background: #555;
    border-radius: 50%;
    border: 2px solid #333;
    position: relative;
}
.ball-icon.captured { background: linear-gradient(to bottom, #ff4444 50%, white 50%); border-color: #000; }
.ball-icon.captured::after {
    content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 6px; height: 6px; background: white; border: 2px solid #333; border-radius: 50%;
}

.overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.9); display: none;
    justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(5px);
}

.card {
    background: #2c2c2c; color: white; padding: 20px; border-radius: 20px;
    border: 2px solid #444; width: 90%; max-width: 400px;
    display: flex; flex-direction: column; align-items: center;
}

#pokemon-list-container {
    /* 移除 display: grid */
    width: 100%;
    margin: 15px 0;
    color: #fff;
    /* 確保容器可以根據內容自動撐開高度 */
    min-height: 300px; 
}
/* 這是包裹 20 個寶可夢格子的網格 */
.selector-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    width: 100%;
}

.selector-item {
    position: relative; /* 為了讓 Mega 的 M 標籤定位 */
    background: #3d3d3d;
    border-radius: 12px;
    padding: 8px; /* 稍微增加一點內邊距 */
    text-align: center;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.2s;
}

/* 保留你原本的按壓特效，並增加選中感 */
.selector-item:active { 
    transform: scale(0.95); 
    background: #555; 
}

.selector-item img { 
    width: 60px; /* 固定寬度，防止圖片大小不一導致排版歪掉 */
    height: 60px; 
    object-fit: contain; 
}

/* 移除點擊後的預設外框 */
.selector-item, .tile-class, button {
    outline: none !important;
}

/* 如果是行動端，也建議移除點擊時的高亮灰色區塊 */
* {
    -webkit-tap-highlight-color: transparent;
}

/* 地區按鈕與分頁按鈕的通用樣式 */
#pokemon-list-container button {
    background: #444;
    color: white;
    border: none;
    border-radius: 4px;
    padding: 6px 10px;
    cursor: pointer;
    font-size: 12px;
    transition: background 0.2s;
}

#pokemon-list-container button:hover {
    background: #666;
}

#pokemon-list-container button:disabled {
    background: #222;
    color: #666;
    cursor: not-allowed;
}

.mega-container {
    width: 80%;
    margin: 5px auto;
    text-align: center;
}
.mega-bar-bg {
    background: #444;
    height: 12px;
    border-radius: 6px;
    border: 1px solid #000;
    overflow: hidden;
}
.mega-bar-fill {
    width: 0%; /* 由 JS 控制 */
    height: 100%;
    background: linear-gradient(90deg, #00d2ff, #3a7bd5);
    transition: width 0.3s ease;
}
/* 進化完成後的特殊顏色 */
.mega-bar-fill.mega-full {
    background: linear-gradient(90deg, #ff9d00, #ffd700);
    box-shadow: 0 0 8px #ffcc00;
}
.mega-text {
    font-size: 10px;
    color: #ccc;
    margin-top: 2px;
}
/* 讓返回按鈕在滑鼠移上去時稍微變亮 */
.side-btn[style*="background: rgb(68, 68, 68)"]:hover {
    background: #555 !important;
    filter: brightness(1.2);
}

/* 點擊時的縮小效果 */
.side-btn:active {
    transform: scale(0.95);
    transition: transform 0.1s;
}

/* 確保 hr 分隔線在深色背景下看得到 */
#region-btns hr {
    opacity: 0.5;
}

/* 棋盤震動效果 */
.skill-shake {
    animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
}

@keyframes shake {
    10%, 90% { transform: translate3d(-1px, 0, 0); }
    20%, 80% { transform: translate3d(2px, 0, 0); }
    30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
    40%, 60% { transform: translate3d(4px, 0, 0); }
}

/* 技能標籤樣式 */
.skill-toast {
    position: fixed;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0, 0, 0, 0.8);
    color: #fff;
    padding: 15px 30px;
    border-radius: 50px;
    border: 2px solid #ffcb05; /* 寶可夢金色 */
    font-size: 24px;
    font-weight: bold;
    z-index: 9999;
    animation: toast-in-out 0.8s ease forwards;
    pointer-events: none;
    text-shadow: 0 0 10px rgba(255, 203, 5, 0.5);
}

@keyframes toast-in-out {
    0% { transform: translate(-50%, -30%); opacity: 0; }
    20% { transform: translate(-50%, -50%); opacity: 1; }
    80% { transform: translate(-50%, -50%); opacity: 1; }
    100% { transform: translate(-50%, -70%); opacity: 0; }
}

.mega-badge {
    position: absolute;
    top: 2px;
    right: 2px;
    background: #ffcc00;
    color: #000;
    font-size: 9px;
    padding: 1px 4px;
    border-radius: 3px;
    font-weight: bold;
    z-index: 1;
}

/* 美化捲動內容區 */
#prep-scroll-content::-webkit-scrollbar {
    width: 4px;
}
#prep-scroll-content::-webkit-scrollbar-track {
    background: rgba(0, 0, 0, 0.2);
    border-radius: 10px;
}
#prep-scroll-content::-webkit-scrollbar-thumb {
    background: #555;
    border-radius: 10px;
}
#prep-scroll-content::-webkit-scrollbar-thumb:hover {
    background: var(--accent-color);
}
        
    </style>

        <div class="status-row">
            <span id="region-title">關都</span>

            <span>🔑: <b id="ui-keys">0</b></span>
        </div>
        <div class="status-row">
            <span>❤️ <b id="ui-stamina">10/10</b></span>
            <span id="ui-timer">00:00</span>
        </div>
    </div>

        <div class="side-btn mode-toggle" onclick="toggleDifficulty()">普通</div>
        <div id="region-btns">
            </div>

    <div id="map-container">
        <div id="stage-list"></div>
    </div>

    <div id="nav-arrows">
        <div class="arrow-btn" onmousedown="startScroll(-1)" onmouseup="stopScroll()" ontouchstart="startScroll(-1)" ontouchend="stopScroll()">↑</div>
        <div class="arrow-btn" onmousedown="startScroll(1)" onmouseup="stopScroll()" ontouchstart="startScroll(1)" ontouchend="stopScroll()">↓</div>
    </div>

<div id="settings-trigger" onclick="toggleSettings(true)" style="position:fixed; top:10px; right:10px; cursor:pointer; font-size:24px; z-index:100;">⚙️</div>
   

<script>
    /** 地區配置 **/
    const REGION_CONFIG = [
        { name: "關都", range: [1, 151], id: "kanto" },
        { name: "城都", range: [152, 251], id: "johto" },
        { name: "豐緣", range: [252, 386], id: "hoenn" },
        { name: "神奧", range: [387, 493], id: "sinnoh" },
        { name: "合眾", range: [494, 649], id: "unova" },
        { name: "卡洛斯", range: [650, 721], id: "kalos" },
        { name: "阿羅拉", range: [722, 802], id: "alola" },
        { name: "皮卡丘", range: [803, 817], id: "pika" },
        { name: "閃光", range: [818, 831], id: "shiny" }
    ];



    const MEGA_SKILL_DATABASE = {
    "搖手指": {
        name: "搖手指",
        logic: (p, context) => {
            // 1. 定義可能抽中的技能池 (這裡的名稱必須跟下方的 Key 完全一致)
            const pool = ["根源波動", "斷崖之劍", "地震", "大字爆炎", "畫龍點睛", "異次元洞", "千萬伏特"];
            const randomKey = pool[Math.floor(Math.random() * pool.length)];
            const targetSkill = MEGA_SKILL_DATABASE[randomKey];

            console.log(`搖手指發動了：${randomKey}`);
            
            // 2. 執行抽中的技能
            if (["根源波動", "斷崖之劍", "地震"].includes(randomKey)) {
                // 從 context 中傳入的 leaderPositions 抓第一個點作為中心
                const fallbackP = (context.leaderPositions && context.leaderPositions.length > 0) 
                                  ? context.leaderPositions[0] 
                                  : { x: 2, y: 2 };
                targetSkill.logic(fallbackP, context);
            } else {
                targetSkill.logic(null, context);
            }
        }
    },
    "根源波動": {
        name: "根源波動",
        region: "關都",
        logic: (p, ctx) => {
            // 橫向消除
            for (let c = 0; c < ctx.COLS; c++) ctx.matches.add(p.y * ctx.COLS + c);
        }
    },
    "斷崖之劍": {
        name: "斷崖之劍",
        region: "城都",
        logic: (p, ctx) => {
            // 縱向消除
            for (let r = 0; r < ctx.ROWS; r++) ctx.matches.add(r * ctx.COLS + p.x);
        }
    },
    "地震": {
        name: "地震",
        region: "豐緣",
        logic: (p, ctx) => {
            // 周圍爆破
            for (let r = -1; r <= 1; r++) {
                for (let c = -1; c <= 1; c++) {
                    let nr = p.y + r, nc = p.x + c;
                    if (nr >= 0 && nr < ctx.ROWS && nc >= 0 && nc < ctx.COLS) {
                        ctx.matches.add(nr * ctx.COLS + nc);
                    }
                }
            }
        }
    },
    "大字爆炎": {
        name: "大字爆炎",
        region: "神奧",
        logic: (p, ctx) => {
            // 大X型消除
            for (let i = 0; i < ctx.ROWS; i++) {
                ctx.matches.add(i * ctx.COLS + i);
                ctx.matches.add(i * ctx.COLS + (ctx.COLS - 1 - i));
            }
        }
    },
    "畫龍點睛": {
        name: "畫龍點睛",
        region: "合眾",
        logic: (p, ctx) => {
            // 隊長全清
            ctx.board.forEach((tile, idx) => {
                if (parseInt(tile.pokemonId) === parseInt(ctx.leaderId)) ctx.matches.add(idx);
            });
        }
    },
    "異次元洞": {
        name: "異次元洞",
        region: "卡洛斯",
        logic: (p, ctx) => {
            // 再來一次 (洗牌)
            battleData.triggerBoardReset = true;
        }
    },
    "千萬伏特": {
    name: "千萬伏特",
    region: "阿羅拉",
    logic: (p, ctx) => {
        const rows = ctx.ROWS;
        const cols = ctx.COLS;
        let allValidPos = [];

        // 1. 收集盤面上所有「非空」且「尚未被加入消除名單」的座標
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const idx = r * cols + c;
                // 檢查是否已經在本次 matchSet 中，若不在則列入可炸毀目標
                if (ctx.board[idx] && !ctx.matches.has(idx.toString())) {
                    allValidPos.push(idx);
                }
            }
        }

        // 2. 隨機洗牌可消除位置
        allValidPos.sort(() => Math.random() - 0.5);

        // 3. 取出前 10 個並加入消除名單 (ctx.matches)
        const count = Math.min(allValidPos.length, 10);
        for (let i = 0; i < count; i++) {
            const targetIdx = allValidPos[i];
            // 這裡直接將索引加入 matchSet，後續系統會處理消除
            ctx.matches.add(targetIdx.toString());
        }

        console.log(`⚡️ 千萬伏特：額外擊碎了 ${count} 個方塊！`);
    }
}
};

    function isRegionUnlocked(index) {
        if (index === 0) return true;
        // 需通關前一區最後一關
        const prevRegionLastId = REGION_CONFIG[index-1].range[1].toString().padStart(3, '0');
        return gameState.unlocked.includes((REGION_CONFIG[index].range[0]).toString().padStart(3, '0'));
    }

    function switchRegion(index) {
    gameState.currentRegionIdx = index;
    const currentReg = REGION_CONFIG[index];

    // --- 【新增】安全檢查：檢查新地區是否已全通 ---
    let isAllCleared = true;
    for (let i = currentReg.range[0]; i <= currentReg.range[1]; i++) {
        const stageId = i.toString().padStart(3, '0');
        const clearCount = gameState.clearCounts ? (gameState.clearCounts[stageId] || 0) : 0;
        if (clearCount === 0) {
            isAllCleared = false;
            break;
        }
    }

    // 如果目前是困難模式，但新地區還沒全通，就強制切回普通模式
    if (gameState.isHardMode && !isAllCleared) {
        gameState.isHardMode = false;
        console.log(`偵測到 ${currentReg.name} 尚未全通，已自動重設為普通模式。`);
    }
    // --------------------------------------------

    // 更新標題
    const titleEl = document.getElementById('region-title');
    if (titleEl) titleEl.innerText = currentReg.name ;
    
    // 更新按鈕文字與樣式（確保 UI 反映目前的 gameState.isHardMode）
    const btn = document.querySelector('.mode-toggle');
    if (btn) {
        btn.innerText = gameState.isHardMode ? "困難" : "普通";
        btn.style.background = gameState.isHardMode ? "#721c24" : ""; 
        btn.style.color = gameState.isHardMode ? "#f8d7da" : "";
        
        if (gameState.isHardMode) {
            btn.classList.add('active');
        } else {
            btn.classList.remove('active');
        }
    }

    renderRegionButtons();
    renderMap();
    save();
}

    function toggleDifficulty() {
    // 取得當前地區編號
    const currentRegIdx = gameState.currentRegionIdx;
    
    // 如果地區索引超過 (假設是 )，則不允許開啟
    // 或者判斷起始 ID 是否 > 802
    if (REGION_CONFIG[currentRegIdx].range[0] > 802) {
        alert("該地區尚未開放困難模式（四天王挑戰）！");
        return;
    }

    const currentReg = REGION_CONFIG[currentRegIdx];
    // --- 判定邏輯：檢查該地區「所有關卡」是否都通關過 ---
    let isAllCleared = true;
    for (let i = currentReg.range[0]; i <= currentReg.range[1]; i++) {
        const stageId = i.toString().padStart(3, '0');
        const clearCount = gameState.clearCounts ? (gameState.clearCounts[stageId] || 0) : 0;
        
        if (clearCount === 0) {
            isAllCleared = false;
            break; // 只要有一關沒過，就不用再查了
        }
    }

    // 如果沒有全數通關
    if (!isAllCleared) {
        alert(`需先通關 ${currentReg.name} 地區的「所有」普通關卡方可開啟困難模式！`);
        return;
    }

    // 執行切換
    gameState.isHardMode = !gameState.isHardMode;
    
    // 更新 UI 樣式
    const btn = document.querySelector('.mode-toggle');
    if (btn) {
        btn.innerText = gameState.isHardMode ? "困難" : "普通";
        btn.style.background = gameState.isHardMode ? "#721c24" : ""; 
        btn.style.color = gameState.isHardMode ? "#f8d7da" : "";
        
        // 切換時根據模式加上或移除 active class (如果有對應 CSS 的話)
        if (gameState.isHardMode) btn.classList.add('active');
        else btn.classList.remove('active');
    }
    
    renderMap();
    save(); // 建議切換後存檔，避免重整後跳回普通模式
}

function getMegaIconHtml(p) {
    if (!p.hasMega) return '';
    
    // 這裡完全是你原本的判定邏輯
    const hasStone = gameState.items.some(item => 
        item === `${p.id}_mega` || item === `${p.id}_mega_x` || item === `${p.id}_mega_y`
    );
    
    const keyStoneUrl = `https://raw.githubusercontent.com/msikma/pokesprite/master/items/key-item/key-stone.png`;
    
    return `
        <div class="mega-stone-icon ${hasStone ? 'owned' : 'not-owned'}" 
             style="background-image: url('${keyStoneUrl}');">
        </div>
    `;
}

        const randomMemberId = gameState.team[Math.floor(Math.random() * gameState.team.length)];
        
        // 儲存邏輯數據
        const tileData = { id: i, pokemonId: randomMemberId };
        battleData.board.push(tileData);
        
        // 建立前端元件
        const div = document.createElement('div');
        div.className = 'tile';
        div.dataset.index = i;

        // --- 優化點：呼叫 getTileImageUrl 確保網址與進化狀態同步 ---
        div.innerHTML = `<img src="${getTileImageUrl(randomMemberId)}">`;
        
        // 綁定點擊交換邏輯
        div.onclick = () => handleTileClick(i);
        
        boardEl.appendChild(div);
    }
}

function handleTileClick(index) {
    // --- 【強化攔截】敵人已死、步數已滿、或正在結算中，禁止點擊 ---
    if (battleData.currentHP <= 0 || battleData.moves <= 0 || battleData.isEnding) {
        checkBattleEnd(); 
        return;
    }

    const tiles = document.querySelectorAll('.tile');
    
    if (battleData.selectedTile === null) {
        battleData.selectedTile = index;
        tiles[index].classList.add('selected');
    } 
    else if (battleData.selectedTile === index) {
        tiles[index].classList.remove('selected');
        battleData.selectedTile = null;
    } 
    else {
        const firstIndex = battleData.selectedTile;
        
        // 執行交換
        swapTiles(firstIndex, index);
        
        // 清除選取狀態
        tiles[firstIndex].classList.remove('selected');
        battleData.selectedTile = null;
        
        // --- 【修正步數邏輯】 ---
        // 確定交換後扣除步數，並更新 UI
        battleData.moves--;
        updateBattleUI();
        
        // 觸發判定
        checkMatches(); 
        
        // 如果扣完步數剛好歸零，且這波點擊沒造成消除（由 checkMatches 處理結算）
        // 這裡不需要額外補 checkBattleEnd，交給 checkMatches 結尾即可
    }
}


function swapTiles(idx1, idx2) {
    // 1. 陣列數據交換 (這部分你原本的寫法是對的)
    const temp = battleData.board[idx1].pokemonId;
    battleData.board[idx1].pokemonId = battleData.board[idx2].pokemonId;
    battleData.board[idx2].pokemonId = temp;
    
    // 2. 取得新的 ID 數據
    const id1 = battleData.board[idx1].pokemonId;
    const id2 = battleData.board[idx2].pokemonId;

    // 3. 畫面更新 (重新渲染兩個格子)
    const tiles = document.querySelectorAll('.tile');

    // --- 修正重點：將 p.id 改成 id1 與 id2 ---
    // 同時加入 Mega 判斷，確保交換後如果是 Mega 隊長，圖片不會變回普通版
    tiles[idx1].innerHTML = `<img src="${getTileImageUrl(id1)}">`;
    tiles[idx2].innerHTML = `<img src="${getTileImageUrl(id2)}">`;
}

// 建議額外加上這個輔助函式，統一管理棋盤圖片路徑，避免以後又要改整串網址
function getTileImageUrl(pokemonId) {
    if (!pokemonId) return "";
    
    const leaderId = gameState.team[0];
    
    // 檢查這顆方塊是否就是隊長，且目前處於 Mega 狀態
    if (battleData.isMegaEvolved && String(pokemonId) === String(leaderId)) {
        
        // 【關鍵】確保這裡抓到的 branch 是玩家在戰前準備畫面選的那一個
        // 優先順序：戰鬥中選擇的分支 > 全域暫存分支 > 預設 X
        const branch = battleData.selectedMegaBranch || gameState.currentMegaBranch || 'X';

function updateBattleUI() {

    document.getElementById('enemy-hp-fill').style.width = `${hpPercent}%`;

    document.getElementById('battle-screen').style.display = 'none';
}

function checkMatches() {
    // 每一輪判定開始前，先看敵人倒下沒
    if (battleData.currentHP <= 0) {
        checkBattleEnd();
        return; 
    }

    let board = battleData.board;
    let toMatch = new Set();
    let currentTurnMatches = 0; // 新增：用來記錄這一輪同時消除了幾組

    // --- 橫向與縱向掃描 (維持你原本的邏輯) ---
    for (let r = 0; r < 6; r++) {
        for (let c = 0; c < 4; c++) {
            let idx = r * 6 + c;
            let id1 = board[idx].pokemonId;
            let id2 = board[idx + 1].pokemonId;
            let id3 = board[idx + 2].pokemonId;
            if (id1 && id1 === id2 && id1 === id3) {
                toMatch.add(idx); toMatch.add(idx + 1); toMatch.add(idx + 2);
                currentTurnMatches++; // 發現一組橫向連線
            }
        }
    }
    for (let c = 0; c < 6; c++) {
        for (let r = 0; r < 4; r++) {
            let idx = r * 6 + c;
            let id1 = board[idx].pokemonId;
            let id2 = board[idx + 6].pokemonId;
            let id3 = board[idx + 12].pokemonId;
            if (id1 && id1 === id2 && id1 === id3) {
                toMatch.add(idx); toMatch.add(idx + 6); toMatch.add(idx + 12);
                currentTurnMatches++; // 發現一組縱向連線
            }
        }
    }

    if (toMatch.size > 0) {
        handleElimination(toMatch, currentTurnMatches);
    } else {
        // --- 【關鍵修正】 Combo 結束時的處理 ---
        battleData.combo = 0;
        const comboEl = document.getElementById('combo-text');
        if (comboEl) comboEl.style.display = 'none';
        
        // 只要不再有消除，就立刻檢查是否結束（輸或贏）
        // 這樣步數到 0 時才會跳出視窗
        checkBattleEnd();
    }
}

// 取得自定義 Mega 圖片網址的公式
function getMegaSpriteUrl(pokemonId, branch = 'X') {
    // 指向你自己的 GitHub 圖片庫
    const baseUrl = "https://paulie0102-bear.github.io/Bear/shuffle/";
    
    // 確保 ID 是補零後的字串 (例如 "006")
    const formattedId = pokemonId.toString().padStart(3, '0');
    
    // 定義哪些 ID 擁有雙形態 (X/Y)
    // 包含：噴火龍(6)、超夢(150)、酋雷姆(646)
    const dualForms = ["006", "150", "646", "818", "822"];
    
    let fileName = "";

    if (dualForms.includes(formattedId)) {
        // 雙狀態處理 (例如：006-mega-x.png, 646-mega-y.png)
        const suffix = branch.toLowerCase(); // 轉成小寫 x 或 y
        fileName = `${formattedId}-mega-${suffix}.png`;
    } else {
        // 一般 Mega / 原始回歸 / 小智忍蛙 (例如：003-mega.png)
        fileName = `${formattedId}-mega.png`;
    }

    return `${baseUrl}${fileName}`;
}

function applyMegaSkill(matchSet, leaderId) {
    if (!battleData.isMegaEvolved) return;

    // 取得發動位置
    let leaderPositions = [];
    matchSet.forEach(idx => {
        if (parseInt(battleData.board[idx].pokemonId) === parseInt(leaderId)) {
            leaderPositions.push({ x: idx % 6, y: Math.floor(idx / 6) });
        }
    });

    if (leaderPositions.length === 0) return;

    // --- 【修改重點：從讀取進度改為讀取「當前裝備」】 ---
    // 優先使用玩家在準備畫面選定的技能，若無則預設為搖手指
    const skillKey = gameState.currentSkillKey || "搖手指";
    const skill = MEGA_SKILL_DATABASE[skillKey];

    // 如果剛好選到的技能還沒解鎖（安全性檢查），則強制回退到搖手指
    const skillIdx = REGION_SKILL_MAP.indexOf(skillKey);
    if (skillIdx > (gameState.unlockedSkillIdx || 0)) {
        console.warn("嘗試使用未解鎖技能，回退至搖手指");
        applyMegaSkillWithKey("搖手指", matchSet, leaderId); // 或是直接在這裡處理
        return;
    }
    // --------------------------------------------------

    // 播放震動與文字特效
    playSkillEffect();

    const context = { matches: matchSet, COLS: 6, ROWS: 6, board: battleData.board, leaderId: leaderId };

    // 這些是「全域型技能」，不需要根據每個方塊位置重複執行的
    const globalSkills = ["搖手指", "大X型消除", "隊長全清", "再來一次", "千萬伏特"];

    if (globalSkills.includes(skillKey)) {
        // 全域技能：只執行一次邏輯
        skill.logic(null, context);
    } else {
        // 位置型技能：針對每個消除的隊長方塊位置執行（如地震、十字消除）
        leaderPositions.forEach(p => skill.logic(p, context));
        }
}

function handleElimination(matchSet, matchCount = 1) {
    // 以前是 battleData.combo++; 
    // 現在改為根據連線組數累加
    battleData.combo += matchCount;
    const leaderId = gameState.team[0];

    // --- 關鍵插入點：先發動 Mega 技能擴張消除範圍 ---
    if (battleData.isMegaEvolved) {
        applyMegaSkill(matchSet, leaderId);
    }

    // --- 之後的數據掃描就會包含被技能炸掉的方塊 ---
    const countsPerPkmn = {}; 
    matchSet.forEach(idx => {
        const id = battleData.board[idx].pokemonId;
        if (id) {
            countsPerPkmn[id] = (countsPerPkmn[id] || 0) + 1;
        }
    });


    const barFill = document.getElementById('mega-bar-fill');
    
        // --- 2. 針對「隊長」進行 Mega 進度結算 ---
    Object.keys(countsPerPkmn).forEach(pkmnId => {
        const count = countsPerPkmn[pkmnId];
        // 修正：使用 parseInt 確保比對 ID 時不會因為字串/數字型態出錯
        const isIdMatch = parseInt(pkmnId) === parseInt(leaderId);
        const pkmnInfo = POKEMON_DATA.find(p => parseInt(p.id) === parseInt(pkmnId));
        const hasItem = gameState.items.includes(`${pkmnId}_mega`);
        const megaCheck = document.getElementById('mega-check');
        const isMegaEnabled = megaCheck ? megaCheck.checked : true;

        if (isIdMatch && isMegaEnabled && hasItem && pkmnInfo?.hasMega && !battleData.isMegaEvolved) {
            battleData.megaProgress += count;
            
            if (barFill) {
                let percent = Math.min((battleData.megaProgress / 15) * 100, 100);
                barFill.style.width = percent + "%";
            }

            if (battleData.megaProgress >= 15) {
                battleData.isMegaEvolved = true;
                if (barFill) barFill.classList.add('mega-full');
                
                // 【新增】觸發 Mega 時，立即把棋盤上剩下的隊長棋子換成 Mega 圖
                updateLeaderTilesToMega(leaderId);
                
                // 呼叫原本處理上方大圖變化的函式
                if (typeof executeMegaImageChange === 'function') {
                    executeMegaImageChange(leaderId);
                }
            }
        }
    });

    // --- 3. 計算總傷害 ---
    let totalDamage = 0;
    Object.keys(countsPerPkmn).forEach(pkmnId => {
        const count = countsPerPkmn[pkmnId];
        const pkmnInfo = POKEMON_DATA.find(p => parseInt(p.id) === parseInt(pkmnId));
        const isLeader = parseInt(pkmnId) === parseInt(leaderId);
        
        let baseDamage = (pkmnInfo && pkmnInfo.type === "Legendary") ? 70 : 50;
        let formMultiplier = 1.0;

        // 只要是 Mega 狀態下的隊長消除，統一 1.5 倍
        if (battleData.isMegaEvolved && isLeader) {
            formMultiplier = 1.5; 
        }

        let comboMultiplier = 1 + (battleData.combo - 1) * 0.05;
        totalDamage += (baseDamage * count) * formMultiplier * comboMultiplier;
    });

    battleData.currentHP = Math.max(0, battleData.currentHP - Math.floor(totalDamage));

    // --- 4. UI 更新與視覺效果 ---
    updateBattleUI();
    showCombo();
    
    if (battleData.isMegaEvolved && countsPerPkmn[leaderId]) {
        const comboDiv = document.getElementById('combo-display');
        if (comboDiv) {
            if (!comboDiv.innerHTML.includes("MEGA!")) {
                comboDiv.innerHTML += ` <span class="mega-tag">MEGA!</span>`;
            }
        }
    }

    const tiles = document.querySelectorAll('.tile');
    matchSet.forEach(idx => {
        tiles[idx].style.opacity = '0';
        battleData.board[idx].pokemonId = null;
    });

    if (battleData.currentHP <= 0) {
        battleData.isEnding = true;
        setTimeout(checkBattleEnd, 500);
    } else {
        setTimeout(refillBoard, 500);
    }
}

    const leaderImg = document.getElementById('team-img-0');
    if (!leaderImg) return;

    // 2. 從「大圖」獲取正確的網址 (它已經包含 -y 且包含 ?v= 隨機數)
    const correctlyEvolvedUrl = leaderImg.src;

// 輔助函式：計算傷害 (X/Y 倍率統一版)
function calculateAndApplyDamage(pkmnId, count, pkmnInfo, isLeader) {
    let baseDamage = (pkmnInfo && pkmnInfo.type === "Legendary") ? 70 : 50;
    let formMultiplier = 1.0;

    // 只要「已 Mega 進化」且「消除的是隊長」，統一套用 1.5 倍
    if (battleData.isMegaEvolved && isLeader) {
        formMultiplier = 1.5; 
        
        // 取得當前分支只是為了 Console Log 顯示方便
        const branchSelect = document.getElementById('mega-branch');
        const currentBranch = branchSelect ? branchSelect.value : 'N/A';
        console.log(`Mega 攻擊觸發！型態: ${currentBranch}, 統一倍率: ${formMultiplier}`);
    }

    let comboMultiplier = 1 + (battleData.combo - 1) * 0.05;
    let damage = (baseDamage * count) * formMultiplier * comboMultiplier;
    
    battleData.currentHP = Math.max(0, battleData.currentHP - Math.floor(damage));
    
    updateBattleUI();
}

function refillBoard() {
    // --- 技能：卡洛斯地區「再來一次」 ---
    if (battleData.triggerBoardReset) {
        battleData.triggerBoardReset = false; // 重置旗標
        
        // 1. 清空盤面
        battleData.board.forEach(tile => tile.pokemonId = null);
        
        // 2. 重新填滿隨機方塊 (呼叫你原本初始化盤面的函式)
        initBoard(); 
        
        // 3. 全面更新 UI 與棋盤視覺
        renderBoard(); // 確保畫面上出現新方塊
        updateBattleUI(); // 更新介面狀態
        
        // 4. 強制結束此回合判定，不觸發天降 checkMatches
        return; 
    }

    // --- 以下為正常的方塊掉落邏輯 ---
    if (battleData.currentHP <= 0) return;

    for (let c = 0; c < 6; c++) {
        let emptySpaces = 0;
        // 垂直掉落運算
        for (let r = 5; r >= 0; r--) {
            let idx = r * 6 + c;
            if (battleData.board[idx].pokemonId === null) {
                emptySpaces++;
            } else if (emptySpaces > 0) {
                battleData.board[idx + emptySpaces * 6].pokemonId = battleData.board[idx].pokemonId;
                battleData.board[idx].pokemonId = null;
            }
        }
        // 頂部遞補新方塊
        for (let r = 0; r < emptySpaces; r++) {
            battleData.board[r * 6 + c].pokemonId = gameState.team[Math.floor(Math.random() * 4)];
        }
    }

    renderBoard();

    // 正常的連鎖判定：觸發天降判定，讓 checkMatches 重新判斷
    setTimeout(() => {
        checkMatches();
    }, 300);
}

function renderBoard() {
    const tiles = document.querySelectorAll('.tile');
    const leaderId = gameState.team[0]; // 取得當前隊長 ID

    battleData.board.forEach((data, i) => {
        const tile = tiles[i];
        if (!tile) return; 

        tile.style.opacity = '1';
        
        // --- 優化點：直接呼叫 getTileImageUrl 處理所有網址判斷 ---
        // 這樣就不需要在這裡寫一堆 if/else 判斷 Mega
        const spriteUrl = getTileImageUrl(data.pokemonId);
        
        // --- 處理濾鏡特效 ---
        // 只有「進化狀態」且「是隊長」的格子才加金光
        let filterEffect = "none";
        if (battleData.isMegaEvolved && data.pokemonId === leaderId) {
            filterEffect = "drop-shadow(0 0 5px #ffcc00) brightness(1.1)";
        }

        // --- 執行更新 ---
        tile.innerHTML = `<img src="${spriteUrl}" style="filter: ${filterEffect}; transition: all 0.2s;">`;
    });
}

function checkBattleEnd() {
    const resultOverlay = document.getElementById('result-overlay');
    if (resultOverlay.style.display === 'flex') return;

    if (battleData.currentHP <= 0) {
        battleData.isEnding = true; 

        const pId = gameState.lastPlayed; // 當前關卡的 ID (字串，如 "721")
        const pIntId = parseInt(pId);

        // --- 1. 解鎖下一關邏輯 (僅限普通模式) ---
        const MAX_TOTAL_ID = 831; // 遊戲總關卡上限
        const nextId = (pIntId + 1).toString().padStart(3, '0');
        let unlockMsg = "";
        
        if (!gameState.isHardMode && pIntId + 1 <= MAX_TOTAL_ID) {
            if (!gameState.unlocked.includes(nextId)) {
                gameState.unlocked.push(nextId);
                unlockMsg = `下一關 ${nextId} 已解鎖！`; 
            }
        }

        // --- 【關鍵插入：地區通關與技能覺醒邏輯】 ---
        const currentReg = REGION_CONFIG[gameState.currentRegionIdx];
        const skillList = ["搖手指", "根源波動", "斷崖之劍", "地震", "大字爆炎", "畫龍點睛", "異次元洞", "千萬伏特"];

        // 檢查條件：
        // A. 擊敗的是當前地區最後一隻 (pIntId === currentReg.range[1])
        // B. 還有新技能可以解鎖 (unlockedSkillIdx < 6)
        // C. 雖然總關卡到 831，但技能解鎖只支援到 721 (卡洛斯結束)
        if (pIntId === currentReg.range[1] && pIntId <= 802) {
            // 只有第一次通關該地區時才升級技能索引
            if (gameState.currentRegionIdx === gameState.unlockedSkillIdx && gameState.unlockedSkillIdx < skillList.length - 1) {
                
                gameState.unlockedSkillIdx++; 
                const newSkillName = skillList[gameState.unlockedSkillIdx];
                
                const skillAlert = `★ 力量覺醒：解鎖新技能「${newSkillName}」！`;
                unlockMsg = unlockMsg ? `${unlockMsg} ${skillAlert}` : skillAlert;
                
                console.log(`地區通關！新技能解鎖: ${newSkillName}`);
            }
        }

        // --- 2. 描述文字處理 ---
        let finalDesc = unlockMsg || "成功的擊敗了對手！";

        const isCaptured = gameState.captured.includes(pId);
        save(); 

        // --- 3. 根據狀態決定後續路徑 ---
        if (isCaptured || gameState.isHardMode) {
            showResultCard("挑戰成功", finalDesc, () => {
                handleBattleWin(); 
                closeBattle(); 
                battleData.isEnding = false; 
                renderMap(); 
            });
        } else {
            showResultCard("挑戰成功", finalDesc, () => {
                battleData.isEnding = false; 
                handleBattleWin(); 
            });
        }
        return; 
    }
    
    else if (battleData.moves <= 0) {
        battleData.isEnding = true;
        showResultCard("挑戰失敗", "步數已用盡，請再接再厲！", () => {
            closeBattle();
            battleData.isEnding = false;
        });
    }
}

function handleBranchMegaLogic(pId, count) {
    // --- 【新增】如果是在困難模式下，不觸發 Mega 石解鎖邏輯 ---
    if (gameState.isHardMode) {
        return ""; 
    }
    let msg = "";
    // 統一邏輯：所有具備 Mega 能力的寶可夢，通關 5 次即解鎖
    if (count === 5 && !gameState.items.includes(`${pId}_mega`)) {
        gameState.items.push(`${pId}_mega`);
        const pInfo = POKEMON_DATA.find(x => x.id === pId);
        msg = `<div style="color:#ffcc00; margin-top:10px;">★ 獲得 ${pInfo.name} 的進化石 ★</div>`;

}


function handleBattleWin() {
    const config = REGION_CONFIG[gameState.currentRegionIdx];
    const eliteData = getEliteFourData(config.name); 
    const p = POKEMON_DATA.find(x => x.id === gameState.lastPlayed);
    
    // 判定是否為冠軍關卡
    const isChampionStage = gameState.isHardMode && eliteData.some(e => e.id === p.id && e.isChampion);
    const isLegendary = (p.type === "Legendary");
    const useKeyElement = document.getElementById('use-key');
    const useKey = useKeyElement ? useKeyElement.checked : false;

    // --- 【核心修正：解鎖下一關邏輯】 ---
    const currentIndex = POKEMON_DATA.findIndex(x => x.id === p.id);
    if (currentIndex !== -1 && currentIndex < POKEMON_DATA.length - 1) {
        const nextPokemon = POKEMON_DATA[currentIndex + 1];
        // 如果下一隻還沒解鎖，就把它加進去
        if (!gameState.unlocked.includes(nextPokemon.id)) {
            gameState.unlocked.push(nextPokemon.id);
            console.log(`解鎖下一關：No.${nextPokemon.id} ${nextPokemon.name}`);
        }
    }

    // --- 1. 立即處理獎勵與進度 (存檔前完成) ---
let megaMsg = "";
// 定義一個儲存用的 Key
const clearKey = gameState.isHardMode ? `${p.id}_hard` : p.id;

if (!gameState.isHardMode) {
    // 普通模式
    gameState.clearCounts[p.id] = (gameState.clearCounts[p.id] || 0) + 1;
    megaMsg = handleBranchMegaLogic(p.id, gameState.clearCounts[p.id]);
} else {
    // 困難模式：使用獨立的 Key 記錄次數
    gameState.clearCounts[clearKey] = (gameState.clearCounts[clearKey] || 0) + 1;
    
    if (isChampionStage) {
        gameState.keys++;
    }
}

    // 統一執行一次存檔與狀態更新
    save();
    updateStatusBar();

    // --- 2. 結算流程 ---
    const proceed = () => {
        // A. 困難模式攔截器：直接結束
        if (gameState.isHardMode) {
            closeBattle(); 
            return;
        }

        // B. 【新增】已捕捉判定：如果已經抓過了，就不進入捕捉階段
        const isAlreadyCaptured = gameState.captured.includes(p.id);
        if (isAlreadyCaptured) {
            console.log("此寶可夢已捕捉，跳過捕捉介面");
            closeBattle();
            renderMap(); // 重新渲染地圖以更新標記
            return;
        }

        // C. 普通模式：判定傳說之鑰 (只有未捕捉時才需要判斷)
        if (isLegendary && !useKey) {
            alert("通關成功！但未開啟傳說之鑰，寶可夢直接離開了。");
            closeBattle();
            renderMap();
            return;
        }

        // D. 進入捕捉階段 (計算捕捉率)
        let bonusRate = (battleData && battleData.moves) ? battleData.moves * 5 : 0;
        currentCatchRate = Math.min(100, 15 + bonusRate);

        if (isLegendary && useKey) {
            gameState.keys--;
            save(); 
        }

        openCatchUI(p, bonusRate, megaMsg); 
    };

    // --- 3. 執行字卡展示 ---
    if (isChampionStage) {
        // 只有冠軍才顯示特殊獎勵字卡
        showVictoryCard(proceed); 
    } else {
        proceed(); 
    }
}

function startThrowAnimation() {
    const ball = document.getElementById('pokeball-ui');
    document.getElementById('btn-throw').style.display = 'none';
    ball.style.display = 'block';

    // 搖晃動畫模擬
    let shakeCount = 0;
    const interval = setInterval(() => {
        ball.style.transform = `rotate(${shakeCount % 2 === 0 ? 15 : -15}deg)`;
        shakeCount++;
        if (shakeCount >= 6) {
            clearInterval(interval);
            executeCatchLogic();
        }
    }, 300);
}

function executeCatchLogic() {
    const success = (Math.random() * 100) <= currentCatchRate;
    const pId = gameState.lastPlayed;
    
    // 取得 UI 元素
    const rateText = document.getElementById('catch-rate-text');
    const detailText = document.getElementById('catch-rate-detail');
    const ball = document.getElementById('pokeball-ui');

    // 1. 解鎖下一關 (不論成功與否)
    const nextId = (parseInt(pId) + 1).toString().padStart(3, '0');
    if (!gameState.unlocked.includes(nextId)) {
        gameState.unlocked.push(nextId);
    }

    // 2. 處理捕捉結果與 UI 更新
    if (success) {
        // 成功邏輯
        rateText.innerText = "成功收服！";
        rateText.style.color = "var(--accent-color)";
        detailText.innerText = "已加入寶可夢圖鑑";
        
        if (!gameState.captured.includes(pId)) {
            gameState.captured.push(pId);
        }
    } else {
        // 失敗邏輯
        rateText.innerText = "捕捉失敗...";
        rateText.style.color = "#ff5555";
        detailText.innerText = "成功通關！可惜未能捕捉到寶可夢";
        
        // 失敗時讓球消失，增加遺憾感
        ball.style.opacity = "0.3";
    }

    // 3. 儲存狀態並顯示「離開」按鈕
    save();
    document.getElementById('btn-catch-close').style.display = 'block';
}

function exitCatch() {
    document.getElementById('catch-overlay').style.display = 'none';
    renderMap(); // 刷新地圖紅白球狀態
}

function renderSelectorUI() {

        .filter(p => p && parseInt(p.id) >= region.range[0] && parseInt(p.id) <= region.range[1])
        .sort((a, b) => parseInt(a.id) - parseInt(b.id));

    // 3. 分頁計算

function updateStamina() {
    const now = Date.now();
    const wait = 30 * 60 * 1000; // 30 分鐘
    
    // 邏輯處理：檢查是否過了一個週期
    if (gameState.stamina < 10) {
        const diff = now - gameState.lastUpdate;
        if (diff >= wait) {
            // 計算過了幾個 30 分鐘 (防止掛機太久沒領)
            const gained = Math.floor(diff / wait);
            gameState.stamina = Math.min(10, gameState.stamina + gained);
            gameState.lastUpdate += gained * wait;
            save();
        }
    } else {
        // 如果體力全滿，保持最後更新時間為現在，避免滿體力後掉 1 滴又要等 30 分
        gameState.lastUpdate = now;
    }

    // UI 處理：呼叫統一的渲染函式
    updateStatusBar();
}

function updateStatusBar() {
    // 計算剩餘倒數秒數
    const now = Date.now();
    const wait = 30 * 60 * 1000;
    const remaining = gameState.stamina < 10 ? Math.ceil((wait - (now - gameState.lastUpdate)) / 1000) : 0;

    // 更新體力數字
    document.getElementById('ui-stamina').innerText = `${gameState.stamina}/10`;
    
    // 更新倒數計時器
    document.getElementById('ui-timer').innerText = remaining > 0 ? 
        `${Math.floor(remaining/60).toString().padStart(2,'0')}:${(remaining%60).toString().padStart(2,'0')}` : "MAX";
    
    // 更新關卡進度與金鑰
    document.getElementById('ui-dex').innerText = `${gameState.captured.length}/831`;
    document.getElementById('ui-keys').innerText = gameState.keys;
}

function toggleSettings(show) {
    const overlay = document.getElementById('settings-overlay');
    overlay.style.display = show ? 'flex' : 'none';
    if (show) {
        updateStorageStatus();
    }
}

/** 計算儲存空間消耗百分比 **/
function updateStorageStatus() {
    let totalUsed = 0;
    // 計算 localStorage 中所有 key 的總長度
    for (let key in localStorage) {
        if (localStorage.hasOwnProperty(key)) {
            totalUsed += (localStorage[key].length + key.length) * 2; // UTF-16 佔 2 bytes
        }
    }

    const usedMB = (totalUsed / (1024 * 1024)).toFixed(2);
    const limitMB = 5.00; // 瀏覽器 localStorage 限制通常為 5MB
    const percent = ((usedMB / limitMB) * 100).toFixed(1);

    document.getElementById('storage-bar').style.width = `${percent}%`;
    document.getElementById('storage-text').innerText = `${usedMB} / ${limitMB} MB (${percent}%)`;
    
    // 如果快爆了，改變顏色提醒
    document.getElementById('storage-bar').style.background = percent > 80 ? "#ff5555" : "#ffcc00";
}

/** 手動導出 JSON 存檔檔案 **/
function manualSave() {
    const dataStr = JSON.stringify(gameState);
    const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);
    
    const exportFileDefaultName = `Shuffle_Save_${new Date().toISOString().slice(0,10)}.json`;

    const linkElement = document.createElement('a');
    linkElement.setAttribute('href', dataUri);
    linkElement.setAttribute('download', exportFileDefaultName);
    linkElement.click();
    alert("存檔檔案已下載至您的設備。");
}

/** 手動讀取 JSON 存檔檔案 **/
function manualLoad() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';

    input.onchange = e => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.readAsText(file, 'UTF-8');

        reader.onload = readerEvent => {
            try {
                const content = JSON.parse(readerEvent.target.result);
                // 簡單驗證是否為本遊戲存檔 (檢查是否有 captured 欄位)
                if (content.captured && content.unlocked) {
                    if (confirm("確定要蓋過目前的進度嗎？讀取後遊戲將重新整理。")) {
                        localStorage.setItem('SHUFFLE_WEB_SAVE', JSON.stringify(content));
                        location.reload(); // 重新整理以載入新數據
                    }
                } else {
                    alert("無效的存檔檔案格式！");
                }
            } catch (err) {
                alert("讀取失敗：檔案格式錯誤。");
            }
        };
    };
    input.click();
}

        <h3 style="margin: 0 0 10px 0; color: #ffffff; letter-spacing: 2px; font-weight: 800;">系統設置</h3>
        <hr style="border: 0; border-top: 2px solid #444; margin-bottom: 20px;">
        
        <div style="margin:20px 0;">
            <p style="margin-bottom: 8px; color: #cccccc; font-size: 14px;">瀏覽器儲存空間使用率</p>
            
            <div style="width:100%; height:18px; background:#111; border-radius:10px; overflow:hidden; border: 1px solid #444;">
                <div id="storage-bar" style="width: 0%; height:100%; background: #ffcc00; box-shadow: 0 0 10px rgba(255,204,0,0.5); transition: width 0.5s;"></div>
            </div>
            
            <div style="margin-top: 8px;">
                <small id="storage-text" style="color: #ffcc00; font-family: monospace; font-size: 13px; font-weight: bold;">0.00 / 5.00 MB (0%)</small>
            </div>
        </div>

        <div style="display:flex; flex-direction:column; gap:12px; margin-top: 10px;">
            <button onclick="manualSave()" class="side-btn unlocked" style="width:100%; cursor:pointer; padding:12px; border-radius:8px; font-weight: bold; border: none; background: #ffcc00; color: #000;">儲存存檔</button>
            
            <button onclick="manualLoad()" class="side-btn" style="width:100%; cursor:pointer; padding:12px; border-radius:8px; font-weight: bold; border: 1px solid #666; background: #444; color: #fff;">讀取存檔檔案</button>
            
            <button onclick="toggleSettings(false)" style="background:transparent; color:#aaa; border:none; margin-top:10px; cursor:pointer; text-decoration:none; font-size: 14px;">[ 返回遊戲 ]</button>
        </div>
    </div>
</div>



<div id="selector-overlay" class="overlay"> <div class="card" style="width:85%; max-height:75vh;">
        <h3 style="margin-top:0; color:var(--accent-color);">選擇寶可夢</h3>
        
        <div id="pokemon-list-container" style="flex:1; overflow-y:auto; width:100%; padding-right:5px;">
            </div>
        
        <button onclick="closeSelector()" style="margin-top:20px; width:100%; padding:12px; background:#444; color:white; border:none; border-radius:30px;">
            取 消
        </button>
    </div>
</div>
    
<style>
    /* 棋子樣式 */
    .tile {
        background: #333;
        border-radius: 8px;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        transition: transform 0.1s;
        touch-action: none; /* 重要：防止拖拽時網頁跟著滾動 */
    }
    .tile img { width: 85%; height: 85%; object-fit: contain; pointer-events: none; }
    .tile.selected { border: 2px solid white; transform: scale(1.1); z-index: 10; background: #555; }
</style>

</body>
</html>
