<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小星靈的暖心花園 - 情緒信箱版</title>
    <style>
        :root {
            --bg-day: #e8f5e9; --bg-night: #1a2a1a;
            --primary-green: #81c784; --primary-flower: #f48fb1;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; padding: 0; font-family: "PingFang TC", sans-serif;
            transition: background 1s; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; height: 100vh;
        }
        .day { background: var(--bg-day); color: #2e7d32; }
        .night { background: var(--bg-night); color: #a5d6a7; }

        /* 進度條 */
        #top-bar { width: 100%; padding: 15px 20px 5px; max-width: 400px; }
        .progress-container { width: 100%; height: 12px; background: rgba(0,0,0,0.1); border-radius: 6px; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: var(--primary-green); transition: width 0.5s; }
        .level-text { font-size: 12px; margin-top: 5px; display: flex; justify-content: space-between; }

        /* 花園與氣泡 */
        #game-container { position: relative; flex: 1; width: 100%; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        #flower-pot { width: 180px; height: 180px; cursor: pointer; transition: transform 0.3s; position: relative; z-index: 5; }
        #flower-img { width: 100%; height: 100%; object-fit: contain; filter: hue-rotate(0deg); transition: filter 1s; }
        #growth-timer { position: absolute; top: -30px; width: 100%; text-align: center; font-weight: bold; font-size: 18px; }

        #message-bubble {
            position: absolute; top: 12%; background: white; color: #333; padding: 15px;
            border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 80%; opacity: 0; transition: opacity 0.5s; pointer-events: none; z-index: 10;
        }

        /* 天燈動畫 */
        .sky-lantern {
            position: absolute; bottom: -100px; width: 60px; height: 80px;
            background: #ff6b6b; border-radius: 10px 10px 5px 5px;
            animation: flyUp 8s forwards linear; color: white; font-size: 10px; text-align: center; padding: 10px 5px; z-index: 1;
            box-shadow: 0 0 15px rgba(255, 107, 107, 0.5);
        }
        @keyframes flyUp { 
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-120vh) translateX(50px) rotate(10deg); opacity: 0; } 
        }

        /* 控制區 */
        .controls { padding: 10px 20px 30px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; max-width: 400px; }
        button { border: none; padding: 12px; border-radius: 15px; font-weight: bold; box-shadow: 0 4px 0 rgba(0,0,0,0.1); cursor: pointer; font-size: 14px; }
        button:active { transform: translateY(2px); box-shadow: none; }

        /* 彈窗基礎 */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: white; color: #333; padding: 20px; border-radius: 20px; width: 88%; max-width: 380px; text-align: center; max-height: 85vh; display: flex; flex-direction: column; }
        textarea { width: 100%; height: 80px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; padding: 10px; font-size: 16px; }
        
        /* 列表樣式 (圖鑑與信箱) */
        .scroll-list { overflow-y: auto; display: grid; grid-template-columns: repeat(1, 1fr); gap: 10px; padding: 10px 0; }
        .album-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        
        .item-card { background: #f9f9f9; padding: 12px; border-radius: 12px; border: 1px solid #eee; text-align: center; position: relative; }
        .item-card img { width: 50px; height: 50px; margin-bottom: 5px; }
        .item-card p { font-size: 13px; margin: 5px 0; color: #555; word-break: break-all; }
        .delete-btn { background: #ff8a80; color: white; border-radius: 5px; padding: 2px 8px; font-size: 11px; margin-top: 5px; }

        .emotion-input-group { margin: 8px 0; display: flex; align-items: center; justify-content: space-between; }
        .emotion-input-group label { font-size: 14px; width: 60px; text-align: left; }
        .storage-container { width: 100%; height: 8px; background: #eee; border-radius: 4px; overflow: hidden; margin: 10px 0; }
        #storage-bar { width: 0%; height: 100%; background: #4caf50; }
    </style>
</head>
<body class="day">

    <div id="top-bar">
        <div class="progress-container"><div id="progress-bar"></div></div>
        <div class="level-text">
            <span id="garden-name">新手花園</span>
            <span id="points-display">0 / 10</span>
        </div>
    </div>

    <div id="message-bubble"></div>

    <div id="game-container">
        <div id="flower-pot" onclick="handlePlantClick()">
            <div id="growth-timer"></div>
            <img id="flower-img" src="https://cdn-icons-png.flaticon.com/512/628/628283.png" alt="soil">
        </div>
        <p id="hint-text" style="font-size: 14px;">點擊土壤播種情緒</p>
        <p id="flower-name-display" style="font-weight: bold; color: var(--primary-flower); margin-top: 5px; min-height: 20px;"></p>
    </div>

    <div class="controls">
        <button style="background: #aed581;" onclick="openPlantModal()">播下情緒</button>
        <button style="background: #81d4fa;" onclick="openLantern('future')">寫給未來</button>
        <button style="background: #90a4ae;" onclick="openLantern('worry')">煩惱飛走</button>
        <button style="background: #ce93d8;" onclick="toggleLetters()">往日信箱</button>
        <button style="background: #ffcc80;" onclick="toggleAlbum()">花卉圖鑑</button>
        <button style="background: #ddd;" onclick="openSaveMenu()">存檔/讀取</button>
    </div>

    <div id="plant-modal" class="modal">
        <div class="modal-content">
            <h3>調配種子情緒</h3>
            <div class="emotion-input-group"><label>😊 開心</label><input type="range" id="emo-happy" min="0" max="100" value="20" oninput="validateEmotions()"></div>
            <div class="emotion-input-group"><label>😡 生氣</label><input type="range" id="emo-angry" min="0" max="100" value="20" oninput="validateEmotions()"></div>
            <div class="emotion-input-group"><label>😟 煩惱</label><input type="range" id="emo-worry" min="0" max="100" value="20" oninput="validateEmotions()"></div>
            <div class="emotion-input-group"><label>😢 難過</label><input type="range" id="emo-sad" min="0" max="100" value="20" oninput="validateEmotions()"></div>
            <div class="emotion-input-group"><label>✨ 嚮往</label><input type="range" id="emo-hope" min="0" max="100" value="20" oninput="validateEmotions()"></div>
            <div id="total-check">總和: 100 / 100</div>
            <button id="plant-btn" style="background: #aed581; width: 100%; margin-top: 15px;" onclick="confirmPlanting()">開始種植</button>
            <p style="font-size: 12px; margin-top: 10px; color: #888;" onclick="closeModal()">取消</p>
        </div>
    </div>

    <div id="lantern-modal" class="modal">
        <div class="modal-content">
            <h3 id="lantern-title">寫下你的心願</h3>
            <textarea id="lantern-text" placeholder="想對未來的自己說什麼？"></textarea>
            <div id="date-picker-area">
                <p style="font-size: 14px;">預計抵達日期：</p>
                <input type="date" id="lantern-date" style="width:100%; padding:10px; margin-bottom:10px; border-radius:10px; border:1px solid #ddd;">
            </div>
            <button style="background: #ff6b6b; color: white; width: 100%;" onclick="launchLantern()">釋放天燈</button>
            <p style="font-size: 12px; margin-top: 10px; color: #888;" onclick="closeModal()">取消</p>
        </div>
    </div>

    <div id="list-modal" class="modal">
        <div class="modal-content">
            <h3 id="list-title">清單</h3>
            <div id="list-container" class="scroll-list"></div>
            <button style="background: #eee; width: 100%; margin-top: 15px;" onclick="closeModal()">返回花園</button>
        </div>
    </div>

    <div id="save-modal" class="modal">
        <div class="modal-content">
            <h3>資料管理</h3>
            <div class="storage-container"><div id="storage-bar"></div></div>
            <button style="background: #4caf50; color:white; width: 100%; margin-bottom: 10px;" onclick="manualSave()">立即存檔</button>
            <button style="background: #2196f3; color:white; width: 100%; margin-bottom: 10px;" onclick="manualLoad()">讀取存檔</button>
            <button style="background: #eee; width: 100%;" onclick="clearData()">重置所有進度</button>
            <p style="font-size: 12px; margin-top: 15px; color: #888;" onclick="closeModal()">返回</p>
        </div>
    </div>

    <script>
        const FLOWER_TYPES = [
            { id: 'soil', img: 'https://cdn-icons-png.flaticon.com/512/628/628283.png' },
            { id: 'sprout', img: 'https://cdn-icons-png.flaticon.com/512/824/824207.png' },
            { id: 'mature', img: 'https://cdn-icons-png.flaticon.com/512/2950/2950660.png' }
        ];

        const ENCOURAGEMENTS = ["妳辛勤的照顧，讓美好綻放了。", "就像這朵花一樣，妳也在慢慢變好。", "謝謝妳沒有放棄，今天也很棒喔！", "所有的等待，都是為了最美的收成。"];

        let gameState = JSON.parse(localStorage.getItem('myGardenGame')) || {
            points: 0, gardenLv: 1, plantStatus: 'idle', 
            growStartTime: 0, currentFlowerName: "", currentHue: 0,
            futureLetters: [], 
            flowerAlbum: [] 
        };

        function init() {
            updateTheme();
            updateUI();
            setInterval(checkGrowth, 1000);
            setInterval(updateTheme, 60000);
        }

        // --- 情緒邏輯 ---
        function validateEmotions() {
            const h = parseInt(document.getElementById('emo-happy').value), 
                  a = parseInt(document.getElementById('emo-angry').value),
                  w = parseInt(document.getElementById('emo-worry').value), 
                  s = parseInt(document.getElementById('emo-sad').value),
                  hp = parseInt(document.getElementById('emo-hope').value);
            const total = h + a + w + s + hp;
            const display = document.getElementById('total-check');
            display.innerText = `總和: ${total} / 100`;
            display.style.color = (total === 100) ? 'green' : 'red';
            document.getElementById('plant-btn').disabled = (total !== 100);
        }

        // 修復：點選播下情緒時開啟彈窗
        function openPlantModal() {
            if (gameState.plantStatus === 'idle') {
                document.getElementById('plant-modal').style.display = 'flex';
                validateEmotions();
            } else {
                showBubble("花朵正在成長中，請耐心等待收成喔！");
            }
        }

        function confirmPlanting() {
            const h = parseInt(document.getElementById('emo-happy').value), a = parseInt(document.getElementById('emo-angry').value);
            const w = parseInt(document.getElementById('emo-worry').value), s = parseInt(document.getElementById('emo-sad').value), hp = parseInt(document.getElementById('emo-hope').value);
            
            const maxVal = Math.max(h, a, w, s, hp);
            let prefix = a === maxVal ? "憤怒中帶有" : h === maxVal ? "喜悅中帶有" : w === maxVal ? "憂慮中帶有" : s === maxVal ? "哀傷中帶有" : "平靜中帶有";
            let suffix = hp === maxVal ? "嚮往的花朵" : h === maxVal ? "明媚的小花" : a === maxVal ? "刺人的紅蕊" : s === maxVal ? "帶露的垂櫻" : "霧氣般的芬芳";

            gameState.currentFlowerName = prefix + suffix;
            gameState.currentHue = (h * 50 + a * 0 + w * 220 + s * 180 + hp * 300) / 100;
            gameState.plantStatus = 'growing';
            gameState.growStartTime = Date.now();
            showBubble("種下了此刻的心情...");
            closeModal();
            updateUI();
            autoSave();
        }

        // --- 天燈與信箱系統 ---
        let currentLanternMode = '';
        function openLantern(mode) {
            currentLanternMode = mode;
            document.getElementById('lantern-title').innerText = mode === 'future' ? '給未來的自己' : '煩惱隨風飄散';
            document.getElementById('date-picker-area').style.display = mode === 'future' ? 'block' : 'none';
            document.getElementById('lantern-date').valueAsDate = new Date(Date.now() + 86400000);
            document.getElementById('lantern-modal').style.display = 'flex';
        }

        function launchLantern() {
            const text = document.getElementById('lantern-text').value;
            const date = document.getElementById('lantern-date').value;
            if(!text) return;

            // 修改：只有「給未來」的信件會進入信箱
            if (currentLanternMode === 'future') {
                const newLetter = {
                    id: Date.now(),
                    content: text,
                    mode: currentLanternMode,
                    date: date,
                    timestamp: new Date().toLocaleDateString()
                };
                gameState.futureLetters.push(newLetter);
            }

            // 動畫
            const lan = document.createElement('div');
            lan.className = 'sky-lantern'; lan.innerText = text.substring(0,6)+'...';
            if(currentLanternMode === 'worry') lan.style.background = '#95a5a6';
            document.getElementById('game-container').appendChild(lan);
            
            closeModal();
            document.getElementById('lantern-text').value = '';
            autoSave();
            setTimeout(() => lan.remove(), 8000);
        }

        function toggleLetters() {
            const container = document.getElementById('list-container');
            document.getElementById('list-title').innerText = "往日信箱";
            container.className = "scroll-list";
            container.innerHTML = "";
            
            if (gameState.futureLetters.length === 0) {
                container.innerHTML = "<p style='color:#999;'>信箱空空的...</p>";
            } else {
                const today = new Date().toISOString().split('T')[0];
                gameState.futureLetters.forEach(letter => {
                    const isReady = letter.date <= today;
                    const card = document.createElement('div');
                    card.className = 'item-card';
                    card.innerHTML = `
                        <p style="font-size:10px; color:#aaa;">${letter.timestamp} 寄出</p>
                        <p>${isReady ? letter.content : '⏳ 傳送中...<br>(預計 ' + letter.date + ' 抵達)'}</p>
                        <button class="delete-btn" onclick="deleteLetter(${letter.id})">刪除</button>
                    `;
                    container.appendChild(card);
                });
            }
            document.getElementById('list-modal').style.display = 'flex';
        }

        function deleteLetter(id) {
            if(confirm("要讓這段回憶消失嗎？")) {
                gameState.futureLetters = gameState.futureLetters.filter(l => l.id !== id);
                autoSave();
                toggleLetters();
            }
        }

        // --- 圖鑑系統 ---
        function toggleAlbum() {
            const container = document.getElementById('list-container');
            document.getElementById('list-title').innerText = "心情花卉圖鑑";
            container.className = "scroll-list album-grid";
            container.innerHTML = "";
            
            if (gameState.flowerAlbum.length === 0) {
                container.innerHTML = "<p style='grid-column: 1/-1; color:#999;'>還沒有收集到花卉...</p>";
            } else {
                gameState.flowerAlbum.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'item-card';
                    card.innerHTML = `
                        <img src="${FLOWER_TYPES[2].img}" style="filter: hue-rotate(${item.hue}deg)">
                        <p>${item.name}</p>
                    `;
                    container.appendChild(card);
                });
            }
            document.getElementById('list-modal').style.display = 'flex';
        }

        // --- 核心系統 ---
        function updateUI() {
            const nextLevel = gameState.gardenLv * 10;
            document.getElementById('progress-bar').style.width = (gameState.points / nextLevel * 100) + "%";
            document.getElementById('points-display').innerText = `${gameState.points} / ${nextLevel}`;
            document.getElementById('garden-name').innerText = `Lv.${gameState.gardenLv} 的花園`;
            
            const img = document.getElementById('flower-img'), hint = document.getElementById('hint-text'), nameDisp = document.getElementById('flower-name-display');
            if (gameState.plantStatus === 'idle') {
                img.src = FLOWER_TYPES[0].img; img.style.filter = "hue-rotate(0deg)";
                hint.innerText = "點擊土壤播種情緒"; nameDisp.innerText = "";
            } else if (gameState.plantStatus === 'growing') {
                img.src = FLOWER_TYPES[1].img; img.style.filter = `hue-rotate(${gameState.currentHue}deg)`;
                hint.innerText = "情緒正在萌芽中..."; nameDisp.innerText = "正在養育：" + gameState.currentFlowerName;
            } else {
                img.src = FLOWER_TYPES[2].img; img.style.filter = `hue-rotate(${gameState.currentHue}deg)`;
                hint.innerText = "收成這份心情"; nameDisp.innerText = "盛開中：" + gameState.currentFlowerName;
            }
        }

        function checkGrowth() {
            if (gameState.plantStatus === 'growing') {
                const elapsed = Math.floor((Date.now() - gameState.growStartTime) / 1000);
                const target = 10; 
                if (elapsed >= target) {
                    gameState.plantStatus = 'ready';
                    document.getElementById('growth-timer').innerText = "";
                    updateUI();
                } else {
                    document.getElementById('growth-timer').innerText = `倒數 ${target - elapsed}s`;
                }
            }
        }

        function handlePlantClick() {
            if (gameState.plantStatus === 'ready') harvest();
            else if (gameState.plantStatus === 'idle') openPlantModal();
        }

        function harvest() {
            const isNew = !gameState.flowerAlbum.find(f => f.name === gameState.currentFlowerName);
            if (isNew) {
                gameState.flowerAlbum.push({ name: gameState.currentFlowerName, hue: gameState.currentHue });
            }
            gameState.points += 2;
            showBubble(`${isNew ? '🌟 新發現！' : ''}【${gameState.currentFlowerName}】已收成：${ENCOURAGEMENTS[Math.floor(Math.random() * ENCOURAGEMENTS.length)]}`);
            gameState.plantStatus = 'idle';
            if (gameState.points >= gameState.gardenLv * 10) gameState.gardenLv++;
            updateUI(); autoSave();
        }

        function openSaveMenu() {
            const len = JSON.stringify(gameState).length;
            document.getElementById('storage-bar').style.width = (len / (5*1024*1024) * 100) + "%";
            document.getElementById('save-modal').style.display = 'flex';
        }
        function manualSave() { autoSave(); alert("存檔成功！"); }
        function manualLoad() {
            const saved = localStorage.getItem('myGardenGame');
            if (saved) { gameState = JSON.parse(saved); updateUI(); alert("讀取存檔成功！"); closeModal(); }
        }
        function autoSave() { localStorage.setItem('myGardenGame', JSON.stringify(gameState)); }
        function clearData() { if(confirm("重置進度？")) { localStorage.removeItem('myGardenGame'); location.reload(); } }
        function showBubble(text) {
            const b = document.getElementById('message-bubble');
            b.innerText = text; b.style.opacity = 1;
            setTimeout(() => b.style.opacity = 0, 5000);
        }
        function updateTheme() {
            const hour = new Date().getHours();
            document.body.className = (hour > 6 && hour < 18) ? 'day' : 'night';
        }
        function closeModal() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }

        init();
    </script>
</body>
</html>
