<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小星靈的暖心花園 - 溫柔療癒存檔版</title>
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/googlefonts/noto-emoji/main/png/512/emoji_u1f338.png">
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-title" content="小星靈花園">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <style>
        :root {
    --bg-day: #e8f5e9; --bg-night: #1a2a1a;
    --primary-green: #81c784; --primary-flower: #f48fb1;
}

/* 🌟 全域優化：禁用 iOS 長按選單，提升遊戲感 */
* { 
    box-sizing: border-box; 
    -webkit-tap-highlight-color: transparent; 
    
    /* 🚫 禁用長按與選取內容 (遊戲體驗優化) */
    -webkit-touch-callout: none;    /* iOS Safari 專用：禁用長按選單 */
    -webkit-user-select: none;      /* Safari, Chrome, Opera 舊版 */
    -moz-user-select: none;         /* Firefox 專用 */
    -ms-user-select: none;          /* Internet Explorer/Edge 舊版 */
    user-select: none;              /* 標準屬性：支援所有現代瀏覽器 */
}

/* 🔓 確保輸入框、文字區域與可編輯內容仍可選取文字 */
input, textarea, [contenteditable="true"] { 
    -webkit-user-select: text; 
    -moz-user-select: text;
    -ms-user-select: text;
    user-select: text; 
}

body {
    margin: 0; padding: 0; font-family: "PingFang TC", sans-serif;
    transition: background 1s; 
    overflow: hidden;
    display: flex; flex-direction: column; align-items: center; 
    height: 100vh;
    /* 🌟 適應 iOS 安全區域 (防止內容被瀏海或底條遮住) */
    padding-top: env(safe-area-inset-top);
}

/* 背景裝飾 */
.day { background: var(--bg-day); color: #2e7d32; }
.night { background: var(--bg-night); color: #a5d6a7; }

/* 🌟 底部按鈕區優化：自動避開 iPhone 底部的小白條 */
.controls { 
    padding: 10px 20px;
    padding-bottom: calc(30px + env(safe-area-inset-bottom)); 
    display: grid; 
    grid-template-columns: repeat(3, 1fr); 
    gap: 10px; 
    width: 100%; 
    max-width: 400px; 
}

.decoration-emoji {
    position: fixed; /* 改用 fixed 確保滾動時位置不變 */
    pointer-events: none;
    z-index: 1;
    user-select: none;
}

/* 櫻花漂浮感 (白天) */
@keyframes sakuraFloat {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-15px) rotate(15deg); }
}

/* 星星呼吸感 (夜晚) */
@keyframes starBlink {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.1); }
}

        /* 進度條 */
        #top-bar { width: 100%; padding: 15px 20px 5px; max-width: 400px; z-index: 10; }
        .progress-container { width: 100%; height: 12px; background: rgba(0,0,0,0.1); border-radius: 6px; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: var(--primary-green); transition: width 0.5s; }
        .level-text { font-size: 12px; margin-top: 5px; display: flex; justify-content: space-between; font-weight: bold; }

        /* 核心遊戲區 */
        #game-container { position: relative; flex: 1; width: 100%; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        #flower-pot { width: 200px; height: 200px; cursor: pointer; transition: transform 0.3s; position: relative; z-index: 5; }
        #flower-pot:active { transform: scale(0.95); }
        #flower-img { width: 100%; height: 100%; object-fit: contain; }
        #growth-timer { position: absolute; top: -35px; width: 100%; text-align: center; font-weight: bold; font-size: 20px; color: #ff8a80; }

        #message-bubble {
            position: absolute; top: 10%; background: white; color: #333; padding: 18px;
            border-radius: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            max-width: 85%; opacity: 0; transition: opacity 0.5s; pointer-events: none; z-index: 20; line-height: 1.5;
        }

        /* 天燈 */
        .sky-lantern {
            position: absolute; bottom: -100px; width: 60px; height: 80px;
            background: #ff6b6b; border-radius: 10px 10px 5px 5px;
            animation: flyUp 8s forwards linear; color: white; font-size: 10px; text-align: center; padding: 10px 5px; z-index: 1;
        }
        @keyframes flyUp { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(-120vh) translateX(50px) rotate(10deg); opacity: 0; } }

        /* 控制按鈕 */
        .controls { padding: 10px 20px 30px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; max-width: 400px; }
        button { border: none; padding: 12px; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 14px; transition: 0.2s; }
        button:active { transform: translateY(2px); filter: brightness(0.9); }

        /* 彈窗 */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 100; padding: 20px; }
        .modal-content { background: white; color: #333; padding: 20px; border-radius: 25px; width: 100%; max-width: 380px; text-align: center; max-height: 90vh; overflow-y: auto; }
        
        .scroll-list { display: grid; grid-template-columns: repeat(1, 1fr); gap: 10px; margin-top: 15px; }
        .album-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .item-card { background: #fdfdfd; padding: 15px; border-radius: 18px; border: 1px solid #f0f0f0; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .item-card img { width: 65px; height: 65px; }
        
        .emotion-input-group { margin: 12px 0; display: flex; align-items: center; }
        .emotion-input-group label { font-size: 14px; width: 70px; text-align: left; }
        input[type=range] { flex: 1; accent-color: var(--primary-green); }
        
        /* 隱藏的檔案選擇器 */
        #import-input { display: none; }
        textarea { width: 100%; height: 100px; padding: 10px; border-radius: 10px; border: 1px solid #ddd; resize: none; font-family: inherit; }
        
        /* 儲存容量進度條專用樣式 */
        .storage-progress-area { background: #f9f9f9; padding: 15px; border-radius: 15px; margin-bottom: 15px; text-align: left; border: 1px solid #eee; }
    </style>
    <style>
       /* 🫧 泡泡與樹葉的基礎樣式 */
.pop-item {
    position: fixed;
    font-size: 45px; /* 增大尺寸，讓手機好點擊 */
    cursor: pointer;
    z-index: 9999;  /* 確保在最上層 */
    user-select: none;
    -webkit-user-select: none;
    transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.2s;
    
    /* 讓元素有飄浮動效 */
    animation: bubbleFloat 4s ease-in-out infinite;
    
    /* 讓點擊反應更靈敏 */
    touch-action: manipulation; 
}

/* 💥 點擊破裂特效 (當 JS 加入 .popped 類別時觸發) */
.pop-item.popped {
    transform: scale(2.5); /* 瞬間放大 */
    opacity: 0;           /* 變透明 */
    pointer-events: none; /* 防止重複點擊 */
}

/* ☁️ 飄浮動畫：模擬在空氣中輕微晃動的感覺 */
@keyframes bubbleFloat {
    0%, 100% { 
        transform: translate(0, 0) rotate(0deg); 
    }
    33% { 
        transform: translate(15px, -25px) rotate(8deg); 
    }
    66% { 
        transform: translate(-15px, 15px) rotate(-8deg); 
    }
}

/* 📱 針對小螢幕的微調：如果覺得太大可以縮小一點 */
@media (max-width: 380px) {
    .pop-item {
        font-size: 38px;
    }
}
    </style>
</head>
<body class="day">

    <div id="top-bar">
        <div class="progress-container"><div id="progress-bar"></div></div>
        <div class="level-text">
            <span id="garden-name">載入中...</span>
            <span id="points-display">0 / 10</span>
        </div>
    </div>

    <div id="message-bubble"></div>

    <div id="game-container">
        <div id="flower-pot" onclick="handlePlantClick()">
            <div id="growth-timer"></div>
            <img id="flower-img" src="" alt="plant">
        </div>
        <p id="hint-text" style="font-size: 14px; margin-top: 15px;">點擊土壤播下此刻的心情</p>
        <p id="flower-name-display" style="font-weight: bold; color: #e91e63; margin-top: 5px;"></p>
    </div>

    <div class="controls">
        <button style="background: #aed581; color: #33691e;" onclick="openPlantModal()">播下情緒</button>
        <button style="background: #81d4fa; color: #01579b;" onclick="openLantern('future')">寫給未來</button>
        <button style="background: #cfd8dc; color: #37474f;" onclick="openLantern('worry')">煩惱飛走</button>
        <button style="background: #f8bbd0; color: #880e4f;" onclick="toggleLetters()">往日信箱</button>
        <button style="background: #ffe0b2; color: #e65100;" onclick="toggleAlbum()">花卉圖鑑</button>
        <button style="background: #eeeeee;" onclick="openSaveMenu()">系統設定</button>
    </div>

    <div id="plant-modal" class="modal">
        <div class="modal-content">
            <h3>調配種子情緒</h3>
            <p style="font-size: 12px; color: #888; margin-bottom: 15px;">將此刻的情緒比例分配完畢 (總和100)</p>
            <div class="emotion-input-group">
    <label>😊 開心</label>
    <input type="range" id="emo-happy" min="0" max="100" value="20" step="20" oninput="validateEmotions()">
</div>
<div class="emotion-input-group">
    <label>😡 生氣</label>
    <input type="range" id="emo-angry" min="0" max="100" value="20" step="20" oninput="validateEmotions()">
</div>
<div class="emotion-input-group">
    <label>😟 煩惱</label>
    <input type="range" id="emo-worry" min="0" max="100" value="20" step="20" oninput="validateEmotions()">
</div>
<div class="emotion-input-group">
    <label>😢 難過</label>
    <input type="range" id="emo-sad" min="0" max="100" value="20" step="20" oninput="validateEmotions()">
</div>
<div class="emotion-input-group">
    <label>✨ 期盼</label>
    <input type="range" id="emo-hope" min="0" max="100" value="20" step="20" oninput="validateEmotions()">
</div>
            <div id="total-check" style="font-weight: bold; margin: 10px 0;">總和: 100 / 100</div>
            <button id="plant-btn" style="background: #aed581; width: 100%; padding: 15px; border-radius: 15px;" onclick="confirmPlanting()">開始種植</button>
            <p style="font-size: 13px; margin-top: 15px; color: #999; cursor: pointer;" onclick="closeModal()">先不種了</p>
        </div>
    </div>

    <div id="list-modal" class="modal"><div class="modal-content"><h3 id="list-title">清單</h3><div id="list-container" class="scroll-list"></div><button style="background: #eee; width: 100%; margin-top: 20px; padding: 12px;" onclick="closeModal()">返回花園</button></div></div>
    
    <div id="lantern-modal" class="modal"><div class="modal-content"><h3 id="lantern-title">寫下你的心願</h3><textarea id="lantern-text" placeholder="寫點什麼吧..."></textarea><div id="date-picker-area"><p style="font-size: 14px;">預計抵達日期：</p><input type="date" id="lantern-date" style="width:100%; padding:10px; margin-bottom:10px; border-radius:10px; border:1px solid #ddd;"></div><button style="background: #ff6b6b; color: white; width: 100%; padding: 15px; border-radius: 15px;" onclick="launchLantern()">釋放天燈</button><p style="font-size: 12px; margin-top: 15px; color: #888;" onclick="closeModal()">取消</p></div></div>

    <div id="save-modal" class="modal">
        <div class="modal-content">
            <h3>資料管理中心</h3>
            <p style="font-size: 11px; color: #888; margin-bottom: 15px;">監控本地容量，建議定期匯出備份避免數據丟失。</p>
            
            <div class="storage-progress-area">
                <div style="display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 5px;">
                    <span style="font-weight:bold;">存檔空間佔用</span>
                    <span id="storage-usage-text">0%</span>
                </div>
                <div class="progress-container" style="height: 8px; background: #ddd;">
                    <div id="storage-bar" style="width: 0%; height: 100%; background: #4caf50; transition: width 0.5s;"></div>
                </div>
                <p id="storage-kb-info" style="font-size: 10px; color: #999; margin-top: 6px; margin-bottom:0;">已使用: 0 KB / 5120 KB</p>
            </div>
            
            <button style="background: #2196f3; color:white; width: 100%; margin-bottom: 12px; padding: 14px; border-radius: 12px;" onclick="exportSaveFile()">📤 匯出備份 (JSON)</button>
            
            <button style="background: #9c27b0; color:white; width: 100%; margin-bottom: 12px; padding: 14px; border-radius: 12px;" onclick="triggerImport()">📥 匯入備份 (JSON)</button>
            <input type="file" id="import-input" accept=".json" onchange="importSaveFile(event)">

            <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">
            
            <button style="background: #ff5252; color:white; width: 100%; padding: 10px; border-radius: 12px; font-size: 12px;" onclick="clearData()">🔥 重置所有進度 (不可還原)</button>
            
            <p style="font-size: 12px; margin-top: 15px; color: #888; cursor: pointer;" onclick="closeModal()">返回花園</p>
        </div>
    </div>

    <script>
    // 1. 常數與設定區
    const STORAGE_KEY = 'myGardenGame_v4'; // 升級版本號以避免舊資料衝突
    const GROWTH_TIME_LIMIT = 300; 
    const WORDS_LOW = ["妳辛苦了，給自己一點掌聲吧。", "深呼吸，情緒只是路過的雲。", "今天的妳也值得被好好對待。", "浮名本是身外物，不著方寸也風流。", "妳種下的不只是花，是與自己和解的證明。"];
    const WORDS_HIGH = ["心靈的花園因為妳的誠實而繁茂。", "擁抱每一種情緒，那是妳獨一無二的色彩。", "無論是風雨還是晴天，妳都在茁壯成長。", "不論過去如何，未來有妳有我。", "在這裡，每一份心情都值得被溫柔親吻。"];

    const ASSETS = {
        soil: 'https://raw.githubusercontent.com/googlefonts/noto-emoji/main/png/128/emoji_u1fab4.png',
        sprout: 'https://raw.githubusercontent.com/googlefonts/noto-emoji/main/png/128/emoji_u1f331.png',
        flowers: [
            { id: 'f1', name: '向日葵', img: 'https://raw.githubusercontent.com/googlefonts/noto-emoji/main/png/128/emoji_u1f33b.png' },
            { id: 'f2', name: '大雛菊', img: 'https://raw.githubusercontent.com/googlefonts/noto-emoji/main/png/128/emoji_u1f33c.png' },
            { id: 'f3', name: '粉紅鬱金香', img: 'https://raw.githubusercontent.com/googlefonts/noto-emoji/main/png/128/emoji_u1f337.png' },
            { id: 'f4', name: '綻放櫻花', img: 'https://raw.githubusercontent.com/googlefonts/noto-emoji/main/png/128/emoji_u1f338.png' },
            { id: 'f5', name: '藍繡球', img: 'https://raw.githubusercontent.com/googlefonts/noto-emoji/main/png/128/emoji_u1fabb.png' },
            { id: 'f6', name: '紅玫瑰', img: 'https://raw.githubusercontent.com/googlefonts/noto-emoji/main/png/128/emoji_u1f339.png' }
        ],
        foods: [
            { id: 'fd1', name: '草莓冰淇淋', img: 'https://raw.githubusercontent.com/googlefonts/noto-emoji/main/png/128/emoji_u1f366.png' },
            { id: 'fd2', name: '沁涼雪花冰', img: 'https://raw.githubusercontent.com/googlefonts/noto-emoji/main/png/128/emoji_u1f367.png' },
            { id: 'fd3', name: '三色抹茶丸子', img: 'https://raw.githubusercontent.com/googlefonts/noto-emoji/main/png/128/emoji_u1f361.png' },
            { id: 'fd4', name: '提拉米蘇蛋糕', img: 'https://raw.githubusercontent.com/googlefonts/noto-emoji/main/png/128/emoji_u1f370.png' },
            { id: 'fd5', name: '法式吐司', img: 'https://raw.githubusercontent.com/googlefonts/noto-emoji/main/png/128/emoji_u1f35e.png' },
            { id: 'fd6', name: '金黃薯條', img: 'https://raw.githubusercontent.com/googlefonts/noto-emoji/main/png/128/emoji_u1f35f.png' }
        ]
    };
// 在常數區定義遊戲時間
const NURTURE_TIME_LIMIT = 10; // 小遊戲持續 10 秒
let miniGameScore = 0;         // 紀錄本次戳破的數量
let spawnInterval = null;      // 用來清除產生器的計時器
    // 2. 狀態初始化 (移至上方)
    let gameState = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
        points: 0, gardenLv: 1, plantStatus: 'idle', 
        growStartTime: 0, currentFlowerId: "", currentFlowerName: "", currentFlowerImg: "",
        futureLetters: [], flowerAlbum: [] 
    };

    

    function autoSave() { 
        localStorage.setItem(STORAGE_KEY, JSON.stringify(gameState));
        if(document.getElementById('save-modal').style.display === 'flex') updateStorageProgress();
    }

    function validateEmotions() {
        const h = parseInt(document.getElementById('emo-happy').value), 
              a = parseInt(document.getElementById('emo-angry').value),
              w = parseInt(document.getElementById('emo-worry').value), 
              s = parseInt(document.getElementById('emo-sad').value),
              hp = parseInt(document.getElementById('emo-hope').value);
        const total = h + a + w + s + hp;
        const display = document.getElementById('total-check');
        display.innerText = `總和: ${total} / 100`;
        display.style.color = (total === 100) ? 'green' : 'red';
        document.getElementById('plant-btn').disabled = (total !== 100);
    }

    function confirmPlanting() {
    // 1. 決定這次會種出什麼（邏輯不變）
    let pool = (gameState.gardenLv < 5) ? ASSETS.flowers : ASSETS.flowers.concat(ASSETS.foods);
    const item = pool[Math.floor(Math.random() * pool.length)];

    gameState.currentFlowerId = item.id; 
    gameState.currentFlowerName = item.name; 
    gameState.currentFlowerImg = item.img;

    // 2. 這裡原本是直接改為 'growing'，現在改為啟動小遊戲
    closeModal(); 
    startNurturingGame(); // 呼叫下方新增的小遊戲函數
}
    function startNurturingGame() {
    gameState.plantStatus = 'nurturing'; // 切換至新狀態
    miniGameScore = 0;
    updateUI();
    showBubble("🫧 快速點擊泡泡與樹葉，幫植物澆水施肥！");

    // 每 450 毫秒產生一個元素
    spawnTimer = setInterval(createPopElement, 450);

    // 10 秒後結束遊戲
    setTimeout(() => {
        clearInterval(spawnTimer);
        finishNurturing();
    }, 10000); 
}

function createPopElement() {
    const el = document.createElement('div');
    el.className = 'pop-item'; // 對應妳 CSS 寫的樣式
    el.innerText = Math.random() > 0.5 ? '🫧' : '🍃';
    
    // 隨機出現在畫面中（避開邊緣）
    el.style.left = (15 + Math.random() * 70) + '%';
    el.style.top = (25 + Math.random() * 45) + '%';
    
    el.onclick = () => {
        miniGameScore++;
        el.classList.add('popped'); // 觸發破裂動畫
        setTimeout(() => el.remove(), 250);
    };

    document.body.appendChild(el);
    // 沒點到 3 秒後自動消失
    setTimeout(() => { if(el.parentNode) el.remove(); }, 3000);
}

function finishNurturing() {
    // 清理殘留泡泡
    document.querySelectorAll('.pop-item').forEach(el => el.remove());
    
    // 獎勵計算：GROWTH_TIME_LIMIT 減去點擊次數，最低剩 3 秒
    const actualWait = Math.max(3, GROWTH_TIME_LIMIT - miniGameScore);
    
    gameState.plantStatus = 'growing'; // 正式進入倒數
    // 透過調整開始時間來實現「剩餘時間變少」的效果
    gameState.growStartTime = Date.now() - (GROWTH_TIME_LIMIT - actualWait) * 1000;
    
    showBubble(`✨ 照顧完成！獲得 ${miniGameScore} 養分，倒數縮短了！`);
    updateUI();
    autoSave();
}
        

    function harvest() {
        const isNew = !gameState.flowerAlbum.find(f => f.id === gameState.currentFlowerId);
        if (isNew) gameState.flowerAlbum.push({ id: gameState.currentFlowerId, name: gameState.currentFlowerName, img: gameState.currentFlowerImg });
        
        gameState.points += 2;
        const words = (gameState.gardenLv >= 5) ? WORDS_HIGH : WORDS_LOW;
        showBubble(`${isNew ? '🌟 新發現！' : ''}【${gameState.currentFlowerName}】盛開了。${words[Math.floor(Math.random() * words.length)]}`);
        
        gameState.plantStatus = 'idle';
        checkLevelUp(); 
        updateUI(); 
        autoSave();
    }

    function checkLevelUp() {
    const threshold = 20; // 直接改成固定數字
    if (gameState.points >= threshold && gameState.gardenLv < 10) {
        gameState.gardenLv++; 
        gameState.points = 0; // 升級後經驗歸零
        showBubble(`🎊 花園升級了！目前等級：Lv.${gameState.gardenLv}`);
    }
}
    function updateUI() {
        const threshold = 20; // 妳設定的固定門檻
        const bar = document.getElementById('progress-bar');        
        const pointsDisp = document.getElementById('points-display');
        const nameDisp = document.getElementById('garden-name');
        
        if(bar) bar.style.width = (gameState.points / threshold * 100) + "%";
        if(pointsDisp) pointsDisp.innerText = `${gameState.points} / ${threshold}`;
        if(nameDisp) nameDisp.innerText = `Lv.${gameState.gardenLv} ${gameState.gardenLv >= 5 ? '繁盛花園' : '新手花園'}`;
        
        // --- 🌸 核心修改開始 ---
        const isHighLevel = gameState.gardenLv >= 5;
        const wasHighLevel = document.body.classList.contains('lvl-high');
        document.body.classList.toggle('lvl-high', isHighLevel);

        // 如果剛升到 5 等，或是日夜切換了，就重新畫裝飾
        const currentMode = document.body.classList.contains('day') ? 'day' : 'night';
        if (isHighLevel && (!wasHighLevel || window.currentRenderMode !== currentMode)) {
            createLvlHighDecorations(currentMode);
            window.currentRenderMode = currentMode;
        } else if (!isHighLevel) {
            // 如果未滿 5 等，清空裝飾（防止降級測試時殘留）
            document.querySelectorAll('.decoration-emoji').forEach(d => d.remove());
            window.currentRenderMode = null;
        }
        // --- 🌸 核心修改結束 ---
        
        const img = document.getElementById('flower-img');
        const hint = document.getElementById('hint-text');
        const flowerNameDisp = document.getElementById('flower-name-display');

        if (gameState.plantStatus === 'idle') { 
        img.src = ASSETS.soil; 
        hint.innerText = "點擊土壤播下此刻的心情"; 
        flowerNameDisp.innerText = ""; 
    } 
    // 🌟 新增：小遊戲護理階段
    else if (gameState.plantStatus === 'nurturing') {
        img.src = ASSETS.sprout; // 顯示嫩芽，代表剛播種正在照顧
        hint.innerText = "✨ 正在細心呵護中... (點擊泡泡！)"; 
        flowerNameDisp.innerText = "給予養分中..."; 
    }
    else if (gameState.plantStatus === 'growing') { 
        img.src = ASSETS.sprout; 
        hint.innerText = "情緒正在萌芽中..."; 
        flowerNameDisp.innerText = "培育中..."; 
    } 
    else { 
        img.src = gameState.currentFlowerImg; 
        hint.innerText = "收成這份心情"; 
        flowerNameDisp.innerText = "已盛開： " + gameState.currentFlowerName; 
    }
    }

    function createLvlHighDecorations(mode) {
            // 1. 先移除舊的裝飾
            const oldDecos = document.querySelectorAll('.decoration-emoji');
            oldDecos.forEach(d => d.remove());

            // 2. 設定參數
            const emoji = mode === 'day' ? '🌸' : '✨';
            const animation = mode === 'day' ? 'sakuraFloat' : 'starBlink';
            const count = 4; // 🌟 固定產生 4 個 (介於 3~5 之間)

            const container = document.body;

            for (let i = 0; i < count; i++) {
                const span = document.createElement('span');
                span.className = 'decoration-emoji';
                span.innerText = emoji;

                // 3. 🌟 隨機設定位置 (避開中間花盆區)
                // 隨機在畫面的左側 30% 或右側 30%
                const side = Math.random() > 0.5 ? 'left' : 'right';
                const percentX = Math.random() * 30; // 0~30%
                span.style[side] = percentX + '%';
                
                // 隨機高度 10%~80%
                const percentY = 10 + Math.random() * 70;
                span.style.top = percentY + '%';

                // 4. 🌟 隨機設定大小 (20px ~ 50px)
                const size = 20 + Math.random() * 30;
                span.style.fontSize = size + 'px';

                // 5. 🌟 隨機設定透明度與模糊 (白天櫻花特別需要)
                if (mode === 'day') {
                    const opacity = 0.3 + Math.random() * 0.4; // 0.3~0.7
                    const blur = Math.random() * 2; // 0~2px 模糊
                    span.style.opacity = opacity;
                    span.style.filter = `blur(${blur}px)`;
                } else {
                    span.style.opacity = 0.5 + Math.random() * 0.5; // 0.5~1.0
                }

                // 6. 🌟 隨機設定動畫延遲 (讓它們看起來不要同時閃爍或漂浮)
                const delay = Math.random() * 5; // 0~5秒延遲
                const duration = 6 + Math.random() * 4; // 6~10秒持續時間
                span.style.animation = `${animation} ${duration}s infinite ${delay}s linear`;

                container.appendChild(span);
            }
            console.log(`✅ 已為高等級${mode}產生 ${count} 個裝飾 Emoji。`);
        }

        // --- 同步修改：init 函數，確保重新調整視窗大小時裝飾位置正確 (選做，增加穩定性) ---
        function init() {
            updateTheme();
            updateUI();
            setInterval(checkGrowth, 1000);
            setInterval(updateTheme, 60000);
            
            // 當螢幕旋轉或調整大小時，重新刷新裝飾位置
            window.addEventListener('resize', () => {
                if (gameState.gardenLv >= 5) {
                    const currentMode = document.body.classList.contains('day') ? 'day' : 'night';
                    createLvlHighDecorations(currentMode);
                }
            });
        }

    function checkGrowth() {
        if (gameState.plantStatus === 'growing') {
            const elapsed = Math.floor((Date.now() - gameState.growStartTime) / 1000);
            const timerDisp = document.getElementById('growth-timer');
            if (elapsed >= GROWTH_TIME_LIMIT) { 
                gameState.plantStatus = 'ready'; 
                if(timerDisp) timerDisp.innerText = ""; 
                updateUI(); 
            } else {
                if(timerDisp) timerDisp.innerText = `收成倒數 ${GROWTH_TIME_LIMIT - elapsed}s`;
            }
        }
    }

    // --- 系統功能 ---
    function updateStorageProgress() {
        const limit = 5120;
        let total = 0;
        try {
            for (let x in localStorage) {
                if (!localStorage.hasOwnProperty(x)) continue;
                total += ((localStorage[x].length + x.length) * 2) / 1024;
            }
        } catch(e) { total = 0; }
        
        const percentage = Math.min((total / limit) * 100, 100).toFixed(1);
        const bar = document.getElementById('storage-bar');
        if(bar) {
            bar.style.width = percentage + "%";
            bar.style.background = percentage > 80 ? '#f44336' : '#4caf50';
            document.getElementById('storage-usage-text').innerText = percentage + "%";
            document.getElementById('storage-kb-info').innerText = `已使用: ${total.toFixed(1)} KB / ${limit} KB`;
        }
    }

    function exportSaveFile() {
        const dataStr = JSON.stringify(gameState, null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `garden_backup_${new Date().toLocaleDateString()}.json`;
        link.click();
        showBubble("存檔已匯出。");
    }

    function importSaveFile(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const imported = JSON.parse(e.target.result);
                if (imported.gardenLv) {
                    gameState = imported;
                    autoSave();
                    location.reload();
                }
            } catch (err) { alert("讀取失敗，請檢查檔案格式。"); }
        };
        reader.readAsText(file);
    }

    function clearData() { if(confirm("確定要重置嗎？")) { localStorage.removeItem(STORAGE_KEY); location.reload(); } }
    function handlePlantClick() { if (gameState.plantStatus === 'ready') harvest(); else if (gameState.plantStatus === 'idle') openPlantModal(); }
    function openPlantModal() { if (gameState.plantStatus === 'idle') { document.getElementById('plant-modal').style.display = 'flex'; validateEmotions(); } else showBubble("有一顆心靈正在萌芽..."); }
    function closeModal() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
    function openSaveMenu() { updateStorageProgress(); document.getElementById('save-modal').style.display = 'flex'; }
    function updateTheme() { const hr = new Date().getHours(); document.body.className = (hr > 6 && hr < 18) ? 'day' : 'night'; }
    function showBubble(text) { const b = document.getElementById('message-bubble'); if(b) { b.innerText = text; b.style.opacity = 1; setTimeout(() => b.style.opacity = 0, 5000); } }
    function triggerImport() { document.getElementById('import-input').click(); }

    // --- 圖鑑與天燈邏輯 ---
    function toggleAlbum() {
        const container = document.getElementById('list-container');
        document.getElementById('list-title').innerText = "花卉美食圖鑑";
        container.className = "scroll-list album-grid";
        container.innerHTML = gameState.flowerAlbum.length === 0 ? "<p>圖鑑空空的...</p>" : "";
        gameState.flowerAlbum.forEach(item => {
            const card = document.createElement('div'); card.className = 'item-card';
            card.innerHTML = `<img src="${item.img}"><p>${item.name}</p>`;
            container.appendChild(card);
        });
        document.getElementById('list-modal').style.display = 'flex';
    }

    let currentLanternMode = '';
    function openLantern(mode) { 
        currentLanternMode = mode; 
        document.getElementById('lantern-title').innerText = mode === 'future' ? '給未來的自己' : '煩惱隨風飄散'; 
        document.getElementById('date-picker-area').style.display = mode === 'future' ? 'block' : 'none'; 
        document.getElementById('lantern-date').valueAsDate = new Date(Date.now() + 86400000); 
        document.getElementById('lantern-modal').style.display = 'flex'; 
    }

    function launchLantern() { 
        const textInput = document.getElementById('lantern-text');
        const text = textInput.value; if(!text) return; 
        if (currentLanternMode === 'future') {
            gameState.futureLetters.push({ id: Date.now(), content: text, date: document.getElementById('lantern-date').value, timestamp: new Date().toLocaleDateString() }); 
        }
        const lan = document.createElement('div'); lan.className = 'sky-lantern'; 
        lan.innerText = text.substring(0,5)+'...'; 
        if(currentLanternMode === 'worry') lan.style.background = '#90a4ae'; 
        document.getElementById('game-container').appendChild(lan); 
        closeModal(); textInput.value = ''; autoSave(); setTimeout(() => lan.remove(), 8000); 
    }

    function toggleLetters() { 
        const container = document.getElementById('list-container'); 
        document.getElementById('list-title').innerText = "往日信箱"; 
        container.className = "scroll-list"; 
        container.innerHTML = gameState.futureLetters.length === 0 ? "<p>信箱空空的...</p>" : ""; 
        
        gameState.futureLetters.forEach(l => { 
            const isReady = l.date <= new Date().toISOString().split('T')[0]; 
            const card = document.createElement('div'); 
            card.className = 'item-card'; 
            
            // 🌟 重點：如果時間到了，顯示「開啟回憶」按鈕，否則顯示倒數
            const contentHtml = isReady ? 
                `<p style="cursor:pointer; color:#2e7d32; font-weight:bold; margin:10px 0; text-decoration:underline;" 
                    onclick="showTimeCapsule('${l.content.replace(/'/g, "\\'")}')">📖 開啟時光膠囊</p>` : 
                `<p style="color:#999; margin:10px 0;">⏳ 傳送中 (預計 ${l.date} 抵達)</p>`;

            card.innerHTML = `
                <p style='font-size:10px; color:#999'>${l.timestamp} 寄出</p>
                ${contentHtml}
                <button onclick='deleteLetter(${l.id})' style='font-size:10px; background:#ff8a80; color:white; border:none; padding:3px 8px; border-radius:5px;'>刪除</button>
            `; 
            container.appendChild(card); 
        }); 
        document.getElementById('list-modal').style.display = 'flex'; 
    }

    function deleteLetter(id) { if(confirm("確定刪除？")) { gameState.futureLetters = gameState.futureLetters.filter(l => l.id !== id); autoSave(); toggleLetters(); } }

    init();

function showTimeCapsule(contentText) {
    // 建立膠囊遮罩
    const overlay = document.createElement('div');
    overlay.id = 'capsule-overlay';
    overlay.style = `
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.8); display: flex; align-items: center;
        justify-content: center; z-index: 1000; backdrop-filter: blur(8px);
        opacity: 0; transition: opacity 0.5s;
    `;

    // 膠囊本體
    const content = document.createElement('div');
    content.style = `
        background: #fff9e6; padding: 40px 30px; border-radius: 30px;
        width: 85%; max-width: 400px; text-align: center;
        box-shadow: 0 0 30px rgba(255,215,0,0.3); transform: scale(0.8);
        transition: transform 0.5s; border: 3px solid #d4af37; position: relative;
    `;

    content.innerHTML = `
        <div style="font-size: 50px; margin-bottom: 20px;">✉️</div>
        <h3 style="color: #8b4513; margin: 0 0 15px 0; font-size: 22px;">時光膠囊啟封</h3>
        <div style="color: #5d4037; line-height: 1.8; font-size: 16px; min-height: 100px; display: flex; align-items: center; justify-content: center; border-top: 1px solid #eee; border-bottom: 1px solid #eee; margin: 15px 0; padding: 15px 0;">
            "${contentText}"
        </div>
        <button onclick="document.getElementById('capsule-overlay').remove()" 
                style="margin-top: 20px; padding: 12px 40px; background: #81c784; 
                color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; font-size: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
                收好這份回憶
        </button>
    `;

    overlay.appendChild(content);
    document.body.appendChild(overlay);

    // 啟動進場動畫
    setTimeout(() => {
        overlay.style.opacity = '1';
        content.style.transform = 'scale(1)';
    }, 10);
}

</script>
</body>
