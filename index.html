<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PokeShuffle Web - SHUFFLE-WEB-2026</title>
    <style>
       :root {
    --status-height: 90px; /* 稍微加高以容納手機頂部狀態 */
    --sidebar-width: 85px;
    --accent-color: #ffcc00;
    /* 安全區域變數：針對 iPhone 瀏海與底部橫條 */
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
}

body {
    font-family: 'PingFang TC', 'Microsoft JhengHei', 'Arial', sans-serif;
    margin: 0;
    background: #1a1a1a; /* 稍微加深底色更像手遊 */
    color: white;
    overflow: hidden;
    height: 100vh;
    /* 防止手機長按彈出菜單，提升遊戲感 */
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
}

/* 頂部狀態欄：加入 safe-top 防止被瀏海擋住 */
#status-bar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: calc(var(--status-height) + var(--safe-top));
    padding-top: var(--safe-top);
    background: rgba(0, 0, 0, 0.95);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 100;
    border-bottom: 2px solid var(--accent-color);
    font-size: 14px;
    box-sizing: border-box;
}

.status-row { display: flex; gap: 15px; margin-bottom: 5px; }

/* 左側選單：避開底部手勢區 */
#sidebar {
    position: fixed;
    left: 0;
    top: calc(var(--status-height) + var(--safe-top));
    bottom: var(--safe-bottom);
    width: var(--sidebar-width);
    background: #222;
    overflow-y: auto;
    border-right: 1px solid #444;
    z-index: 90;
    /* 隱藏滾動條但保持滾動 */
    scrollbar-width: none;
    -ms-overflow-style: none;
}
#sidebar::-webkit-scrollbar { display: none; }

.side-btn {
    padding: 22px 5px; /* 加大點擊範圍防止誤觸 */
    text-align: center;
    font-size: 12px;
    cursor: pointer;
    border-bottom: 1px solid #333;
    color: #888;
    touch-action: manipulation;
}

.side-btn.active { background: var(--accent-color); color: black; font-weight: bold; }
.side-btn.unlocked { color: white; }
.mode-toggle { background: #444; color: #ff5555; font-weight: bold; }

/* 主地圖視窗：主體部分也需要考慮底部安全區 */
#map-container {
    margin-left: var(--sidebar-width);
    margin-top: calc(var(--status-height) + var(--safe-top));
    height: calc(100vh - (var(--status-height) + var(--safe-top) + var(--safe-bottom)));
    overflow-y: scroll;
    background: #333;
    position: relative;
    scroll-behavior: smooth;
}

#stage-list {
    display: flex;
    flex-direction: column-reverse;
    padding: 15px; /* 稍微縮小 padding */
    padding-bottom: 80px; /* 底部預留空間防止被箭頭遮擋 */
    min-height: 100%;
}

/* 關卡單元：優化手機點擊感 */
.stage-item {
    background: #444;
    margin: 8px 0;
    padding: 12px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    border: 2px solid transparent;
    min-height: 75px; /* 增加最小高度，符合拇指點擊尺寸 */
    box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    box-sizing: border-box;
    touch-action: manipulation;
}

.stage-item:active { transform: scale(0.97); background: #555; } /* 點擊回饋 */

.pkmn-icon {
    width: 55px;
    height: 55px;
    margin: 0 10px;
    object-fit: contain;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 50%;
    flex-shrink: 0;
}

.stage-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    pointer-events: none; /* 文字不阻擋點擊 */
}

.stage-no { font-size: 11px; color: #bbb; margin-bottom: 2px; }
.stage-name { font-size: 16px; font-weight: bold; }

.stage-item.locked { opacity: 0.3; filter: grayscale(1); pointer-events: none; }
.stage-item.current { border-color: var(--accent-color); background: #555; }

/* 導航箭頭：向上移動避開底部系統橫條 */
#nav-arrows {
    position: fixed;
    right: 20px;
    bottom: calc(30px + var(--safe-bottom));
    display: flex;
    flex-direction: column;
    gap: 15px;
    z-index: 100;
}

.arrow-btn {
    width: 60px;
    height: 60px;
    background: rgba(0, 0, 0, 0.75);
    border: 2px solid var(--accent-color);
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 30px;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    touch-action: none; /* 防止滑動箭頭時觸發頁面滾動 */
}

/* 捕捉球圖示：預設灰色，捕獲後變彩色 */
.ball-icon {
    width: 20px;
    height: 20px;
    background: #555; /* 預設灰色 */
    border-radius: 50%;
    border: 2px solid #333;
    position: relative;
    transition: background 0.3s;
}

.ball-icon.captured {
    /* 紅白球配色 */
    background: linear-gradient(to bottom, #ff4444 50%, white 50%);
    border-color: #000;
}

.ball-icon.captured::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 6px; height: 6px;
    background: white;
    border: 2px solid #333;
    border-radius: 50%;
}

/* --- 修正後的 Mega 標示區塊 --- */

/* 基礎徽章 */
.mega-badge {
    position: absolute;
    bottom: 5px;
    right: 5px;
    width: 24px;
    height: 24px;
    background: #333; /* 未擁有時為深色 */
    border: 2px solid #666;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 0 0 5px rgba(0,0,0,0.3);
    transition: all 0.3s ease;
}

/* 徽章內的符號 (使用 Ω 或 M) */
.mega-badge::before {
    content: 'Ω'; 
    color: rgba(255,255,255,0.5);
    font-size: 14px;
    font-weight: bold;
}

/* 當擁有道具時 (與 JS 中的 .mega-badge ${isOwnedItem ? 'owned' : ''} 對接) */
.mega-badge.owned {
    background: linear-gradient(135deg, #ff7eb3 0%, #ff758c 100%);
    border-color: white;
    filter: brightness(1.2) saturate(1.2);
    box-shadow: 0 0 10px rgba(255, 126, 179, 0.8);
}

/* 擁有時符號變亮 */
.mega-badge.owned::before {
    color: white;
    text-shadow: 0 0 3px rgba(0,0,0,0.5);
}

    function renderRegionButtons() {
        const container = document.getElementById('region-btns');
        container.innerHTML = '';
        REGION_CONFIG.forEach((reg, index) => {
            const isUnlocked = isRegionUnlocked(index);
            const btn = document.createElement('div');
            btn.className = `side-btn ${gameState.currentRegionIdx === index ? 'active' : ''} ${isUnlocked ? 'unlocked' : ''}`;
            btn.innerText = reg.name;
            btn.onclick = () => { if(isUnlocked) switchRegion(index); };
            container.appendChild(btn);
        });
    }

    function isRegionUnlocked(index) {
        if (index === 0) return true;
        // 需通關前一區最後一關
        const prevRegionLastId = REGION_CONFIG[index-1].range[1].toString().padStart(3, '0');
        return gameState.unlocked.includes((REGION_CONFIG[index].range[0]).toString().padStart(3, '0'));
    }

    function switchRegion(index) {
        gameState.currentRegionIdx = index;
        document.getElementById('region-title').innerText = REGION_CONFIG[index].name + "地區";
        renderRegionButtons();
        renderMap();
        save();
    }

    function toggleDifficulty() {
        // 只有通關 151 才能開困難
        if (!gameState.unlocked.includes("152")) {
            alert("需通關關都地區(151)方可解鎖困難模式");
            return;
        }
        gameState.isHardMode = !gameState.isHardMode;

    function renderMap() {

        const id = parseInt(p.id);
        return id >= config.range[0] && id <= config.range[1];
    });

    regionData.forEach(p => {
        const isUnlocked = gameState.unlocked.includes(p.id);
        const isCaptured = gameState.captured.includes(p.id);
        const isOwnedItem = gameState.items.includes(`${p.id}_mega`);
        
        const imgId = parseInt(p.id);

function startBattleLogic() {
    if (gameState.stamina < 1) { alert("體力不足！"); return; }
    
    // 1. 初始化數據
    const p = POKEMON_DATA.find(x => x.id === gameState.lastPlayed);
    battleData.maxHP = (gameState.isHardMode) ? 4000 : (p.type === "Legendary" ? 3000 : 2500);
    battleData.currentHP = battleData.maxHP;
    battleData.moves = 15;
    battleData.board = [];

    // 2. 切換畫面
    document.getElementById('prep-overlay').style.display = 'none';
    document.getElementById('battle-screen').style.display = 'flex';
    document.getElementById('enemy-sprite').src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${parseInt(p.id)}.png`;
    
    updateBattleUI();
    initBoard();
    
    gameState.stamina -= 1;
    save();
}

function initBoard() {
    const boardEl = document.getElementById('board');
    boardEl.innerHTML = '';
    
    // 生成 36 個棋子 (隨機從隊伍 4 人中挑選)
    for (let i = 0; i < 36; i++) {
        const randomMemberId = gameState.team[Math.floor(Math.random() * 4)];
        const tileData = { id: i, pokemonId: randomMemberId };
        battleData.board.push(tileData);
        
        const div = document.createElement('div');
        div.className = 'tile';
        div.dataset.index = i;
        div.innerHTML = `<img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${parseInt(randomMemberId)}.png">`;
        
        // 綁定點擊交換邏輯
        div.onclick = () => handleTileClick(i);
        
        boardEl.appendChild(div);
    }
}

function handleTileClick(index) {
    const tiles = document.querySelectorAll('.tile');
    
    // 如果還沒選第一顆
    if (battleData.selectedTile === null) {
        battleData.selectedTile = index;
        tiles[index].classList.add('selected');
    } 
    // 如果點了「同一顆」棋子：取消選取
    else if (battleData.selectedTile === index) {
        tiles[index].classList.remove('selected');
        battleData.selectedTile = null;
    } 
    // 如果選了「第二顆」不同位置的棋子：執行交換
    else {
        const firstIndex = battleData.selectedTile;
        
        // 1. 執行數據與畫面交換
        swapTiles(firstIndex, index);
        
        // 2. 清除選取狀態
        tiles[firstIndex].classList.remove('selected');
        battleData.selectedTile = null;
        
        // 3. 消耗步數並執行消除判定
        battleData.moves--;
        updateBattleUI();
        checkMatches(); 
    }
}

function swapTiles(idx1, idx2) {
    // 陣列數據交換
    const temp = battleData.board[idx1].pokemonId;
    battleData.board[idx1].pokemonId = battleData.board[idx2].pokemonId;
    battleData.board[idx2].pokemonId = temp;
    
    // 畫面更新 (重新渲染兩個格子)
    const tiles = document.querySelectorAll('.tile');
    tiles[idx1].innerHTML = `<img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${parseInt(battleData.board[idx1].pokemonId)}.png">`;
    tiles[idx2].innerHTML = `<img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${parseInt(battleData.board[idx2].pokemonId)}.png">`;
}

function updateBattleUI() {
    const hpPercent = (battleData.currentHP / battleData.maxHP) * 100;
    document.getElementById('enemy-hp-fill').style.width = `${hpPercent}%`;
    document.getElementById('enemy-hp-text').innerText = `HP: ${battleData.currentHP} / ${battleData.maxHP}`;
    document.getElementById('moves-left').innerText = battleData.moves;
}

function closeBattle() {
    document.getElementById('battle-screen').style.display = 'none';
}

function checkMatches() {
    // 【回合/天降開始檢查】
    if (battleData.currentHP <= 0) {
        checkBattleEnd();
        return; 
    }

    let board = battleData.board;
    let toMatch = new Set();

    // 橫向掃描
    for (let r = 0; r < 6; r++) {
        for (let c = 0; c < 4; c++) {
            let idx = r * 6 + c;
            let id1 = board[idx].pokemonId;
            let id2 = board[idx + 1].pokemonId;
            let id3 = board[idx + 2].pokemonId;
            if (id1 && id1 === id2 && id1 === id3) {
                toMatch.add(idx); toMatch.add(idx + 1); toMatch.add(idx + 2);
            }
        }
    }

    // 縱向掃描
    for (let c = 0; c < 6; c++) {
        for (let r = 0; r < 4; r++) {
            let idx = r * 6 + c;
            let id1 = board[idx].pokemonId;
            let id2 = board[idx + 6].pokemonId;
            let id3 = board[idx + 12].pokemonId;
            if (id1 && id1 === id2 && id1 === id3) {
                toMatch.add(idx); toMatch.add(idx + 6); toMatch.add(idx + 12);
            }
        }
    }

    if (toMatch.size > 0) {
        handleElimination(toMatch);
    } else {
        // Combo 完全結束
        battleData.combo = 0;
        document.getElementById('combo-text').style.display = 'none';
        
        // 如果 Combo 結束但怪還沒死，檢查是否還有步數
        checkBattleEnd();
    }
}

function handleElimination(matchSet) {
    battleData.combo++;
    const representativeIdx = Array.from(matchSet)[0];
    const pkmnId = battleData.board[representativeIdx].pokemonId;
    const pkmnInfo = POKEMON_DATA.find(p => p.id === pkmnId);
    
    let baseDamage = (pkmnInfo && pkmnInfo.type === "Legendary") ? 70 : 50;
    let formMultiplier = 1.0;
    const megaCheck = document.getElementById('mega-check');
    if (megaCheck && megaCheck.checked && pkmnInfo.hasMega) formMultiplier = 1.5;

    let comboMultiplier = 1 + (battleData.combo - 1) * 0.05;
    let finalDamage = (baseDamage * matchSet.size) * formMultiplier * comboMultiplier;
    
    battleData.currentHP -= Math.floor(finalDamage);
    if (battleData.currentHP < 0) battleData.currentHP = 0;

    updateBattleUI();
    showCombo();

    const tiles = document.querySelectorAll('.tile');
    matchSet.forEach(idx => {
        tiles[idx].style.opacity = '0';
        battleData.board[idx].pokemonId = null;
    });

    // 這裡直接呼叫補位，由下一輪 checkMatches 檢查 HP
    setTimeout(() => {
        refillBoard();
    }, 500);
}

function showCombo() {
    const comboEl = document.getElementById('combo-text');
    comboEl.innerText = `${battleData.combo} COMBO!`;
    comboEl.style.display = 'block';
}

function refillBoard() {
    for (let c = 0; c < 6; c++) {
        let emptySpaces = 0;
        for (let r = 5; r >= 0; r--) {
            let idx = r * 6 + c;
            if (battleData.board[idx].pokemonId === null) {
                emptySpaces++;
            } else if (emptySpaces > 0) {
                battleData.board[idx + emptySpaces * 6].pokemonId = battleData.board[idx].pokemonId;
                battleData.board[idx].pokemonId = null;
            }
        }
        for (let r = 0; r < emptySpaces; r++) {
            battleData.board[r * 6 + c].pokemonId = gameState.team[Math.floor(Math.random() * 4)];
        }
    }

    renderBoard();

    // 觸發天降判定，讓 checkMatches 重新判斷狀態
    setTimeout(() => {
        checkMatches();
    }, 300);
}

function renderBoard() {
    const tiles = document.querySelectorAll('.tile');
    battleData.board.forEach((data, i) => {
        tiles[i].style.opacity = '1';
        tiles[i].innerHTML = `<img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${parseInt(data.pokemonId)}.png">`;
    });
}

function checkBattleEnd() {
    if (battleData.currentHP <= 0) {
        const pId = gameState.lastPlayed;
        const pInfo = POKEMON_DATA.find(p => p.id === pId);

        // 1. 強制解鎖下一關
        const nextId = (parseInt(pId) + 1).toString().padStart(3, '0');
        if (parseInt(nextId) <= 721 && !gameState.unlocked.includes(nextId)) {
            gameState.unlocked.push(nextId);
        }

        // 2. Mega 石計算
        let megaRewardMsg = "";
        if (pInfo && pInfo.hasMega) {
            if (!gameState.clearCounts) gameState.clearCounts = {};
            gameState.clearCounts[pId] = (gameState.clearCounts[pId] || 0) + 1;
            const count = gameState.clearCounts[pId];
            
            // 呼叫處理分歧獎勵的函式（現在改回傳字串）
            megaRewardMsg = handleBranchMegaLogic(pId, count);
            
            // 一般 Mega 石處理
            if (pId !== "006" && pId !== "150" && count === 5 && !gameState.items.includes(`${pId}_mega`)) {
                gameState.items.push(`${pId}_mega`);
                megaRewardMsg = `<div style="color:#ffcc00; margin-top:10px;">★ 獲得 ${pInfo.name} Mega 石 ★</div>`;
            }
        }

        // 3. 捕捉分流判斷
        const isCaptured = gameState.captured.includes(pId);
        if (isCaptured) {
            const maxCount = (pId === "006" || pId === "150") ? 10 : 5;
            const progress = (pInfo && pInfo.hasMega) ? `<br><small style="color:#bbb">Mega 挑戰進度：${gameState.clearCounts[pId]}/${maxCount}</small>` : "";
            
            save();
            // 使用小卡取代 alert
            showResultCard("挑戰成功", `下一關 ${nextId} 已解鎖！${progress}${megaRewardMsg}`, () => {
                closeBattle(); // 點確認後回地圖
            });
        } else {
            save(); 
            // 如果還沒抓過，我們先顯示「通關並解鎖」的小卡，確認後再進入捕捉畫面
            showResultCard("挑戰成功", `下一關 ${nextId} 已解鎖！${megaRewardMsg}`, () => {
                handleBattleWin(); 
            });
        }
    } else if (battleData.moves <= 0) {
        showResultCard("挑戰失敗", "步數已用盡，請再接再厲！", () => {
            closeBattle();
        });
    }
}

// 稍微修改獎勵邏輯，讓它回傳字串而不是自己跳 alert
function handleBranchMegaLogic(pId, count) {
    const xStone = `${pId}_mega_x`;
    const yStone = `${pId}_mega_y`;
    let msg = "";

    if (count === 5 && !gameState.items.includes(xStone)) {
        gameState.items.push(xStone);
        if (!gameState.items.includes(`${pId}_mega`)) gameState.items.push(`${pId}_mega`);
        msg = `<div style="color:#ffcc00; margin-top:10px;">★ 獲得 Mega 石 X ★</div>`;
    } else if (count === 10 && !gameState.items.includes(yStone)) {
        gameState.items.push(yStone);
        msg = `<div style="color:#ffcc00; margin-top:10px;">★ 獲得 Mega 石 Y ★</div>`;
    }
    return msg;
}

// 戰鬥結束時調用
function handleBattleWin() {
    const p = POKEMON_DATA.find(x => x.id === gameState.lastPlayed);
    const isLegendary = (p.type === "Legendary");
    const useKey = document.getElementById('use-key').checked;

    // 規則 1: 傳說寶可夢必須有鑰匙
    if (isLegendary && !useKey) {
        alert("通關成功！但未開啟傳說之鑰，寶可夢直接離開了。");
        closeBattle();
        return;
    }

    // 規則 2: 公式計算 (20 + 剩餘步數 * 5)
    let bonusRate = battleData.moves * 5;
    currentCatchRate = 20 + bonusRate;
    if (currentCatchRate > 100) currentCatchRate = 100;

    // 消耗資源 (若是傳說)
    if (isLegendary && useKey) {
        gameState.keys--;
        save();
    }

    // 顯示 UI
    openCatchUI(p, bonusRate);
}

function openCatchUI(p, bonus) {
    document.getElementById('battle-screen').style.display = 'none';
    document.getElementById('catch-overlay').style.display = 'flex';
    document.getElementById('catch-sprite').src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${parseInt(p.id)}.png`;
    
    // 取得 UI 元素並恢復初始狀態
    const rateText = document.getElementById('catch-rate-text');
    const detailText = document.getElementById('catch-rate-detail');
    const ball = document.getElementById('pokeball-ui');

    // 重置文字顏色與內容 (確保不會殘留上一次的 "成功" 或 "失敗" 樣式)
    rateText.innerText = `捕捉率: ${currentCatchRate}%`;
    rateText.style.color = "white"; 
    detailText.innerText = `基礎 20% + 步數獎勵 ${bonus}%`;
    detailText.style.color = "#bbb";

    // 重置按鈕與球的狀態
    document.getElementById('btn-throw').style.display = 'block';
    document.getElementById('btn-catch-close').style.display = 'none';
    ball.style.display = 'none';
    ball.style.opacity = "1"; // 恢復透明度
}

function startThrowAnimation() {
    const ball = document.getElementById('pokeball-ui');
    document.getElementById('btn-throw').style.display = 'none';
    ball.style.display = 'block';

    // 搖晃動畫模擬
    let shakeCount = 0;
    const interval = setInterval(() => {
        ball.style.transform = `rotate(${shakeCount % 2 === 0 ? 15 : -15}deg)`;
        shakeCount++;
        if (shakeCount >= 6) {
            clearInterval(interval);
            executeCatchLogic();
        }
    }, 300);
}

function executeCatchLogic() {
    const success = (Math.random() * 100) <= currentCatchRate;
    const pId = gameState.lastPlayed;
    
    // 取得 UI 元素
    const rateText = document.getElementById('catch-rate-text');
    const detailText = document.getElementById('catch-rate-detail');
    const ball = document.getElementById('pokeball-ui');

    // 1. 解鎖下一關 (不論成功與否)
    const nextId = (parseInt(pId) + 1).toString().padStart(3, '0');
    if (!gameState.unlocked.includes(nextId)) {
        gameState.unlocked.push(nextId);
    }

    // 2. 處理捕捉結果與 UI 更新
    if (success) {
        // 成功邏輯
        rateText.innerText = "成功捕獲！";
        rateText.style.color = "var(--accent-color)";
        detailText.innerText = "已加入你的收藏名單";
        
        if (!gameState.captured.includes(pId)) {
            gameState.captured.push(pId);
        }
    } else {
        // 失敗邏輯
        rateText.innerText = "捕捉失敗...";
        rateText.style.color = "#ff5555";
        detailText.innerText = "成功通關！可惜未能捕捉到寶可夢";
        
        // 失敗時讓球消失，增加遺憾感
        ball.style.opacity = "0.3";
    }

    // 3. 儲存狀態並顯示「離開」按鈕
    save();
    document.getElementById('btn-catch-close').style.display = 'block';
}

function exitCatch() {
    document.getElementById('catch-overlay').style.display = 'none';
    renderMap(); // 刷新地圖紅白球狀態
}

    // 開啟準備畫面函式
function openPrep(p) {
    const overlay = document.getElementById('prep-overlay');
    document.getElementById('prep-stage-name').innerText = p.name;
    
    // 判定 HP (依據企劃公式)
    let hp = 2500;
    if (gameState.isHardMode) hp = 4000;
    else if (p.type === "Legendary") hp = 3000;
    document.getElementById('prep-stage-hp').innerText = `目標 HP: ${hp} (模式: ${gameState.isHardMode ? '困難' : '普通'})`;

    // 顯示隊伍 (這裡暫時寫死 4 個 Slot，之後可連動隊伍系統)
    const teamDiv = document.getElementById('prep-team-slots');
teamDiv.innerHTML = '';
gameState.team.forEach((id, index) => {
    const spriteUrl = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${parseInt(id)}.png`;
    teamDiv.innerHTML += `
        <div style="text-align:center;">
            <img src="${spriteUrl}" style="width:50px; height:50px; background:#222; border-radius:50%; border:${index===0?'2px solid var(--accent-color)':'1px solid #666'}">
            <div style="font-size:10px; margin-top:5px;">小隊成員 ${index + 1}</div>
        </div>`;
    });

    // 渲染型態道具 (通關10次解鎖邏輯)
    const formOptions = document.getElementById('prep-form-options');
    formOptions.innerHTML = '';
    if (p.hasMega) {
        // 檢查是否已獲得該寶可夢的道具 (假設 gameState.items 存有 "006_mega")
        const itemKey = `${p.id}_mega`;
        if (gameState.items.includes(itemKey)) {
            formOptions.innerHTML = `<label><input type="checkbox" id="mega-check"> 觸發型態變化</label>`;
        } else {
            formOptions.innerHTML = `<span style="color:#777; font-size:12px;">尚未獲得型態道具 (需通關該關 10 次)</span>`;
        }
    } else {
        formOptions.innerHTML = `<span style="color:#777; font-size:12px;">此寶可夢無特殊型態</span>`;
    }

    // 傳說之鑰判斷
    document.getElementById('prep-key-option').style.display = (p.type === "Legendary") ? 'block' : 'none';

    overlay.style.display = 'block';
}

function closePrep() {
    document.getElementById('prep-overlay').style.display = 'none';
}

function showResultCard(title, content, callback = null) {
    document.getElementById('result-title').innerText = title;
    document.getElementById('result-content').innerHTML = content;
    document.getElementById('result-overlay').style.display = 'flex';
    // 儲存回調函式，確認按鈕點擊後執行
    window.resultCallback = callback;
}

function closeResultCard() {
    document.getElementById('result-overlay').style.display = 'none';
    if (window.resultCallback) {
        window.resultCallback();
        window.resultCallback = null;
    }
}

function updateStamina() {
    const now = Date.now();
    const wait = 30 * 60 * 1000; // 30 分鐘
    
    // 邏輯處理：檢查是否過了一個週期
    if (gameState.stamina < 24) {
        const diff = now - gameState.lastUpdate;
        if (diff >= wait) {
            // 計算過了幾個 30 分鐘 (防止掛機太久沒領)
            const gained = Math.floor(diff / wait);
            gameState.stamina = Math.min(24, gameState.stamina + gained);
            gameState.lastUpdate += gained * wait;
            save();
        }
    } else {
        // 如果體力全滿，保持最後更新時間為現在，避免滿體力後掉 1 滴又要等 30 分
        gameState.lastUpdate = now;
    }

    // UI 處理：呼叫統一的渲染函式
    updateStatusBar();
}

function updateStatusBar() {
    // 計算剩餘倒數秒數
    const now = Date.now();
    const wait = 30 * 60 * 1000;
    const remaining = gameState.stamina < 24 ? Math.ceil((wait - (now - gameState.lastUpdate)) / 1000) : 0;

    // 更新體力數字
    document.getElementById('ui-stamina').innerText = `${gameState.stamina}/24`;
    
    // 更新倒數計時器
    document.getElementById('ui-timer').innerText = remaining > 0 ? 
        `${Math.floor(remaining/60).toString().padStart(2,'0')}:${(remaining%60).toString().padStart(2,'0')}` : "MAX";
    
    // 更新圖鑑與金鑰
    document.getElementById('ui-dex').innerText = `${gameState.captured.length}/721`;
    document.getElementById('ui-keys').innerText = gameState.keys;
}
    function scrollToLastPlayed() {
        const target = document.getElementById(`stage-${gameState.lastPlayed}`);
        if (target) target.scrollIntoView({ block: 'center' });
    }

    let scrollInterval;
    function startScroll(dir) {
        const container = document.getElementById('map-container');
        scrollInterval = setInterval(() => { container.scrollTop += dir * 12; }, 16);
    }
    function stopScroll() { clearInterval(scrollInterval); }

    function save() { localStorage.setItem('SHUFFLE_WEB_SAVE', JSON.stringify(gameState)); }

    window.onload = init;
</script>
